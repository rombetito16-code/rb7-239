          📊 ייבוא מאקסל
          <input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={(e)=>{
            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=(ev)=>{
              try {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type:'array', cellDates:true});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, dateNF:'dd/mm/yyyy'});
                if (!rows.length) { alert("הקובץ ריק"); return; }
                // Find headers
                const headers = (rows[0]||[]).map(h => String(h||'').trim());
                const findCol = (...candidates) => {
                  for (const c of candidates) {
                    const idx = headers.findIndex(h => h.includes(c));
                    if (idx >= 0) return idx;
                  }
                  return -1;
                };
                const nameCol = findCol("שם");
                const platoonCol = findCol("מחלקה","פלוגה");
                const startCol = findCol("יציאה","החל","תחילת");
                const endCol = findCol("חזרה","סיום","עד");
                const rolesCol = findCol("תפקיד");
                const personalCol = findCol("מ.א","מספר אישי","מספר","אישי");
                const phoneCol = findCol("טלפון","פלאפון","נייד");
                if (nameCol < 0 || platoonCol < 0) {
                  alert('הקובץ חייב לכלול עמודות "שם" ו"מחלקה". לוודא שכותרות העמודות בשורה 1.');
                  return;
                }
                // Process rows
                const platoonMap = {};
                Object.entries(platoons).forEach(([k,p])=>{
                  platoonMap[p.label.trim()] = k;
                  platoonMap[k] = k;
                });
                // Also accept partial matches like "1" → mahlaka 1
                const findPlatoonKey = (pVal) => {
                  if (!pVal) return null;
                  const v = String(pVal).trim();
                  if (platoonMap[v]) return platoonMap[v];
                  // try matching by number
                  const m = v.match(/(\d)/);
                  if (m) {
                    const isCmd = v.includes("מפקד");
                    const candidate = isCmd ? `cmd${m[1]}` : `soldiers${m[1]}`;
                    if (platoons[candidate]) return candidate;
                  }
                  if (v.includes("מסופ")) return "pluga";
                  if (v.includes("פלוגה")||v.includes("מפקדת")) return "pluga2";
                  return null;
                };
                // Parse date - accept DD/MM/YYYY, DD/MM, or Date object
                const parseDate = (val) => {
                  if (!val) return null;
                  if (val instanceof Date) {
                    const p=n=>String(n).padStart(2,'0');
                    return `${val.getFullYear()}_${p(val.getMonth()+1)}_${p(val.getDate())}`;
                  }
                  const s = String(val).trim();
                  // DD/MM/YYYY or DD/MM/YY or DD/MM
                  const m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?$/);
                  if (!m) return null;
                  const d = parseInt(m[1]);
                  const mo = parseInt(m[2]);
                  let y = m[3] ? parseInt(m[3]) : new Date().getFullYear();
                  if (y < 100) y += 2000;
                  const p=n=>String(n).padStart(2,'0');
                  return `${y}_${p(mo)}_${p(d)}`;
                };
                // Group by name to collect leaves
                const newMembers = {}; // platoonKey → array of {name,roles}
                const leavesByName = {}; // name → array of [start,end]
                let addedRows = 0, skippedRows = 0;
                for (let i=1; i<rows.length; i++) {
                  const row = rows[i]||[];
                  const name = String(row[nameCol]||'').trim();
                  if (!name) continue;
                  const platoonKey = findPlatoonKey(row[platoonCol]);
                  if (!platoonKey) { skippedRows++; continue; }
                  if (!newMembers[platoonKey]) newMembers[platoonKey] = [];
                  // check if already added in this import or already in platoons
                  const existsInPlatoon = platoons[platoonKey].members.some(m => getMemberName(m) === name);
                  const existsInBatch = newMembers[platoonKey].some(m => m.name === name);
                  if (!existsInPlatoon && !existsInBatch) {
                    const roles = rolesCol >= 0 && row[rolesCol] ? String(row[rolesCol]).split(/[,،\/|]/).map(r=>r.trim()).filter(Boolean) : [];
                    const personalNumber = personalCol >= 0 ? String(row[personalCol]||'').trim() : '';
                    const phone = phoneCol >= 0 ? String(row[phoneCol]||'').trim() : '';
                    newMembers[platoonKey].push({name, roles, blockedMissions:[], personalNumber, phone});
                    addedRows++;
                  }
                  // collect leave date range
                  if (startCol >= 0) {
                    const sd = parseDate(row[startCol]);
                    const ed = endCol >= 0 ? parseDate(row[endCol]) : sd;
                    if (sd) {
                      if (!leavesByName[name]) leavesByName[name] = [];
                      leavesByName[name].push([sd, ed || sd]);
                    }
                  }
                }
                // Apply members
                setPlatoons(prev => {
                  const n = JSON.parse(JSON.stringify(prev));
                  Object.entries(newMembers).forEach(([k,members]) => {
                    members.forEach(m => {
                      if (!n[k].members.some(x => getMemberName(x) === m.name)) {
                        n[k].members.push(m);
                      }
                    });
                  });
                  return n;
                });
                // Apply leaves
                setAftarByDayAndSave(prev => {
                  const c = JSON.parse(JSON.stringify(prev));
                  let leaveCount = 0;
                  Object.entries(leavesByName).forEach(([name, ranges]) => {
                    ranges.forEach(([sd, ed]) => {
                      const si = DAY_IDS.indexOf(sd);
                      const ei = DAY_IDS.indexOf(ed);
                      if (si < 0 || ei < 0) return;
                      const range = DAY_IDS.slice(Math.min(si,ei), Math.max(si,ei)+1);
                      range.forEach(d => {
                        if (!c[d]) c[d] = [];
                        if (!c[d].includes(name)) { c[d].push(name); leaveCount++; }
                      });
                    });
                  });
                  return c;
                });
                alert(`✅ ייבוא הושלם:\n• ${addedRows} חיילים נוספו\n• ${Object.keys(leavesByName).length} חיילים עם יציאות הביתה\n${skippedRows > 0 ? `• ${skippedRows} שורות דולגו (מחלקה לא זוהתה)` : ''}`);
              } catch(err){
                console.error(err);
                alert("שגיאה בקריאת הקובץ: "+err.message);
              }
            };
            reader.readAsArrayBuffer(file);
            e.target.value="";
          }}/>
        </label>

          const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type:"text/csv;charset=utf-8"});

              <div style={{borderTop:"1px solid var(--border)",paddingTop:14,marginTop:8}}>

                <div style={{fontSize:11,color:"var(--text3)",marginBottom:10}}>אם תגדיר תפקידים כאן, יחליפו את החלוקה ל"מפקדים/חיילים"</div>
                <div style={{display:"flex",flexDirection:"column",gap:6}}>

                        {availableRoles.map(r=><option key={r} value={r}>{r}</option>)}
                      </select>
                      <input type="number" min={1} max={20} style={{...inp,marginTop:0,flex:1,direction:"ltr"}} value={rs.count} onChange={e=>setDraft(d=>{const nrs=[...d.roleSlots];nrs[i]={...nrs[i],count:+e.target.value};return {...d,roleSlots:nrs};})}/>
                      <button onClick={()=>setDraft(d=>({...d,roleSlots:d.roleSlots.filter((_,j)=>j!==i)}))} style={btn({color:"#ef5350",padding:"5px 10px",fontSize:14})}>✕</button>
                    </div>
                  ))}
                  <button onClick={()=>setDraft(d=>({...d,roleSlots:[...(d.roleSlots||[]),{role:availableRoles[0]||"לוחם",count:1}]}))} style={btn({background:"var(--accent)22",color:"var(--accent)",fontWeight:700,padding:"7px 14px"})}>+ הוסף תפקיד</button>
                </div>
              </div>
              <div style={{display:"flex",gap:10,marginTop:18,paddingTop:14,borderTop:"1px solid var(--border)"}}>
                <button onClick={saveAndClose} style={btn({background:"var(--green)",color:"#fff",flex:2,fontWeight:800,padding:"10px",fontSize:14})}>✓ שמור ליום זה בלבד</button>
                <button onClick={()=>setMissionEditModal(null)} style={btn({flex:1,padding:"10px",fontSize:14})}>ביטול</button>
              </div>
            </div>
          </div>
        );
      })()}
      {editReserve && (
        <div onClick={()=>setEditReserve(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",border:"3px solid #34c77b",borderRadius:16,padding:24,maxWidth:480,width:"100%",boxShadow:"0 0 60px rgba(52,199,123,0.4)"}}>
            <div style={{fontSize:22,fontWeight:800,marginBottom:8,textAlign:"center"}}>💰 עריכת תקופת מילואים</div>
            <div style={{fontSize:13,color:"var(--text2)",marginBottom:18,textAlign:"center",lineHeight:1.5}}>
              קבע את תאריכי התחילה והסיום של תקופת המילואים. סכום המענק יחושב לפי הימים שעברו.
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:12}}>
              <label style={{fontSize:12,color:"var(--text2)",fontWeight:700}}>📅 תאריך התחלה
                <input type="date" value={reserveSettings.startDate} onChange={e=>setReserveSettings(s=>({...s,startDate:e.target.value}))}
                  style={{display:"block",width:"100%",marginTop:5,padding:"10px 12px",borderRadius:8,border:"1.5px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:14}}/>
              </label>
              <label style={{fontSize:12,color:"var(--text2)",fontWeight:700}}>📅 תאריך סיום
                <input type="date" value={reserveSettings.endDate} onChange={e=>setReserveSettings(s=>({...s,endDate:e.target.value}))}
                  style={{display:"block",width:"100%",marginTop:5,padding:"10px 12px",borderRadius:8,border:"1.5px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:14}}/>
              </label>
              <label style={{fontSize:12,color:"var(--text2)",fontWeight:700}}>💵 סכום יומי (₪)
                <input type="number" min={0} value={reserveSettings.dailyAmount} onChange={e=>setReserveSettings(s=>({...s,dailyAmount:+e.target.value}))}
                  style={{display:"block",width:"100%",marginTop:5,padding:"10px 12px",borderRadius:8,border:"1.5px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:14,direction:"ltr"}}/>
              </label>
              {(() => {
                const start = new Date(reserveSettings.startDate);
                const end = new Date(reserveSettings.endDate);
                if (isNaN(start) || isNaN(end)) return null;
                const totalDays = Math.max(0, Math.round((end-start)/86400000) + 1);
                const totalGrant = totalDays * reserveSettings.dailyAmount;
                return (
                  <div style={{background:"#34c77b22",border:"1.5px solid #34c77b",borderRadius:10,padding:"12px 14px",textAlign:"center"}}>
                    <div style={{fontSize:11,color:"#a5d6a7",fontWeight:700,marginBottom:4}}>סך הכל לתקופה</div>
                    <div style={{fontSize:24,fontWeight:900,color:"#34c77b",direction:"ltr"}}>{totalGrant.toLocaleString('he-IL')} ₪</div>
                    <div style={{fontSize:11,color:"#c8e6c9",marginTop:4}}>{totalDays} ימים · {reserveSettings.dailyAmount} ₪/יום</div>
                  </div>
                );
              })()}
            </div>
            <div style={{display:"flex",gap:10,marginTop:18,justifyContent:"center"}}>
              <button onClick={()=>setEditReserve(false)} style={{background:"#34c77b",color:"#fff",border:"none",borderRadius:9,padding:"10px 28px",fontFamily:"Heebo,sans-serif",fontSize:14,fontWeight:800,cursor:"pointer"}}>✓ סגור</button>
            </div>
          </div>
        </div>
      )}
      {picker && (() => {
        const effM = getEffectiveMission(mission, activeDay);
        const CMD_ROLE_NAMES = new Set(["מפקד","סמל","קצין","סגן מפקד","מ\"מ"]);
        const isCmdPlatoon = (k) => CMD_PLATOONS.has(k) || (platoons[k]?.isCustomCmd === true);
        const groups = [];
        Object.entries(platoons).forEach(([k,p]) => {
          if (p.members.length === 0) return;
          const members = p.members.filter(rawM => {
            const roles = getMemberRoles(rawM);
            const memberBlocked = getMemberBlocked(rawM);
            if (memberBlocked.includes(activeMission) && !bypassConstraints) return false;
            // Status check: blocked statuses (חו"ל / פיצול / גימלים / etc) not shown
            const st = getMemberStatus(rawM);
            if (getStatusInfo(st).blocks && !bypassConstraints) return false;
            if (picker.requiredRole) return roles.includes(picker.requiredRole);
            if (picker.isCommander) return isCmdPlatoon(k) || roles.some(r => CMD_ROLE_NAMES.has(r));
            // generic soldier slot: prefer non-cmd platoons but allow all
            return true;
          });
          if (members.length > 0) groups.push({key:k, platoon:p, members: sortMembersByName(members)});
        });
        // Order: cmd platoons first if commander
        if (picker.isCommander) groups.sort((a,b) => (isCmdPlatoon(b.key)?1:0) - (isCmdPlatoon(a.key)?1:0));
        const assignedNames = new Set(Object.values(dayAss).flatMap(a=>[...(a.commanders||[]),...(a.soldiers||[])]).filter(Boolean).map(p=>p.name));
        const aftarNames = new Set(aftarByDay[activeDay]||[]);
        const gimelNames = new Set([...(dayAss["gimel"]?.soldiers||[])].filter(Boolean).map(p=>p.name));
        const doAssign = (name, platoonKey) => {
          setAllAssAndSave(prev => {
            const c = JSON.parse(JSON.stringify(prev));
            const effM2 = getEffectiveMission(mission, activeDay);
            const ms = getMissionSlots(effM2);
            if (!c[activeDay]) c[activeDay] = {};
            if (!c[activeDay][activeMission]) c[activeDay][activeMission] = {
              commanders: Array(ms.commander).fill(null),
              soldiers: Array(ms.soldiers).fill(null),
            };
            const needed = picker.type==='commanders' ? ms.commander : ms.soldiers;
            while ((c[activeDay][activeMission][picker.type]||[]).length < needed) {
              c[activeDay][activeMission][picker.type].push(null);
            }
            c[activeDay][activeMission][picker.type][picker.idx] = { name, platoon: platoonKey };
            return c;
          });
          setPicker(null);
        };
        // Find which mission this soldier is currently assigned to (if any)
        const findAssignedTo = (name) => {
          for (const [mid, ass] of Object.entries(dayAss)) {
            if (mid === activeMission) continue;
            const allP = [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean);
            if (allP.some(p => p.name === name)) {
              const m = allMissionDefs.find(x => x.id === mid);
              return m ? (m.label || mid) : mid;
            }
          }
          return null;
        };
        const pickAndAssign = (name, platoonKey) => {
          // If already assigned to another mission - ask for confirmation
          const alreadyAt = findAssignedTo(name);
          if (alreadyAt && !bypassConstraints) {
            setRestConfirm({
              name,
              reason: `החייל כבר משובץ במשימה: ${alreadyAt}`,
              onConfirm: () => {
                if (blocked.has(name)) {
                  setRestConfirm({
                    name,
                    reason: blockedReasons[name] || 'במנוחה לאחר משימה',
                    onConfirm: () => doAssign(name, platoonKey)
                  });
                } else {
                  doAssign(name, platoonKey);
                }
              }
            });
            return;
          }
          if (blocked.has(name) && !bypassConstraints) {
            setRestConfirm({
              name,
              reason: blockedReasons[name] || 'במנוחה לאחר משימה',
              onConfirm: () => doAssign(name, platoonKey)
            });
            return;
          }
          doAssign(name, platoonKey);
        };
        const titleText = picker.requiredRole ? `בחר ${picker.requiredRole}` : (picker.isCommander ? "בחר מפקד" : "בחר חייל");
        return (
          <div onClick={()=>setPicker(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",border:"2px solid var(--accent)",borderRadius:16,padding:20,maxWidth:780,width:"100%",maxHeight:"85vh",overflow:"auto",boxShadow:"0 0 40px rgba(79,156,249,0.3)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,borderBottom:"1px solid var(--border)",paddingBottom:10}}>
                <span style={{fontSize:24}}>{picker.isCommander?"⭐":picker.requiredRole?"🎖️":"🪖"}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:18,fontWeight:800}}>{titleText}</div>
                  <div style={{fontSize:11,color:"var(--text2)"}}>למשימה: {effM?.label}</div>
                </div>
                <button onClick={()=>setPicker(null)} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",padding:"4px 10px",fontFamily:"Heebo,sans-serif",fontSize:13}}>✕ סגור</button>
              </div>
              {groups.length === 0 ? (
                <div style={{padding:30,textAlign:"center",color:"var(--text3)",fontSize:13}}>
                  אין חיילים מתאימים{picker.requiredRole?` עם תפקיד "${picker.requiredRole}"`:""}.
                </div>
              ) : groups.map(g => (
                <div key={g.key} style={{marginBottom:14}}>
                  <div style={{fontSize:13,fontWeight:700,color:g.platoon.color,marginBottom:8,padding:"5px 10px",background:g.platoon.color+"22",borderRadius:6,display:"inline-block"}}>
                    {g.platoon.label} ({g.members.length})
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {g.members.map(rawM => {
                      const name = getMemberName(rawM);
                      const roles = getMemberRoles(rawM);
                      const isAssigned = assignedNames.has(name);
                      const isAftar = aftarNames.has(name);
                      const isGimel = gimelNames.has(name);
                      const isResting = blocked.has(name);
                      // Now: clicking already-assigned soldier asks confirmation; only hard-block aftar/gimel
                      const isHardBusy = isAftar || isGimel;
                      const busyLabel = isAftar?"בבית":isGimel?"בגימל":isAssigned?"⚠ כבר משובץ":"";
                      return (
                        <button key={name} onClick={()=>!isHardBusy && pickAndAssign(name, g.key)}
                          style={{...getPlatoonStyleFromMap(platoons,g.key),border:"none",borderRadius:8,padding:"10px 14px",fontFamily:"Heebo,sans-serif",fontSize:14,fontWeight:700,cursor:isHardBusy?"not-allowed":"pointer",opacity:isHardBusy?0.4:(isAssigned||isResting?0.75:1),display:"flex",flexDirection:"column",alignItems:"center",gap:3,minWidth:110, ...(isAssigned&&!isHardBusy?{outline:'2px dashed #4f9cf9'}:isResting&&!isHardBusy?{outline:'2px solid #ffcc80'}:{})}}>
                          <span>{name}</span>
                          {roles.length>0 && <span style={{fontSize:9,opacity:0.85}}>{roles.join(" · ")}</span>}
                          {isHardBusy && <span style={{fontSize:9,background:"rgba(0,0,0,0.3)",padding:"1px 5px",borderRadius:4}}>{busyLabel}</span>}
                          {!isHardBusy && isAssigned && <span style={{fontSize:9,background:"rgba(79,156,249,0.3)",padding:"1px 5px",borderRadius:4,color:"#fff"}}>⚠ כבר משובץ (יישאל)</span>}
                          {!isHardBusy && !isAssigned && isResting && <span style={{fontSize:9,background:"rgba(255,204,128,0.3)",padding:"1px 5px",borderRadius:4,color:"#fff"}}>⚠ במנוחה (יישאל)</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

  return (
    <div style={{display:"flex",gap:6}}>
      <input value={v} onChange={e=>setV(e.target.value)} placeholder={placeholder||"תפקיד חדש..."}
        style={{flex:1,padding:"6px 10px",borderRadius:7,border:"1px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:13}}
        onKeyDown={e=>{if(e.key==='Enter'&&v.trim()){onAdd(v.trim());setV("");}}}/>

}

function MemberEditor({ name, roles, blockedMissions, personalNumber, phone, status, platoonKey, idx, platoons, availableRoles, allMissionsList, setPlatoons, setAvailableRoles, setAllAssAndSave, btn, inp, onDone }) {
  const [editName, setEditName] = React.useState(name);
  const [editRoles, setEditRoles] = React.useState(roles);
  const [editPlatoon, setEditPlatoon] = React.useState(platoonKey);
  const [editBlocked, setEditBlocked] = React.useState(blockedMissions || []);
  const [editPersonal, setEditPersonal] = React.useState(personalNumber || '');
  const [editPhone, setEditPhone] = React.useState(phone || '');
  const [editStatus, setEditStatus] = React.useState(status || 'active');
  const save = () => {
    const newName = editName.trim();
    if (!newName) return;
    setPlatoons(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      n[platoonKey].members = n[platoonKey].members.filter((_,i)=>i!==idx);
      n[editPlatoon].members.push({name:newName, roles:editRoles, blockedMissions:editBlocked, personalNumber: editPersonal.trim(), phone: editPhone.trim(), status: editStatus});
      return n;
    });
    if (newName !== name) {
      setAllAssAndSave(prev=>{
        const c=JSON.parse(JSON.stringify(prev));
        Object.keys(c).forEach(dayId=>{
          Object.keys(c[dayId]||{}).forEach(mid=>{
            ['commanders','soldiers'].forEach(type=>{
              (c[dayId][mid][type]||[]).forEach((p,i)=>{
                if(p&&p.name===name) c[dayId][mid][type][i]={...p,name:newName};
              });
            });
          });
        });
        return c;
      });
    }
    onDone();
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6,padding:"6px 0"}}>
      <input value={editName} placeholder="שם מלא" onChange={e=>setEditName(e.target.value)} style={{...inp,fontSize:12}}/>
      <select value={editPlatoon} onChange={e=>setEditPlatoon(e.target.value)} style={{...inp,fontSize:12}}>
        {Object.entries(platoons).map(([k,p])=><option key={k} value={k}>{p.label}</option>)}
      </select>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
        <input value={editPersonal} placeholder="מספר אישי" onChange={e=>setEditPersonal(e.target.value)} style={{...inp,fontSize:11,marginTop:0,direction:'ltr'}}/>
        <input value={editPhone} placeholder="טלפון" onChange={e=>setEditPhone(e.target.value)} style={{...inp,fontSize:11,marginTop:0,direction:'ltr'}}/>
      </div>
      <div>
        <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,fontWeight:700}}>סטטוס:</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
          {MEMBER_STATUSES.map(s=>(
            <button key={s.id} onClick={()=>setEditStatus(s.id)}
              style={{...btn(),background:editStatus===s.id?s.color:"var(--surface2)",color:editStatus===s.id?"#fff":s.color,borderColor:s.color,fontSize:10,padding:"2px 8px",fontWeight:700}}>
              {s.label}
            </button>
          ))}
        </div>
      </div>
      <div>
        <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>
          <span>תפקידים:</span>
          {setAvailableRoles && <button onClick={()=>{
            const r = prompt("שם תפקיד חדש:");
            if (r && r.trim() && !availableRoles.includes(r.trim())) setAvailableRoles(p=>[...p,r.trim()]);
          }} style={{...btn(),background:"var(--accent)22",color:"var(--accent)",fontSize:9,padding:"1px 6px"}}>+ חדש</button>}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
          {availableRoles.map(r=>{
            const isSel = editRoles.includes(r);
            return <button key={r} onClick={()=>setEditRoles(p=>isSel?p.filter(x=>x!==r):[...p,r])}
              style={{...btn(),background:isSel?"var(--accent)":"var(--surface2)",color:isSel?"#fff":"var(--text2)",fontSize:10,padding:"2px 6px"}}>{r}</button>;
          })}
        </div>
      </div>
      <div>
        <div style={{fontSize:10,color:"#ef5350",marginBottom:4,fontWeight:700}}>🚫 משימות חסומות (לא יוצג בשיבוץ):</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
          {(allMissionsList||[]).map(m=>{
            const isSel = editBlocked.includes(m.id);
            return <button key={m.id} onClick={()=>setEditBlocked(p=>isSel?p.filter(x=>x!==m.id):[...p,m.id])}
              style={{...btn(),background:isSel?"#ef5350":"var(--surface2)",color:isSel?"#fff":"var(--text2)",fontSize:10,padding:"2px 6px"}}>{m.icon} {m.label}</button>;
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:5}}>
        <button onClick={save} style={btn({background:"var(--green)",color:"#fff",flex:1,fontWeight:700,fontSize:11})}>✓ שמור</button>
        <button onClick={onDone} style={btn({flex:1,fontSize:11})}>ביטול</button>
      </div>
    </div>
  );
}

function SwapModalContent({ swapModal, defaultH, missionStartH, missionEndH, platoons, onCancel, onConfirm }) {
  const [hour, setHour] = React.useState(defaultH || 0);
  const [minute, setMinute] = React.useState(0);
  const [selPick, setSelPick] = React.useState(null); // {name, platoon}
  const cur = swapModal.current;
  const sH = missionStartH ?? 0;
  const eH = missionEndH ?? 24;
  const fmt = (h) => `${String(h % 24).padStart(2,'0')}:00`;
  const fmtTime = (h,m) => `${String(h).padStart(2,'0')}:${String(m||0).padStart(2,'0')}`;
  // Generate suggestion times in 30-min increments within the mission window
  const suggestions = [];
  for (let t = (sH+1)*60; t < eH*60; t += 30) {
    suggestions.push({h: Math.floor(t/60) % 24, m: t%60});
  }
  return (
    <div onClick={onCancel} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.78)",zIndex:3000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",border:"3px solid #ffcc80",borderRadius:16,padding:22,maxWidth:720,width:"100%",maxHeight:"88vh",overflow:"auto",boxShadow:"0 0 60px rgba(255,204,128,0.35)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14,borderBottom:"2px solid var(--border)",paddingBottom:12}}>
          <span style={{fontSize:30}}>🔄</span>
          <div style={{flex:1}}>
            <div style={{fontSize:18,fontWeight:800}}>החלפת חייל באמצע משימה</div>
            <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>חייל נוכחי: <strong style={{color:"var(--text)"}}>{cur?.name}</strong> · המשימה: <strong>{fmt(sH)} - {fmt(eH)}</strong></div>
          </div>
          <button onClick={onCancel} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",padding:"6px 14px",fontFamily:"Heebo,sans-serif",fontSize:13}}>✕ סגור</button>
        </div>
        {/* PROMINENT TIME PICKER */}
        <div style={{background:"linear-gradient(135deg,#ff980022,#ffcc8033)",border:"2.5px solid #ff9800",borderRadius:12,padding:18,marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:800,color:"#ff9800",marginBottom:12,textAlign:"center",letterSpacing:0.5}}>⏰ באיזו שעה תתבצע ההחלפה?</div>
          {/* Big time display */}
          <div style={{textAlign:"center",marginBottom:14}}>
            <div style={{display:"inline-block",background:"#ff9800",color:"#fff",borderRadius:14,padding:"10px 28px",fontSize:42,fontWeight:900,fontFamily:"Heebo,sans-serif",letterSpacing:2,direction:"ltr",boxShadow:"0 4px 12px rgba(255,152,0,0.4)"}}>
              {String(hour).padStart(2,'0')}:{String(minute).padStart(2,'0')}
            </div>
          </div>
          {/* Hour + minute inputs */}
          <div style={{display:"flex",gap:12,alignItems:"center",justifyContent:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13,color:"var(--text)",fontWeight:700}}>שעה</span>
              <button onClick={()=>setHour(h=>(h+23)%24)} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text)",cursor:"pointer",padding:"6px 10px",fontFamily:"Heebo,sans-serif",fontSize:16,fontWeight:800}}>−</button>
              <input type="number" min={0} max={23} value={hour} onChange={e=>setHour(Math.max(0,Math.min(23,+e.target.value||0)))}
                style={{width:72,padding:"10px",borderRadius:8,border:"2px solid #ff9800",background:"var(--surface)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:22,fontWeight:800,textAlign:"center",direction:"ltr"}}/>
              <button onClick={()=>setHour(h=>(h+1)%24)} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text)",cursor:"pointer",padding:"6px 10px",fontFamily:"Heebo,sans-serif",fontSize:16,fontWeight:800}}>+</button>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13,color:"var(--text)",fontWeight:700}}>דקות</span>
              <button onClick={()=>setMinute(m=>(m-5+60)%60)} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text)",cursor:"pointer",padding:"6px 10px",fontFamily:"Heebo,sans-serif",fontSize:16,fontWeight:800}}>−5</button>
              <input type="number" min={0} max={59} step={5} value={minute} onChange={e=>setMinute(Math.max(0,Math.min(59,+e.target.value||0)))}
                style={{width:72,padding:"10px",borderRadius:8,border:"2px solid #ff9800",background:"var(--surface)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:22,fontWeight:800,textAlign:"center",direction:"ltr"}}/>
              <button onClick={()=>setMinute(m=>(m+5)%60)} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text)",cursor:"pointer",padding:"6px 10px",fontFamily:"Heebo,sans-serif",fontSize:16,fontWeight:800}}>+5</button>
            </div>
          </div>
          {/* Quick presets */}
          {suggestions.length > 0 && (
            <div style={{display:"flex",flexWrap:"wrap",gap:5,justifyContent:"center",paddingTop:10,borderTop:"1px dashed rgba(255,152,0,0.4)"}}>
              <span style={{fontSize:11,color:"var(--text2)",alignSelf:"center",marginLeft:6}}>זמנים מהירים:</span>
              {suggestions.slice(0, 12).map((s,i) => {
                const isSel = s.h === hour && s.m === minute;
                return (
                  <button key={i} onClick={()=>{setHour(s.h); setMinute(s.m);}}
                    style={{background:isSel?"#ff9800":"var(--surface2)",border:`1.5px solid ${isSel?"#fff":"#ff9800"}`,borderRadius:6,color:isSel?"#fff":"#ffcc80",cursor:"pointer",padding:"4px 9px",fontFamily:"Heebo,sans-serif",fontSize:12,fontWeight:700,direction:"ltr"}}>
                    {fmtTime(s.h,s.m)}
                  </button>
                );
              })}
            </div>
          )}
          <div style={{textAlign:"center",fontSize:12,color:"var(--text)",marginTop:12,background:"rgba(0,0,0,0.18)",padding:"8px 10px",borderRadius:7,lineHeight:1.5}}>
            <strong style={{color:"#ffcc80"}}>{cur?.name}</strong> יסיים בשעה <strong style={{color:"#ffcc80",direction:"ltr",display:"inline-block"}}>{fmtTime(hour,minute)}</strong>
            <br/>המחליף יחל בשעה <strong style={{color:"#ffcc80",direction:"ltr",display:"inline-block"}}>{fmtTime(hour,minute)}</strong>
          </div>
        </div>
        <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>👤 בחר חייל מחליף</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,maxHeight:340,overflow:"auto",marginBottom:14}}>
          {Object.entries(platoons).map(([k,p])=>p.members.length===0?null:(
            <div key={k}>
              <div style={{fontSize:12,fontWeight:700,color:p.color,marginBottom:5,padding:"3px 8px",background:p.color+"22",borderRadius:5,display:"inline-block"}}>{p.label}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {[...p.members].sort((a,b)=>{
                  const na = typeof a==='string'?a:a.name;
                  const nb = typeof b==='string'?b:b.name;
                  return na.localeCompare(nb,'he');
                }).map(rawM=>{
                  const name = typeof rawM==='string'?rawM:rawM.name;
                  const isSame = name === cur?.name;
                  const isSel = selPick?.name === name;
                  const style = getPlatoonStyleFromMap(platoons,k);
                  return (
                    <button key={name} disabled={isSame} onClick={()=>setSelPick({name,platoon:k})}
                      style={{...style,border:isSel?"3px solid #fff":"2px solid transparent",borderRadius:7,padding:"6px 12px",fontFamily:"Heebo,sans-serif",fontSize:13,fontWeight:700,cursor:isSame?"not-allowed":"pointer",opacity:isSame?0.3:1,boxShadow:isSel?"0 0 8px rgba(255,255,255,0.5)":"none"}}>
                      {name}{isSame && " (נוכחי)"}
                    </button>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:10,paddingTop:14,borderTop:"1px solid var(--border)"}}>
          <button onClick={()=>{
            if (!selPick) { alert('בחר חייל מחליף'); return; }
            onConfirm(selPick.name, selPick.platoon, hour, minute);
          }} style={{background:"#ff9800",color:"#fff",border:"none",borderRadius:9,padding:"10px",flex:2,fontWeight:800,cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:14}}>✓ אישור החלפה</button>
          <button onClick={onCancel} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:9,padding:"10px",flex:1,color:"var(--text2)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:14}}>ביטול</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
