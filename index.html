    const allMissionsList = allMissionDefs.filter(m => !deletedMissions.includes(m.id));
    const addPlatoon = () => {
      const lbl = newPlatoonLabel.trim();
      if (!lbl) { alert("חסר שם מחלקה"); return; }
      const id = "custom_pl_" + Date.now();
      setPlatoons(prev => ({...prev, [id]: { label: lbl, color: newPlatoonColor, textColor: "#0a0f1a", members: [], isCustomCmd: newPlatoonIsCmd }}));
      setNewPlatoonLabel(""); setShowNewPlatoon(false);
    };
    return (
      <div className="main" style={{maxWidth:1000,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
          <div style={{fontSize:18,fontWeight:800}}>👥 ניהול חיילים ותפקידים</div>
          <button onClick={()=>setShowNewPlatoon(p=>!p)} style={btn({background:"var(--green)",color:"#fff",fontWeight:700,padding:"6px 14px",marginRight:"auto"})}>
            {showNewPlatoon?"✕ ביטול":"+ הוסף מחלקה"}
          </button>
        </div>
        {showNewPlatoon && (
          <div style={{background:"var(--surface)",border:"2px solid var(--green)",borderRadius:14,padding:"16px",marginBottom:16}}>
            <div style={{fontSize:13,fontWeight:700,color:"var(--green)",marginBottom:10}}>➕ יצירת מחלקה חדשה</div>
            <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:8,alignItems:"end"}}>
              <label style={{fontSize:11,color:"var(--text2)"}}>שם המחלקה
                <input style={inp} placeholder="לדוגמה: מחלקה 4 / חוליית חודרים" value={newPlatoonLabel} onChange={e=>setNewPlatoonLabel(e.target.value)}/>
              </label>
              <label style={{fontSize:11,color:"var(--text2)"}}>צבע
                <input type="color" style={{...inp,height:32,padding:0}} value={newPlatoonColor} onChange={e=>setNewPlatoonColor(e.target.value)}/>
              </label>
              <label style={{fontSize:11,color:"var(--text2)",display:"flex",alignItems:"center",gap:6,paddingTop:14}}>
                <input type="checkbox" checked={newPlatoonIsCmd} onChange={e=>setNewPlatoonIsCmd(e.target.checked)}/>
                מחלקת מפקדים
              </label>
            </div>
            <button onClick={addPlatoon} style={btn({background:"var(--green)",color:"#fff",fontWeight:700,padding:"7px 18px",marginTop:10})}>✓ צור מחלקה</button>
          </div>
        )}
        <div style={{background:"var(--surface)",border:"1.5px solid var(--accent)44",borderRadius:14,padding:"16px",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--accent)",marginBottom:10}}>➕ הוספת חייל חדש</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <label style={{fontSize:11,color:"var(--text2)"}}>שם
              <input style={inp} placeholder="שם מלא" value={newMemberName} onChange={e=>setNewMemberName(e.target.value)}/>
            </label>
            <label style={{fontSize:11,color:"var(--text2)"}}>מחלקה
              <select style={inp} value={newMemberPlatoon} onChange={e=>setNewMemberPlatoon(e.target.value)}>
                {Object.entries(platoons).map(([k,p])=><option key={k} value={k}>{p.label}</option>)}
              </select>
            </label>
            <label style={{fontSize:11,color:"var(--text2)"}}>מספר אישי
              <input style={inp} placeholder="מ.א" value={newMemberPersonal} onChange={e=>setNewMemberPersonal(e.target.value)}/>
            </label>
            <label style={{fontSize:11,color:"var(--text2)"}}>טלפון
              <input style={inp} placeholder="050-1234567" value={newMemberPhone} onChange={e=>setNewMemberPhone(e.target.value)}/>
            </label>
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,color:"var(--text2)",marginBottom:5,display:"flex",alignItems:"center",gap:6}}>

              <button onClick={()=>{
                const r = prompt("שם תפקיד חדש:");
                if (r && r.trim() && !availableRoles.includes(r.trim())) setAvailableRoles(p=>[...p,r.trim()]);
              }} style={{...btn(),background:"var(--accent)22",color:"var(--accent)",fontSize:10,padding:"1px 8px"}}>+ תפקיד חדש</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {availableRoles.map(r=>{
                const isSel = newMemberRoles.includes(r);
                return <button key={r} onClick={()=>setNewMemberRoles(p=>isSel?p.filter(x=>x!==r):[...p,r])}
                  style={{...btn(),background:isSel?"var(--accent)":"var(--surface2)",color:isSel?"#fff":"var(--text2)",fontSize:11}}>{r}</button>;

          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,color:"#ef5350",marginBottom:5,fontWeight:700}}>🚫 משימות חסומות (לא יוכל להישבץ):</div>

            setPlatoons(prev => {
              const n=JSON.parse(JSON.stringify(prev));
              n[newMemberPlatoon].members.push({name, roles:newMemberRoles, blockedMissions:newMemberBlocked, personalNumber: newMemberPersonal.trim(), phone: newMemberPhone.trim()});
              return n;

                  const name = getMemberName(rawM);
                  const roles = getMemberRoles(rawM);
                  const memberBlocked = getMemberBlocked(rawM);
                  const memberPersonal = getMemberPersonalNumber(rawM);
                  const memberPhone = getMemberPhone(rawM);
                  const isEditing = editingMember === `${k}_${idx}`;
                  return (
                    <div key={k+"_"+idx} style={{borderTop:"1px solid var(--border)",paddingTop:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}>
                        <div style={{...getPlatoonStyle(k),borderRadius:6,padding:"2px 8px",fontSize:12,flex:1,fontWeight:600}}>{name}</div>
                        <button style={btn({fontSize:10,padding:"2px 6px"})} onClick={()=>setEditingMember(isEditing?null:`${k}_${idx}`)}>
                          {isEditing?"✕":"✏️"}

                        <button style={btn({fontSize:10,padding:"2px 6px",color:"#ef5350"})} onClick={()=>{
                          if(confirm(`למחוק את ${name}?`)) setPlatoons(prev=>{const n=JSON.parse(JSON.stringify(prev));n[k].members=n[k].members.filter((_,i)=>i!==idx);return n;});

                      </div>
                      {!isEditing && (memberPersonal || memberPhone) && (

                          {memberPhone && <span>📞 {memberPhone}</span>}
                        </div>
                      )}
                      {isEditing && <MemberEditor name={name} roles={roles} blockedMissions={memberBlocked} personalNumber={memberPersonal} phone={memberPhone} platoonKey={k} idx={idx} platoons={platoons} availableRoles={availableRoles} allMissionsList={allMissionsList} setPlatoons={setPlatoons} setAvailableRoles={setAvailableRoles} setAllAssAndSave={setAllAssAndSave} btn={btn} inp={inp} onDone={()=>setEditingMember(null)}/>}
                      {!isEditing && roles.length>0 && (

                          {roles.map(r=><span key={r} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:4,padding:"1px 6px",fontSize:10,color:"var(--text2)"}}>{r}</span>)}

                      )}
                      {!isEditing && memberBlocked.length>0 && (

                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

          </button>
        </div>
        {view==="display" && <button onClick={()=>exportDisplayToPDF(`${activeDayObj?.label}_${activeDayObj?.date}`)} style={{background:"#ef535022",border:"1px solid #ef5350",borderRadius:7,color:"#ef5350",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,fontWeight:700,padding:"4px 12px"}}>📄 ייצוא PDF</button>}
        <button onClick={()=>{ if(confirm("לבצע שיבוץ אוטומטי ליום זה? פעולה זו תמלא תאים ריקים בלבד.")) autoAssignDay(); }} style={{background:"#34c77b22",border:"1px solid var(--green)",borderRadius:7,color:"var(--green)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,fontWeight:700,padding:"4px 12px",whiteSpace:"nowrap"}}>🪄 שיבוץ אוטומטי</button>
        <button onClick={()=>{ if(confirm("למחוק את כל השיבוצים?")){ setAllAssAndSave(freshAss()); setAftarByDayAndSave(freshAftar()); }}} style={{background:"none",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text3)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,padding:"4px 10px"}}>🗑 איפוס</button>
        <button onClick={()=>{
          const data = JSON.stringify({ass:allAss, aftar:aftarByDay, settings:{missionSettings,aftarSettings,spontMissions,hiddenMissionsByDay,deletedMissions,dayMissionOverrides,availableRoles,customPasswords,platoons:Object.fromEntries(Object.entries(platoons).map(([k,p])=>[k,p.members]))}}, null, 2);
          const blob = new Blob([data], {type:"application/json"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href=url; a.download="shabzak_backup.json"; a.click();
          URL.revokeObjectURL(url);
        }} style={{background:"none",border:"1px solid #4f9cf844",borderRadius:7,color:"var(--accent)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,padding:"4px 10px"}}>💾 גיבוי</button>
        <label style={{background:"none",border:"1px solid #34c77b44",borderRadius:7,color:"var(--green)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,padding:"4px 10px"}}>
          📂 שחזור
          <input type="file" accept=".json" style={{display:"none"}} onChange={(e)=>{
            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=(ev)=>{
              try {
                const data=JSON.parse(ev.target.result);
                if(data.ass) setAllAssAndSave(data.ass);
                if(data.aftar) setAftarByDayAndSave(data.aftar);
                if(data.settings){
                  const s = data.settings;
                  if (s.missionSettings) setMissionSettings(prev => ({...prev, ...s.missionSettings}));
                  if (s.aftarSettings) setAftarSettings(s.aftarSettings);
                  if (s.spontMissions) setSpontMissions(s.spontMissions);
                  if (s.hiddenMissionsByDay) setHiddenMissionsByDay(s.hiddenMissionsByDay);
                  if (s.deletedMissions) setDeletedMissions(s.deletedMissions);
                  if (s.dayMissionOverrides) setDayMissionOverrides(s.dayMissionOverrides);
                  if (s.availableRoles) setAvailableRoles(s.availableRoles);
                  if (s.customPasswords) setCustomPasswords(s.customPasswords);
                  if (s.customMissions) setCustomMissions(s.customMissions);
                  if (s.platoons) {
                    setPlatoons(prev => {
                      const next = JSON.parse(JSON.stringify(prev));
                      Object.entries(s.platoons).forEach(([k,members]) => { if (next[k]) next[k].members = members.map(normalizeMember); });
                      return next;
                    });
                  }
                }
                alert("נטען בהצלחה ✓");
              } catch(err){ alert("שגיאה: "+err.message); }
            };
            reader.readAsText(file);
            e.target.value="";
          }}/>
        </label>
        <label style={{background:"none",border:"1px solid #ffd54f66",borderRadius:7,color:"#ffd54f",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,padding:"4px 10px"}}>
          📊 ייבוא מאקסל
          <input type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={(e)=>{
            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=(ev)=>{
              try {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type:'array', cellDates:true});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, dateNF:'dd/mm/yyyy'});
                if (!rows.length) { alert("הקובץ ריק"); return; }
                // Find headers
                const headers = (rows[0]||[]).map(h => String(h||'').trim());
                const findCol = (...candidates) => {
                  for (const c of candidates) {
                    const idx = headers.findIndex(h => h.includes(c));
                    if (idx >= 0) return idx;
                  }
                  return -1;
                };
                const nameCol = findCol("שם");
                const platoonCol = findCol("מחלקה","פלוגה");
                const startCol = findCol("יציאה","החל","תחילת");
                const endCol = findCol("חזרה","סיום","עד");
                const rolesCol = findCol("תפקיד");
                const personalCol = findCol("מ.א","מספר אישי","מספר","אישי");
                const phoneCol = findCol("טלפון","פלאפון","נייד");
                if (nameCol < 0 || platoonCol < 0) {
                  alert('הקובץ חייב לכלול עמודות "שם" ו"מחלקה". לוודא שכותרות העמודות בשורה 1.');
                  return;
                }
                // Process rows
                const platoonMap = {};
                Object.entries(platoons).forEach(([k,p])=>{
                  platoonMap[p.label.trim()] = k;
                  platoonMap[k] = k;
                });
                // Also accept partial matches like "1" → mahlaka 1
                const findPlatoonKey = (pVal) => {
                  if (!pVal) return null;
                  const v = String(pVal).trim();
                  if (platoonMap[v]) return platoonMap[v];
                  // try matching by number
                  const m = v.match(/(\d)/);
                  if (m) {
                    const isCmd = v.includes("מפקד");
                    const candidate = isCmd ? `cmd${m[1]}` : `soldiers${m[1]}`;
                    if (platoons[candidate]) return candidate;
                  }
                  if (v.includes("מסופ")) return "pluga";
                  if (v.includes("פלוגה")||v.includes("מפקדת")) return "pluga2";
                  return null;
                };
                // Parse date - accept DD/MM/YYYY, DD/MM, or Date object
                const parseDate = (val) => {
                  if (!val) return null;
                  if (val instanceof Date) {
                    const p=n=>String(n).padStart(2,'0');
                    return `${val.getFullYear()}_${p(val.getMonth()+1)}_${p(val.getDate())}`;
                  }
                  const s = String(val).trim();
                  // DD/MM/YYYY or DD/MM/YY or DD/MM
                  const m = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})(?:[\/\-\.](\d{2,4}))?$/);
                  if (!m) return null;
                  const d = parseInt(m[1]);
                  const mo = parseInt(m[2]);
                  let y = m[3] ? parseInt(m[3]) : new Date().getFullYear();
                  if (y < 100) y += 2000;
                  const p=n=>String(n).padStart(2,'0');
                  return `${y}_${p(mo)}_${p(d)}`;
                };
                // Group by name to collect leaves
                const newMembers = {}; // platoonKey → array of {name,roles}
                const leavesByName = {}; // name → array of [start,end]
                let addedRows = 0, skippedRows = 0;
                for (let i=1; i<rows.length; i++) {
                  const row = rows[i]||[];
                  const name = String(row[nameCol]||'').trim();
                  if (!name) continue;
                  const platoonKey = findPlatoonKey(row[platoonCol]);
                  if (!platoonKey) { skippedRows++; continue; }
                  if (!newMembers[platoonKey]) newMembers[platoonKey] = [];
                  // check if already added in this import or already in platoons
                  const existsInPlatoon = platoons[platoonKey].members.some(m => getMemberName(m) === name);
                  const existsInBatch = newMembers[platoonKey].some(m => m.name === name);
                  if (!existsInPlatoon && !existsInBatch) {
                    const roles = rolesCol >= 0 && row[rolesCol] ? String(row[rolesCol]).split(/[,،\/|]/).map(r=>r.trim()).filter(Boolean) : [];
                    const personalNumber = personalCol >= 0 ? String(row[personalCol]||'').trim() : '';
                    const phone = phoneCol >= 0 ? String(row[phoneCol]||'').trim() : '';
                    newMembers[platoonKey].push({name, roles, blockedMissions:[], personalNumber, phone});
                    addedRows++;
                  }
                  // collect leave date range
                  if (startCol >= 0) {
                    const sd = parseDate(row[startCol]);
                    const ed = endCol >= 0 ? parseDate(row[endCol]) : sd;
                    if (sd) {
                      if (!leavesByName[name]) leavesByName[name] = [];
                      leavesByName[name].push([sd, ed || sd]);
                    }
                  }
                }
                // Apply members
                setPlatoons(prev => {
                  const n = JSON.parse(JSON.stringify(prev));
                  Object.entries(newMembers).forEach(([k,members]) => {
                    members.forEach(m => {
                      if (!n[k].members.some(x => getMemberName(x) === m.name)) {
                        n[k].members.push(m);
                      }
                    });
                  });
                  return n;
                });
                // Apply leaves
                setAftarByDayAndSave(prev => {
                  const c = JSON.parse(JSON.stringify(prev));
                  let leaveCount = 0;
                  Object.entries(leavesByName).forEach(([name, ranges]) => {
                    ranges.forEach(([sd, ed]) => {
                      const si = DAY_IDS.indexOf(sd);
                      const ei = DAY_IDS.indexOf(ed);
                      if (si < 0 || ei < 0) return;
                      const range = DAY_IDS.slice(Math.min(si,ei), Math.max(si,ei)+1);
                      range.forEach(d => {
                        if (!c[d]) c[d] = [];
                        if (!c[d].includes(name)) { c[d].push(name); leaveCount++; }
                      });
                    });
                  });
                  return c;
                });
                alert(`✅ ייבוא הושלם:\n• ${addedRows} חיילים נוספו\n• ${Object.keys(leavesByName).length} חיילים עם יציאות הביתה\n${skippedRows > 0 ? `• ${skippedRows} שורות דולגו (מחלקה לא זוהתה)` : ''}`);
              } catch(err){
                console.error(err);
                alert("שגיאה בקריאת הקובץ: "+err.message);
              }
            };
            reader.readAsArrayBuffer(file);
            e.target.value="";
          }}/>
        </label>
        <button onClick={()=>{
          const csv = "שם,מחלקה,מספר אישי,טלפון,תפקיד,יציאה,חזרה\nדוגמה כהן,חיילי מחלקה 1,1234567,050-1234567,\"לוחם,נהג\",15/05/2026,17/05/2026\nישראל ישראלי,מפקדי מחלקה 2,9876543,054-9876543,מפקד,,";
          const blob = new Blob([new Uint8Array([0xEF,0xBB,0xBF]), csv], {type:"text/csv;charset=utf-8"});
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a"); a.href=url; a.download="תבנית_ייבוא.csv"; a.click();
          URL.revokeObjectURL(url);
        }} title="הורד תבנית CSV ריקה" style={{background:"none",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text3)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,padding:"4px 10px"}}>📋 תבנית</button>
      </div>
      {view==="display" ? <DisplayView/> :
       view==="settings" ? <SettingsView/> :
       view==="calendar" ? <CalendarView/> :
       view==="tracking" ? <TrackingView/> :
       view==="members" ? <MembersView/> :
       <BuilderView/>}
      {picker && (() => {
        // Build the eligible candidates for this slot
        const effM = getEffectiveMission(mission, activeDay);
        const isCmdPlatoon = (k) => CMD_PLATOONS.has(k) || (platoons[k]?.isCustomCmd === true);
        const groups = [];
        Object.entries(platoons).forEach(([k,p]) => {
          if (p.members.length === 0) return;
          // For commander slot: prefer command platoons but show all
          // For role slot: filter by role
          const members = p.members.filter(rawM => {
            const name = getMemberName(rawM);
            const roles = getMemberRoles(rawM);
            const memberBlocked = getMemberBlocked(rawM);
            if (memberBlocked.includes(activeMission) && !bypassConstraints) return false;
            if (picker.requiredRole) {
              return roles.includes(picker.requiredRole);
            }
            if (picker.isCommander) {
              return isCmdPlatoon(k) || roles.some(r => ["מפקד","סמל","קצין","סגן מפקד","מ\"מ"].includes(r));
            }
            return true;
          });
          if (members.length > 0) groups.push({key:k, platoon:p, members});
        });
        // Sort: cmd platoons first if commander
        if (picker.isCommander) groups.sort((a,b) => (isCmdPlatoon(b.key)?1:0) - (isCmdPlatoon(a.key)?1:0));
        const assignedNames = new Set(Object.values(dayAss).flatMap(a=>[...(a.commanders||[]),...(a.soldiers||[])]).filter(Boolean).map(p=>p.name));
        const aftarNames = new Set(aftarByDay[activeDay]||[]);
        const gimelNames = new Set([...(dayAss["gimel"]?.soldiers||[])].filter(Boolean).map(p=>p.name));
        const pickAndAssign = (name, platoonKey) => {
          setAllAssAndSave(prev => {
            const c = JSON.parse(JSON.stringify(prev));
            const effM2 = getEffectiveMission(mission, activeDay);
            const ms = getMissionSlots(effM2);
            if (!c[activeDay]) c[activeDay] = {};
            if (!c[activeDay][activeMission]) c[activeDay][activeMission] = {
              commanders: Array(ms.commander).fill(null),
              soldiers: Array(ms.soldiers).fill(null),
            };
            const needed = picker.type==='commanders' ? ms.commander : ms.soldiers;
            while ((c[activeDay][activeMission][picker.type]||[]).length < needed) {
              c[activeDay][activeMission][picker.type].push(null);
            }
            c[activeDay][activeMission][picker.type][picker.idx] = { name, platoon: platoonKey };
            return c;
          });
          setPicker(null);
        };
        const titleText = picker.requiredRole ? `בחר ${picker.requiredRole}` : (picker.isCommander ? "בחר מפקד" : "בחר חייל");
        return (
          <div onClick={()=>setPicker(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
            <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",border:"2px solid var(--accent)",borderRadius:16,padding:"20px",maxWidth:700,width:"100%",maxHeight:"85vh",overflow:"auto",boxShadow:"0 0 40px rgba(79,156,249,0.3)"}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,borderBottom:"1px solid var(--border)",paddingBottom:10}}>
                <span style={{fontSize:24}}>{picker.isCommander?"⭐":picker.requiredRole?"🎖️":"🪖"}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:18,fontWeight:800}}>{titleText}</div>
                  <div style={{fontSize:11,color:"var(--text2)"}}>למשימה: {effM?.label}</div>
                </div>
                <button onClick={()=>setPicker(null)} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",padding:"4px 10px",fontFamily:"Heebo,sans-serif",fontSize:13}}>✕ סגור</button>
              </div>
              {groups.length === 0 ? (
                <div style={{padding:30,textAlign:"center",color:"var(--text3)",fontSize:13}}>
                  אין חיילים מתאימים{picker.requiredRole?` עם תפקיד "${picker.requiredRole}"`:""}.
                  <br/>הוסף תפקידים לחיילים דרך מסך "👥 חיילים".
                </div>
              ) : groups.map(g => (
                <div key={g.key} style={{marginBottom:14}}>
                  <div style={{fontSize:12,fontWeight:700,color:g.platoon.color,marginBottom:6,padding:"4px 8px",background:g.platoon.color+"22",borderRadius:6,display:"inline-block"}}>
                    {g.platoon.label} ({g.members.length})
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {g.members.map(rawM => {
                      const name = getMemberName(rawM);
                      const roles = getMemberRoles(rawM);
                      const isAssigned = assignedNames.has(name);
                      const isAftar = aftarNames.has(name);
                      const isGimel = gimelNames.has(name);
                      const isBusy = isAssigned || isAftar || isGimel;
                      const busyLabel = isAftar?"בבית":isGimel?"בגימל":isAssigned?"כבר משובץ":"";
                      return (
                        <button key={name} onClick={()=>!isBusy && pickAndAssign(name, g.key)}
                          style={{...getPlatoonStyleFromMap(platoons,g.key),border:"none",borderRadius:8,padding:"8px 12px",fontFamily:"Heebo,sans-serif",fontSize:13,fontWeight:700,cursor:isBusy?"not-allowed":"pointer",opacity:isBusy?0.4:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,minWidth:100}}>
                          <span>{name}</span>
                          {roles.length>0 && <span style={{fontSize:9,opacity:0.85}}>{roles.join(" · ")}</span>}
                          {isBusy && <span style={{fontSize:9,background:"rgba(0,0,0,0.3)",padding:"1px 5px",borderRadius:4}}>{busyLabel}</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      })()}
    </div>
  );
}

function AddRoleForm({ onAdd, placeholder }) {
  const [v, setV] = React.useState("");
  return (
    <div style={{display:"flex",gap:6}}>
      <input value={v} onChange={e=>setV(e.target.value)} placeholder={placeholder||"תפקיד חדש..."}
        style={{flex:1,padding:"6px 10px",borderRadius:7,border:"1px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:13}}
        onKeyDown={e=>{if(e.key==='Enter'&&v.trim()){onAdd(v.trim());setV("");}}}/>
      <button onClick={()=>{if(v.trim()){onAdd(v.trim());setV("");}}}
        style={{background:"var(--accent)",border:"none",borderRadius:7,color:"#fff",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:13,fontWeight:700,padding:"6px 16px"}}>
        + הוסף
      </button>
    </div>
  );
}

function MemberEditor({ name, roles, blockedMissions, personalNumber, phone, platoonKey, idx, platoons, availableRoles, allMissionsList, setPlatoons, setAvailableRoles, setAllAssAndSave, btn, inp, onDone }) {
  const [editName, setEditName] = React.useState(name);
  const [editRoles, setEditRoles] = React.useState(roles);
  const [editPlatoon, setEditPlatoon] = React.useState(platoonKey);
  const [editBlocked, setEditBlocked] = React.useState(blockedMissions || []);
  const [editPersonal, setEditPersonal] = React.useState(personalNumber || '');
  const [editPhone, setEditPhone] = React.useState(phone || '');
  const save = () => {
    const newName = editName.trim();
    if (!newName) return;
    setPlatoons(prev => {
      const n = JSON.parse(JSON.stringify(prev));
      n[platoonKey].members = n[platoonKey].members.filter((_,i)=>i!==idx);
      n[editPlatoon].members.push({name:newName, roles:editRoles, blockedMissions:editBlocked, personalNumber: editPersonal.trim(), phone: editPhone.trim()});
      return n;
    });
    if (newName !== name) {
      setAllAssAndSave(prev=>{
        const c=JSON.parse(JSON.stringify(prev));
        Object.keys(c).forEach(dayId=>{
          Object.keys(c[dayId]||{}).forEach(mid=>{
            ['commanders','soldiers'].forEach(type=>{
              (c[dayId][mid][type]||[]).forEach((p,i)=>{
                if(p&&p.name===name) c[dayId][mid][type][i]={...p,name:newName};
              });
            });
          });
        });
        return c;
      });
    }
    onDone();
  };
  return (
    <div style={{display:"flex",flexDirection:"column",gap:6,padding:"6px 0"}}>
      <input value={editName} placeholder="שם מלא" onChange={e=>setEditName(e.target.value)} style={{...inp,fontSize:12}}/>
      <select value={editPlatoon} onChange={e=>setEditPlatoon(e.target.value)} style={{...inp,fontSize:12}}>
        {Object.entries(platoons).map(([k,p])=><option key={k} value={k}>{p.label}</option>)}
      </select>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:5}}>
        <input value={editPersonal} placeholder="מספר אישי" onChange={e=>setEditPersonal(e.target.value)} style={{...inp,fontSize:11,marginTop:0,direction:'ltr'}}/>
        <input value={editPhone} placeholder="טלפון" onChange={e=>setEditPhone(e.target.value)} style={{...inp,fontSize:11,marginTop:0,direction:'ltr'}}/>
      </div>
      <div>
        <div style={{fontSize:10,color:"var(--text3)",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>
          <span>תפקידים:</span>
          {setAvailableRoles && <button onClick={()=>{
            const r = prompt("שם תפקיד חדש:");
            if (r && r.trim() && !availableRoles.includes(r.trim())) setAvailableRoles(p=>[...p,r.trim()]);
          }} style={{...btn(),background:"var(--accent)22",color:"var(--accent)",fontSize:9,padding:"1px 6px"}}>+ חדש</button>}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
          {availableRoles.map(r=>{
            const isSel = editRoles.includes(r);
            return <button key={r} onClick={()=>setEditRoles(p=>isSel?p.filter(x=>x!==r):[...p,r])}
              style={{...btn(),background:isSel?"var(--accent)":"var(--surface2)",color:isSel?"#fff":"var(--text2)",fontSize:10,padding:"2px 6px"}}>{r}</button>;
          })}
        </div>
      </div>
      <div>
        <div style={{fontSize:10,color:"#ef5350",marginBottom:4,fontWeight:700}}>🚫 משימות חסומות (לא יוצג בשיבוץ):</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
          {(allMissionsList||[]).map(m=>{
            const isSel = editBlocked.includes(m.id);
            return <button key={m.id} onClick={()=>setEditBlocked(p=>isSel?p.filter(x=>x!==m.id):[...p,m.id])}
              style={{...btn(),background:isSel?"#ef5350":"var(--surface2)",color:isSel?"#fff":"var(--text2)",fontSize:10,padding:"2px 6px"}}>{m.icon} {m.label}</button>;
          })}
        </div>
      </div>
      <div style={{display:"flex",gap:5}}>
        <button onClick={save} style={btn({background:"var(--green)",color:"#fff",flex:1,fontWeight:700,fontSize:11})}>✓ שמור</button>
        <button onClick={onDone} style={btn({flex:1,fontSize:11})}>ביטול</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
