<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
  import { getDatabase, ref as dbRef, set as dbSet, get as dbGet, onValue, off } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyCZjH3ubVhbbDQMwsRO7dV1QC-JPasFKAw",
  authDomain: "rom-betito-56e9e.firebaseapp.com",
  databaseURL: "https://rom-betito-56e9e-default-rtdb.firebaseio.com",
  projectId: "rom-betito-56e9e",
  storageBucket: "rom-betito-56e9e.firebasestorage.app",
  messagingSenderId: "67651144727",
  appId: "1:67651144727:web:39408edc98cc5098ff2052",
  measurementId: "G-PVB55DY0WB"
};

  const app = initializeApp(firebaseConfig);
  let analytics = null;
  try { analytics = getAnalytics(app); } catch (e) { console.warn('Analytics unavailable:', e.message); }
  const auth = getAuth(app);
  const db = getDatabase(app);

  let dataListener = null;
  let currentUser = null;
  let isApplyingRemote = false;
  let authCallbacks = [];
  let dataCallbacks = [];
  let lastError = null;
  const diagLog = [];
  function logDiag(msg) {
    const ts = new Date().toLocaleTimeString('he-IL');
    diagLog.push('[' + ts + '] ' + msg);
    if (diagLog.length > 50) diagLog.shift();
    console.log('[CloudSync]', msg);
  }
  logDiag('Firebase app initialized');

  onAuthStateChanged(auth, (user) => {
    currentUser = user;
    logDiag(user ? 'Auth state: signed in as ' + user.email : 'Auth state: signed out');
    if (dataListener) { dataListener(); dataListener = null; }
    if (user) {
      const userRef = dbRef(db, 'users/' + user.uid);
      logDiag('Setting up Realtime DB listener for user ' + user.uid);
      const unsub = onValue(userRef, (snap) => {
        if (snap.exists()) {
          const val = snap.val();
          logDiag('Received cloud data update (' + JSON.stringify(val).length + ' bytes)');
          isApplyingRemote = true;
          try { dataCallbacks.forEach(cb => cb(val)); }
          finally { setTimeout(() => { isApplyingRemote = false; }, 100); }
        } else {
          logDiag('Cloud node does not exist yet');
        }
      }, (err) => {
        lastError = 'DB listen error: ' + (err.code || '') + ' - ' + err.message;
        logDiag('ERROR: ' + lastError);
        console.error(lastError);
      });
      dataListener = () => { off(userRef); };
    }
    authCallbacks.forEach(cb => cb(user));
  });

  window.cloudSync = {
    isReady: true,
    async signUp(email, password) { return await createUserWithEmailAndPassword(auth, email, password); },
    async signIn(email, password) { return await signInWithEmailAndPassword(auth, email, password); },
    async signOut() { return await signOut(auth); },
    getUser() { return currentUser; },
    isSignedIn() { return !!currentUser; },
    isApplyingRemote() { return isApplyingRemote; },
    async save(data) {
      if (!currentUser) { logDiag('Save skipped: not signed in'); return; }
      const userRef = dbRef(db, 'users/' + currentUser.uid);
      try {
        await dbSet(userRef, { ...data, updatedAt: new Date().toISOString() });
        logDiag('Cloud save success (' + JSON.stringify(data).length + ' bytes)');
      } catch (e) {
        lastError = 'Save error: ' + (e.code || '') + ' - ' + e.message;
        logDiag('ERROR: ' + lastError);
        throw e;
      }
    },
    async load() {
      if (!currentUser) return null;
      const userRef = dbRef(db, 'users/' + currentUser.uid);
      try {
        const snap = await dbGet(userRef);
        logDiag('Cloud load: ' + (snap.exists() ? 'data found' : 'no data'));
        return snap.exists() ? snap.val() : null;
      } catch (e) {
        lastError = 'Load error: ' + (e.code || '') + ' - ' + e.message;
        logDiag('ERROR: ' + lastError);
        throw e;
      }
    },
    getDiagLog() { return diagLog.slice(); },
    getLastError() { return lastError; },
    onAuth(cb) { authCallbacks.push(cb); if (currentUser !== null || auth.currentUser === null) cb(currentUser); },
    onData(cb) { dataCallbacks.push(cb); }
  };
  window.dispatchEvent(new Event('cloudSyncReady'));
</script>

function initDayAssignments() {
  const init = {};
  MISSION_DEFS.forEach(m => { init[m.id] = { commanders:Array(m.slots.commander).fill(null), soldiers:Array(m.slots.soldiers).fill(null) }; });
  return init;

function getBlockedNames(allAss, targetDayId, targetMission, missionSettings, platoons, restExemptions) {
  const ms = missionSettings || {};
  const plugaMembers = new Set([...(platoons?.pluga?.members||[]), ...(platoons?.pluga2?.members||[])]);
  const blocked = new Set(), reasons = {};
  const dayOrder = DAY_IDS;
  const ti = dayOrder.indexOf(targetDayId);
  const isMorningDutyNextDay = (targetMission.id==="matbah_boker");
  const isPilboxNextDay = (targetMission.id==="philbox");
  const isHetz = (targetMission.id==="hetz4");
  // פעילות מבצעית — ללא מנוחה וללא חסימה
  if (targetMission.id==="maatzar") return { blocked: new Set(), blockedReasons: {} };
  dayOrder.forEach((dayId, di) => {
    const da = allAss[dayId] || {};
    // מנוחה אחרי סיור — לפי missionSettings
    MISSION_DEFS.filter(m => m.isSiyur).forEach(sm => {
      const ass = da[sm.id]; if (!ass) return;
      const restH = ms[sm.id]?.restHours ?? 16;
      if (restH === 0) return;
      if (isHetz) return;
      [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(person => {
        if (MULTI_MISSION_OFFICERS.has(person.name) || plugaMembers.has(person.name)) return;
        const sEnd = di*24 + sm.endH, tStart = ti*24 + targetMission.startH;
        const isSameSlot = (dayId===targetDayId && sm.id===targetMission.id);
        const targetIsAfterPatrolStart = tStart >= di*24 + sm.startH;
        if (tStart < sEnd+restH && !isSameSlot && targetIsAfterPatrolStart) {
          const dayExempt = ((restExemptions||{})[targetDayId]||{});
          const missionExempt = dayExempt[targetMission.id];
          if (missionExempt && missionExempt.has(person.name)) return;
          const isNextDay = di === ti-1;
          if (sm.id==="siyur_tzo" && isNextDay && isMorningDutyNextDay) return;
          if (isNextDay && isPilboxNextDay) return;
          if ((sm.id==="siyur_tzo" || sm.id.startsWith("sg")) && isNextDay && (targetMission.id==="matbah_boker"||targetMission.id==="matbah_tzaharayim")) return;
          blocked.add(person.name); reasons[person.name] = `במנוחה לאחר ${sm.label}`;
        }
      });
    });
    // מנוחה אחרי ש"ג / עמדה / תורן / חץ / סיור — לפי missionSettings
    MISSION_DEFS.filter(m => m.id.startsWith("sg") || m.id==="amada_a" || m.id==="amada_b" || m.id==="toren_rasp" || m.id==="hetz4" || m.id==="siyur_boker" || m.id==="siyur_tzo").forEach(sm => {
      const ass = da[sm.id]; if (!ass) return;
      const restH = ms[sm.id]?.restHours ?? (sm.id==="toren_rasp" ? 8 : (sm.id==="hetz4") ? 12 : 12);
      if (restH === 0) return;
      const isSameSlot = (dayId===targetDayId && sm.id===targetMission.id);
      if (isSameSlot) return;
      [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(person => {
        if (SG_REST_EXEMPT.has(person.name) || plugaMembers.has(person.name)) return;
        const sEnd = di*24 + sm.endH;
        const EFFECTIVE_START = {"philbox":14,"hetz4":14};
        const targetEffectiveStart = EFFECTIVE_START[targetMission.id] ?? targetMission.startH;
        let tStart = ti*24 + targetEffectiveStart;
        if (ti === di && targetEffectiveStart <= (sm.endH % 24) && targetEffectiveStart < 12) tStart += 24;
        if (tStart >= sEnd && tStart < sEnd + restH) {
          if (!blocked.has(person.name)) {
            blocked.add(person.name); reasons[person.name] = `במנוחה לאחר ${sm.label}`;
          }
        }
      });
    });
  });
  return { blocked, blockedReasons: reasons };
}

}

          a.href=url; a.download="shabzak_backup.json"; a.click();
          URL.revokeObjectURL(url);
        }} style={{background:"none",border:"1px solid #4f9cf844",borderRadius:7,color:"var(--accent)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,padding:"4px 10px"}}>💾 ייצוא</button>
        <label style={{background:"none",border:"1px solid #34c77b44",borderRadius:7,color:"var(--green)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,padding:"4px 10px"}}>
          📂 ייבוא
          <input type="file" accept=".json" style={{display:"none"}} onChange={(e)=>{
            const file=e.target.files[0]; if(!file) return;
            const reader=new FileReader();
            reader.onload=(ev)=>{
              try {
                const data=JSON.parse(ev.target.result);
                if(data.ass) setAllAssAndSave(data.ass);
                if(data.aftar) setAftarByDayAndSave(data.aftar);
                if(data.settings){
                  const s = data.settings;
                  if (s.missionSettings) setMissionSettings(prev => ({...prev, ...s.missionSettings}));
                  if (s.aftarSettings) setAftarSettings(s.aftarSettings);
                  if (s.specials) setSpecials(s.specials);
                  if (s.spontMissions) setSpontMissions(s.spontMissions);
                  if (s.hiddenMissionsByDay) setHiddenMissionsByDay(s.hiddenMissionsByDay);
                  if (s.deletedMissions) setDeletedMissions(s.deletedMissions);
                  if (s.dayMissionOverrides) setDayMissionOverrides(s.dayMissionOverrides);
                  if (s.platoons) {
                    setPlatoons(prev => {
                      const next = JSON.parse(JSON.stringify(prev));
                      Object.entries(s.platoons).forEach(([k,members]) => { if (next[k]) next[k].members = members; });
                      return next;
                    });
                  }
                }
                alert("השיבוצים נטענו בהצלחה ✓");
              } catch(err){ alert("שגיאה בקריאת הקובץ"); }
            };
            reader.readAsText(file);
            e.target.value="";
          }}/>
        </label>
      </div>
      {view==="display" ? <DisplayView visibleMissions={visibleMissions}/> : view==="settings" ? <SettingsView/> : view==="specials" ? <SpecialsView key="specials"/> : view==="tracking" ? <TrackingView/> : <BuilderView key="builder"/>}
    </div>
  );
}
ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
