const MEMBER_STATUSES = [
  { id: 'active', label: 'פעיל', color: '#34c77b', blocks: false },
  { id: 'abroad', label: 'חו"ל', color: '#26c6da', blocks: true },
  { id: 'pitzul', label: 'פיצול', color: '#9c27b0', blocks: true },
  { id: 'gimelim', label: 'גימלים', color: '#ff9800', blocks: true },
  { id: 'absent', label: 'לא נוכח', color: '#ef5350', blocks: true },
  { id: 'sick', label: 'חולה', color: '#f06292', blocks: true },
  { id: 'course', label: 'קורס', color: '#7e57c2', blocks: true },
  { id: 'arrest', label: 'כלא', color: '#795548', blocks: true },
];
function getStatusInfo(statusId) {
  return MEMBER_STATUSES.find(s => s.id === statusId) || MEMBER_STATUSES[0];
}
function normalizeMember(m) {
  if (typeof m === 'string') return { name: m, roles: [], blockedMissions: [], personalNumber: '', phone: '', status: 'active' };
  return {
    name: m.name,
    roles: Array.isArray(m.roles) ? m.roles : [],
    blockedMissions: Array.isArray(m.blockedMissions) ? m.blockedMissions : [],
    personalNumber: m.personalNumber || '',
    phone: m.phone || '',
    status: m.status || 'active',
  };
}
function getMemberName(m) { return typeof m === 'string' ? m : (m && m.name) || ''; }
// Sort soldiers by Hebrew alphabet (א-ת)
function sortMembersByName(arr) {
  return [...arr].sort((a,b) => getMemberName(a).localeCompare(getMemberName(b), 'he'));
}
function getMemberRoles(m) {
  if (typeof m === 'string') return [];
  return Array.isArray(m && m.roles) ? m.roles : [];
}
function getMemberBlocked(m) {
  if (typeof m === 'string') return [];
  return Array.isArray(m && m.blockedMissions) ? m.blockedMissions : [];
}
function getMemberPersonalNumber(m) {
  if (typeof m === 'string') return '';
  return (m && m.personalNumber) || '';
}
function getMemberPhone(m) {
  if (typeof m === 'string') return '';
  return (m && m.phone) || '';
}
function getMemberStatus(m) {
  if (typeof m === 'string') return 'active';
  return (m && m.status) || 'active';
}
// Lookup member details across all platoons from window._platoons
function findMemberDetails(name) {
  const plts = window._platoons || {};
  for (const k in plts) {
    for (const m of (plts[k].members || [])) {
      if (getMemberName(m) === name) {
        return { personalNumber: getMemberPersonalNumber(m), phone: getMemberPhone(m), roles: getMemberRoles(m) };
      }
    }
  }
  return { personalNumber: '', phone: '', roles: [] };
}

function getMissionSlots(mission) {
  if (mission.roleSlots && mission.roleSlots.length > 0) {
    const totalCount = mission.roleSlots.reduce((s,r)=>s+(r.count||0),0);
    return { commander: 0, soldiers: totalCount, roleSlots: mission.roleSlots };
  }
  return { commander: mission.slots.commander, soldiers: mission.slots.soldiers };
}

function initDayAssignments() {
  const init = {};
  MISSION_DEFS.forEach(m => {
    const s = getMissionSlots(m);
    init[m.id] = { commanders: Array(s.commander).fill(null), soldiers: Array(s.soldiers).fill(null) };
  });
  return init;
}

function getBlockedNames(allAss, targetDayId, targetMission, missionSettings, platoons, restExemptions, customMissions) {
  const ms = missionSettings || {};
  const allMissions = [...MISSION_DEFS, ...(customMissions||[])];
  const plugaMembers = new Set([
    ...(platoons?.pluga?.members||[]).map(getMemberName),
    ...(platoons?.pluga2?.members||[]).map(getMemberName)
  ]);
  const blocked = new Set(), reasons = {};
  const dayOrder = DAY_IDS;
  const ti = dayOrder.indexOf(targetDayId);
  const isMorningDutyNextDay = (targetMission.id==="matbah_boker");
  const isPilboxNextDay = (targetMission.id==="philbox");
  const isHetz = (targetMission.id==="hetz4");
  if (targetMission.id==="maatzar") return { blocked: new Set(), blockedReasons: {} };
  dayOrder.forEach((dayId, di) => {
    const da = allAss[dayId] || {};
    // Check all patrol/siyur missions including custom ones marked as isSiyur
    allMissions.filter(m => m.isSiyur || ms[m.id]?.isSiyur).forEach(sm => {
      const ass = da[sm.id]; if (!ass) return;
      const restH = ms[sm.id]?.restHours ?? sm.restHours ?? 16;
      if (restH === 0) return;
      if (isHetz) return;
      [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(person => {
        if (MULTI_MISSION_OFFICERS.has(person.name) || plugaMembers.has(person.name)) return;
        const sEnd = di*24 + sm.endH, tStart = ti*24 + targetMission.startH;
        const isSameSlot = (dayId===targetDayId && sm.id===targetMission.id);
        const targetIsAfterPatrolStart = tStart >= di*24 + sm.startH;
        if (tStart < sEnd+restH && !isSameSlot && targetIsAfterPatrolStart) {
          const isNextDay = di === ti-1;
          if (sm.id==="siyur_tzo" && isNextDay && isMorningDutyNextDay) return;
          if (isNextDay && isPilboxNextDay) return;
          if ((sm.id==="siyur_tzo" || sm.id.startsWith("sg")) && isNextDay && (targetMission.id==="matbah_boker"||targetMission.id==="matbah_tzaharayim")) return;
          blocked.add(person.name); reasons[person.name] = `במנוחה לאחר ${sm.label}`;
        }
      });
    });
    // Check missions with restHours > 0 (sg, amada, toren, hetz, + any custom mission with restHours set)
    allMissions.filter(m => {
      if (m.isSiyur || ms[m.id]?.isSiyur) return false; // already handled above
      const restH = ms[m.id]?.restHours ?? m.restHours ?? 0;
      if (restH === 0) return false;
      return m.id.startsWith("sg") || m.id==="amada_a" || m.id==="amada_b" || m.id==="toren_rasp" || m.id==="hetz4" || m.id==="siyur_boker" || m.id==="siyur_tzo" || m.id.startsWith("custom_");
    }).forEach(sm => {
      const ass = da[sm.id]; if (!ass) return;
      const restH = ms[sm.id]?.restHours ?? sm.restHours ?? (sm.id==="toren_rasp" ? 8 : (sm.id==="hetz4") ? 12 : 12);
      if (restH === 0) return;
      const isSameSlot = (dayId===targetDayId && sm.id===targetMission.id);
      if (isSameSlot) return;
      [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(person => {
        if (SG_REST_EXEMPT.has(person.name) || plugaMembers.has(person.name)) return;
        const sEnd = di*24 + sm.endH;
        const EFFECTIVE_START = {"philbox":14,"hetz4":14};
        const targetEffectiveStart = EFFECTIVE_START[targetMission.id] ?? targetMission.startH;
        let tStart = ti*24 + targetEffectiveStart;
        if (ti === di && targetEffectiveStart <= (sm.endH % 24) && targetEffectiveStart < 12) tStart += 24;
        if (tStart >= sEnd && tStart < sEnd + restH) {
          if (!blocked.has(person.name)) {
            blocked.add(person.name); reasons[person.name] = `במנוחה לאחר ${sm.label}`;
          }
        }
      });
    });
  });
  return { blocked, blockedReasons: reasons };
}

// === IMAGE EXPORT (looks exactly like the screen) ===
async function exportDisplayToPDF(dayLabel, dateOnly) {
  const el = document.getElementById('display-export-area');
  if (!el) { alert('פתח את מסך התצוגה תחילה'); return; }
  // Only hide edit buttons during capture — keep everything else exactly as on screen
  const printStyle = document.createElement('style');
  printStyle.id = '__pdf_print_style';
  printStyle.textContent = `#display-export-area button { display: none !important; }
    #display-export-area .display-grid { zoom: 1 !important; }
    #display-export-area .ntag.filled { background: #2a3a5c !important; color: #e8eaf6 !important; }
    #display-export-area .sbox.filled { background: #2a3a5c !important; color: #e8eaf6 !important; }`;
  document.head.appendChild(printStyle);
  try {
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 300));
    const canvas = await html2canvas(el, {
      scale: 3,
      backgroundColor: '#0f1117',
      useCORS: true,
      logging: false,
      imageTimeout: 0,
      windowWidth: el.scrollWidth,
      windowHeight: el.scrollHeight,
      onclone: (doc) => {
        const c = doc.getElementById('display-export-area');
        if (c) { c.style.zoom = '1'; }
      }
    });
    const imgData = canvas.toDataURL('image/png');
    const safeName = (dayLabel||'').replace(/[\/\\:]/g,'-');
    const link = document.createElement('a');
    link.download = `\u05e9\u05d1\u05e6\u05e7_${safeName}.png`;
    link.href = imgData;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } catch (e) {
    console.error(e);
    alert('\u05e9\u05d2\u05d9\u05d0\u05d4 \u05d1\u05d9\u05d9\u05e6\u05d5\u05d0 \u05ea\u05de\u05d5\u05e0\u05d4: ' + e.message);
  } finally {
    const s = document.getElementById('__pdf_print_style');
    if (s) s.remove();
  }
}

// === STORAGE (Firebase + localStorage fallback) ===
const STORAGE_KEY = 'shabzak_data_v2';

function loadFromStorage() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function saveToLocalStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.error('שמירה מקומית נכשלה:', e); }
}
function saveToStorage(data) {
  // Always save locally as backup
  saveToLocalStorage(data);
  // Also save to Firebase if available
  if (window.__firebase) {
    window.__firebase.saveToFirebase(data).catch(e => console.error('Firebase save error:', e));
  }
}

function getPlatoonStyleFromMap(platoonsMap, platoon) {
  const p = platoonsMap[platoon];
  if (!p) return { background:"#555", color:"#fff" };
  return { background:p.color, color:p.textColor };
}

function SafeDisplayCard(props) {
  try { return <DisplayCard {...props}/>; }
  catch(e) { return <div style={{padding:8,color:"#ef5350",fontSize:11,border:"1px solid #ef535044",borderRadius:8}}>שגיאה: {e.message}</div>; }
}

function DisplayCard({ mission, assignment, dayId, platoons }) {
  if (!assignment) assignment = { commanders: [], soldiers: [] };
  const getStyle = (p) => getPlatoonStyleFromMap(platoons, p);
  const normalizeArr = (arr, size) => {
    const cur = Array.isArray(arr) ? [...arr] : [];
    while (cur.length < size) cur.push(null);
    return cur;
  };
  const ms = getMissionSlots(mission);
  const ass = {
    commanders: normalizeArr(assignment.commanders||[], ms.commander),
    soldiers:   normalizeArr(assignment.soldiers||[], ms.soldiers),
  };
  const filled = [...ass.commanders,...ass.soldiers].filter(Boolean).length;
  const total = ms.commander + ms.soldiers;
  const done = filled===total && total>0;
  const isCompact = mission.id.startsWith("sg") || mission.id==="amada_a" || mission.id==="amada_b" || mission.id==="toren_rasp";

  // Helper: render full info for an assigned person (name + personal# + phone)
  const formatHM = (h,m) => `${String(h).padStart(2,'0')}:${String(m||0).padStart(2,'0')}`;
  const renderPerson = (p, fallbackText, big) => {
    if (!p) return <span style={{fontStyle:"italic",opacity:0.7}}>{fallbackText}</span>;
    const det = findMemberDetails(p.name);
    const rep = p.replacement;
    return (
      <>
        <div style={{fontSize: big?13:12, fontWeight:800}}>
          {p.name}
          {rep && <span style={{fontSize:big?10:9,fontWeight:600,opacity:0.85,marginRight:5}}>(עד {formatHM(rep.atHour,rep.atMinute)})</span>}
        </div>
        {(det.personalNumber || det.phone) && (
          <div style={{fontSize:9,fontWeight:600,opacity:0.85,marginTop:1,letterSpacing:0.3,direction:'ltr'}}>
            {det.personalNumber && <span>{det.personalNumber}</span>}
            {det.personalNumber && det.phone && <span style={{margin:"0 4px"}}>•</span>}
            {det.phone && <span>{det.phone}</span>}
          </div>
        )}
        {rep && (() => {
          const repDet = findMemberDetails(rep.name);
          return (
            <div style={{marginTop:4,padding:"3px 6px",background:"rgba(255,152,0,0.18)",borderRadius:5,borderTop:"1.5px dashed rgba(255,152,0,0.6)"}}>
              <div style={{fontSize: big?12:11, fontWeight:800,color:"inherit"}}>
                🔄 {rep.name}
                <span style={{fontSize:big?10:9,fontWeight:600,opacity:0.85,marginRight:5}}>(מ-{formatHM(rep.atHour,rep.atMinute)})</span>
              </div>
              {(repDet.personalNumber || repDet.phone) && (
                <div style={{fontSize:9,fontWeight:600,opacity:0.85,marginTop:1,letterSpacing:0.3,direction:'ltr'}}>
                  {repDet.personalNumber && <span>{repDet.personalNumber}</span>}
                  {repDet.personalNumber && repDet.phone && <span style={{margin:"0 4px"}}>•</span>}
                  {repDet.phone && <span>{repDet.phone}</span>}
                </div>
              )}
            </div>
          );
        })()}
      </>
    );
  };

  return (
    <div className={`mcard${isCompact?" compact":""}`} style={{ borderColor: mission.border!=="#555" ? mission.border+"88" : undefined }}>
      <div className="mcard-header">
        <span className="mcard-icon">{mission.icon}</span>
        <div style={{ flex:1 }}>
          <div className="mcard-title">{mission.label}</div>
          {mission.time && <div className="mcard-time">{mission.time}</div>}
        </div>
        <div style={{ fontSize:11, fontWeight:700, color: done?"var(--green)":"var(--text3)" }}>
          {mission.noCount ? "" : done ? "✓" : `${filled}/${total}`}
        </div>
      </div>
      <div className="mcard-body">
        {ms.roleSlots ? (
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {(()=>{ let idx=0; return ms.roleSlots.flatMap((rs,ri)=>
              Array(rs.count).fill(null).map((_,i)=>{
                const p = ass.soldiers[idx++];
                return (
                  <div key={ri+"_"+i} className={`ntag ${p?"filled":"empty"}`} style={{...(p?getStyle(p.platoon):{}),width:"100%",textAlign:"center",padding:"5px 8px"}}>

                    </> : <span style={{fontStyle:"italic",opacity:0.7,fontSize:12,fontWeight:700}}>{rs.role}</span>}
                  </div>
                );
              })
            ); })()}
          </div>
        ) : (mission.id==="siyur_boker"||mission.id==="siyur_tzo"||mission.id==="siyur_layla"||mission.id==="hetz4"||mission.id==="philbox") ? (

          <div style={{display:"flex",flexDirection:"column",gap:4}}>

          <div style={{display:"flex",flexDirection:"column",gap:4}}>

              <div key={i} className={`ntag ${p?"filled":"empty"}`} style={{...(p?getStyle(p.platoon):{}),width:"100%",textAlign:"center",padding:"6px 8px"}}>

              </div>
            ))}
          </div>

          <>
            {ms.commander>0 && (<>
              {!mission.noLabel && <div className="slot-label">מפקד</div>}
              <div className="ntag-grid">
                {ass.commanders.map((p,i)=>(
                  <div key={i} className={`ntag ${p?"filled":"empty"}`} style={p?getStyle(p.platoon):{}}>
                    {renderPerson(p, "מפקד", false)}
                  </div>
                ))}
              </div>
            </>)}
            {ms.soldiers>0 && (<>
              {!mission.noLabel && <div className="slot-label">חיילים</div>}
              <div className="ntag-grid">
                {ass.soldiers.map((p,i)=>(
                  <div key={i} className={`ntag ${p?"filled":"empty"}`} style={p?getStyle(p.platoon):{}}>
                    {renderPerson(p, "חייל", false)}
                  </div>
                ))}
              </div>
            </>)}
          </>
        )}
      </div>
    </div>
  );
}

function SlotBox({ label, assigned, onRemove, onClick, onSwap, onRemoveSwap, highlight, roleLabel, platoons, missionCount }) {
  const getStyle = (p) => getPlatoonStyleFromMap(platoons, p);
  const formatT = (h,m) => `${String(h).padStart(2,'0')}:${String(m||0).padStart(2,'0')}`;
  return (
    <div className={`sbox ${assigned?"filled":highlight?"hl":"empty"}`} style={{...(assigned?getStyle(assigned.platoon):{}),flexDirection:assigned&&assigned.replacement?"column":"row",alignItems:assigned&&assigned.replacement?"stretch":"center",gap:assigned&&assigned.replacement?4:8}} onClick={!assigned ? onClick : undefined}>
      {/* Primary slot */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,width:"100%"}}>
        <span style={{flex:1,display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
          {assigned ? (
            <>
              {assigned.name}
              {assigned.replacement && <span style={{fontSize:10,marginRight:6,opacity:0.85,fontWeight:500}}>(עד {formatT(assigned.replacement.atHour,assigned.replacement.atMinute)})</span>}
              {roleLabel && <span style={{fontSize:10,marginRight:6,opacity:0.7}}>· {roleLabel}</span>}
              {missionCount !== undefined && missionCount > 0 && (
                <span style={{fontSize:10,fontWeight:800,background:"rgba(0,0,0,0.3)",borderRadius:4,padding:"0 5px",whiteSpace:"nowrap"}}>× {missionCount}</span>
              )}
            </>
          ) : (highlight ? "לחץ לשיבוץ ←" : label)}
          {!assigned && roleLabel && <span style={{fontSize:10,marginRight:6,opacity:0.7}}>· {roleLabel}</span>}
        </span>
        {assigned && onSwap && (
          <button title="החלפת חייל באמצע משימה" onClick={e=>{e.stopPropagation();onSwap();}}
            style={{background:"rgba(255,204,128,0.25)",border:"1px solid #ffcc80",borderRadius:5,color:"#ffcc80",cursor:"pointer",fontSize:10,padding:"2px 6px",fontFamily:"Heebo,sans-serif",fontWeight:700}}>🔄</button>
        )}
        {assigned && <button className="sbox-rm" onClick={e=>{e.stopPropagation();onRemove();}}>✕</button>}
      </div>
      {/* Replacement segment */}
      {assigned && assigned.replacement && (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,width:"100%",background:"rgba(0,0,0,0.18)",borderRadius:6,padding:"5px 9px",fontSize:13,...getStyle(assigned.replacement.platoon)}}>
          <span style={{flex:1}}>
            🔄 {assigned.replacement.name}
            <span style={{fontSize:10,marginRight:6,opacity:0.85,fontWeight:500}}>(מ-{formatT(assigned.replacement.atHour,assigned.replacement.atMinute)})</span>
          </span>
          {onRemoveSwap && <button title="הסר החלפה" onClick={e=>{e.stopPropagation();onRemoveSwap();}} className="sbox-rm">✕</button>}
        </div>
      )}
    </div>
  );
}

  // Helper to apply loaded data to state
  const applyLoadedData = React.useCallback((stored) => {
    if (!stored) return;
    // IMPORTANT: load customMissions FIRST so assignment lookup below can find them
    const customMissionsFromStorage = stored.settings?.customMissions || [];
    if (stored.ass) {
      const base = freshAss();
      DAY_IDS.forEach(day => {

            // Preserve unknown mission assignments as-is (might be loaded later)

              commanders: Array.isArray(s.commanders) ? s.commanders : [],
              soldiers: Array.isArray(s.soldiers) ? s.soldiers : [],
            };
            return;
          }
          const ms = getMissionSlots(m);
          const normalize = (arr, size) => {
            if (!arr) return Array(size).fill(null);
            const a = Array.isArray(arr) ? [...arr] : (() => {
              const x = []; Object.entries(arr).forEach(([k,v])=>{x[parseInt(k)]=v;}); return x;
            })();
            while (a.length < size) a.push(null);
            return a;
          };
          base[day][mid] = {
            commanders: normalize(s.commanders, ms.commander),
            soldiers: normalize(s.soldiers, ms.soldiers),
          };

    if (stored.aftar) {

      const s = stored.settings;
      if (s.missionSettings) setMissionSettings(prev => ({...prev, ...s.missionSettings}));

      if (s.availableRoles) setAvailableRoles(s.availableRoles);
      if (s.customPasswords) setCustomPasswords(s.customPasswords);
      if (s.customMissions) setCustomMissions(s.customMissions);
      if (s.paradeSettings) setParadeSettings(s.paradeSettings);
      if (s.globalRules) setGlobalRules(s.globalRules);
      if (s.platoons) {
        setPlatoons(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          Object.entries(s.platoons).forEach(([k,members]) => {

    }
  }, []);

  React.useEffect(() => {
    if (!authed) return;
    let unsubscribe = null;

    const setupFirebase = () => {
      if (!window.__firebase) return false;
      setSyncStatus('connecting');
      // Listen to Firebase in real time
      unsubscribe = window.__firebase.listenToFirebase((data) => {
        if (isSavingRef.current) return; // skip our own saves coming back
        if (data) {
          applyLoadedData(data);
          // Also update local backup
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
        } else {
          // Firebase is empty — load from localStorage if available
          const local = loadFromStorage();
          if (local) applyLoadedData(local);
        }
        if (!isSettingsLoaded.current) {
          isSettingsLoaded.current = true;
          setSynced(true);
          setSyncStatus('live');
        }
      });
      return true;
    };

    if (window.__firebaseReady) {
      setupFirebase();
    } else {
      // Wait for Firebase to be ready
      const handler = () => setupFirebase();
      window.addEventListener('firebaseReady', handler);
      // Fallback: load from localStorage immediately
      const local = loadFromStorage();
      if (local) {
        applyLoadedData(local);
        isSettingsLoaded.current = true;
        setSynced(true);
        setSyncStatus('local');
      }
      return () => {
        window.removeEventListener('firebaseReady', handler);
        if (unsubscribe) unsubscribe();
      };
    }

    return () => { if (unsubscribe) unsubscribe(); };
  }, [authed, applyLoadedData]);

  React.useEffect(() => {
    if (!isSettingsLoaded.current) return;
    const t = setTimeout(() => {
      const data = {
        ass: allAss, aftar: aftarByDay,
        settings: {
          missionSettings, aftarSettings, reserveSettings, spontMissions,
          hiddenMissionsByDay, deletedMissions, dayMissionOverrides,
          availableRoles, customPasswords, customMissions, paradeSettings, globalRules,
          platoons: Object.fromEntries(Object.entries(platoons).map(([k,p])=>[k,p.members])),
        }
      };
      isSavingRef.current = true;
      setSyncStatus('saving');
      saveToStorage(data);
      // Reset saving flag after a moment
      setTimeout(() => {
        isSavingRef.current = false;
        setSyncStatus(window.__firebaseReady ? 'live' : 'local');
      }, 1500);
    }, 400);
    return () => clearTimeout(t);
  }, [allAss, aftarByDay, missionSettings, aftarSettings, reserveSettings, spontMissions, hiddenMissionsByDay, deletedMissions, dayMissionOverrides, platoons, availableRoles, customPasswords, customMissions]);

  const setAllAssAndSave = React.useCallback((valOrFn) => {
    setAllAss(prev => typeof valOrFn === 'function' ? valOrFn(prev) : valOrFn);
  }, []);
  const setAftarByDayAndSave = React.useCallback((valOrFn) => {
    setAftarByDay(prev => typeof valOrFn === 'function' ? valOrFn(prev) : valOrFn);
  }, []);

  const getEffectiveMission = React.useCallback((mission, dayId) => {
    const ms = missionSettings[mission.id] || {};
    const ov = (dayMissionOverrides[dayId]||{})[mission.id] || {};
    return {
      ...mission,
      label: ov.label ?? ms.label ?? mission.label,
      icon: ov.icon ?? ms.icon ?? mission.icon,
      time: ov.time ?? ms.time ?? mission.time,
      col: ov.col ?? ms.col ?? mission.col,
      roleSlots: (ov.roleSlots && ov.roleSlots.length > 0) ? ov.roleSlots : (ms.roleSlots && ms.roleSlots.length > 0 ? ms.roleSlots : (mission.roleSlots || [])),
      slots: {
        commander: ov.slots_commander ?? ms.slots_commander ?? mission.slots.commander,
        soldiers: ov.slots_soldiers ?? ms.slots_soldiers ?? mission.slots.soldiers,
      },
      startH: ov.startH ?? ms.startH ?? mission.startH,
      endH: ov.endH ?? ms.endH ?? mission.endH,
      restHours: ov.restHours ?? ms.restHours ?? mission.restHours ?? 0,
      lateWakeMission: ov.lateWakeMission ?? ms.lateWakeMission ?? mission.lateWakeMission,
      excludesFromParade: ov.excludesFromParade ?? ms.excludesFromParade ?? mission.excludesFromParade,
      allowedNames: ov.allowedNames ?? ms.allowedNames ?? mission.allowedNames ?? [],
    };
  }, [dayMissionOverrides, missionSettings]);

  const getPlatoonStyle = (platoon) => getPlatoonStyleFromMap(platoons, platoon);

  const allMembers = Object.entries(platoons).flatMap(([pl,d]) => d.members
    .filter(m => getMemberStatus(m) === 'active')
    .map(m => ({
      name: getMemberName(m), platoon: pl, roles: getMemberRoles(m)
    })));

  const isMissionHiddenOnDay = React.useCallback((dayId, missionId) => (hiddenMissionsByDay[dayId]||[]).includes(missionId), [hiddenMissionsByDay]);

  const [bypassConstraints, setBypassConstraints] = useState(false);
  const dayAss = allAss[activeDay] || initDayAssignments();
  const mission = MISSION_DEFS.find(m=>m.id===activeMission) || customMissions.find(m=>m.id===activeMission);
  const allMissionDefs = React.useMemo(() => [
    ...MISSION_DEFS.map(m => getEffectiveMission(m, activeDay)),

  const assignedThisDay = useMemo(() => {
    const excludedIds = new Set(["katzin","maatzar","gimel","hetz4","amada_a","amada_b","toren_rasp"]);
    return new Set(
      Object.entries(dayAss)
        .filter(([mid]) => !excludedIds.has(mid))

        .filter(p => !MULTI_MISSION_OFFICERS.has(p.name))

  const { blocked, blockedReasons } = useMemo(() => {

  }, [allAss, activeDay, activeMission, missionSettings, platoons, restExemptions, getEffectiveMission, customMissions]);

  const gimelThisDay = useMemo(() => new Set([...(dayAss["gimel"]?.soldiers||[])].filter(Boolean).map(p=>p.name)), [dayAss]);

  const personMissions = useMemo(() => {
    const map = {};
    allMissionDefs.forEach(m => {

      [...(a.commanders||[]),...(a.soldiers||[])].filter(Boolean).forEach(p => {

    (aftarByDay[activeDay]||[]).forEach(name => {

  }, [dayAss, aftarByDay, activeDay, allMissionDefs]);

  // Picker modal: open when clicking an empty slot without pre-selection
  const [picker, setPicker] = React.useState(null);

  const [restConfirm, setRestConfirm] = React.useState(null); // {name, platoonKey, reason, onConfirm}

  // Auto-assign: fill all empty slots across all visible missions for the active day
  const autoAssignDay = React.useCallback(() => {
    const isCmdPlatoon = (k) => CMD_PLATOONS.has(k) || (platoons[k]?.isCustomCmd === true);
    setAllAssAndSave(prev => {
      const c = JSON.parse(JSON.stringify(prev));
      if (!c[activeDay]) c[activeDay] = initDayAssignments();
      const usedNames = new Set();
      Object.values(c[activeDay]||{}).forEach(a => {
        [...(a.commanders||[]),...(a.soldiers||[])].filter(Boolean).forEach(p => usedNames.add(p.name));
      });
      const aftarToday = new Set(aftarByDay[activeDay] || []);
      const gimelToday = new Set([...(c[activeDay]?.gimel?.soldiers || [])].filter(Boolean).map(p=>p.name));
      const prevDayIdx = DAY_IDS.indexOf(activeDay) - 1;
      const prevAftar = new Set(prevDayIdx>=0 ? (aftarByDay[DAY_IDS[prevDayIdx]]||[]) : []);
      const nextDayIdx = DAY_IDS.indexOf(activeDay) + 1;
      const nextAftar = new Set(nextDayIdx<DAY_IDS.length ? (aftarByDay[DAY_IDS[nextDayIdx]]||[]) : []);
      const allCands = Object.entries(platoons).flatMap(([k,p]) =>
        p.members.filter(rawM => getMemberStatus(rawM) === 'active').map(rawM => ({
          name: getMemberName(rawM),
          platoon: k,
          roles: getMemberRoles(rawM),
          blocked: getMemberBlocked(rawM),
          isCmdPlat: isCmdPlatoon(k),
          statusBlocked: false,
        }))
      );
      const priorityOrder = (mid) => {
        if (mid === "katzin") return 0;
        if (mid.includes("siyur")) return 1;
        if (mid === "hetz4") return 2;
        if (mid.startsWith("sg")) return 3;
        if (mid === "philbox") return 4;
        return 5;
      };
      const missions = allMissionDefs
        .filter(m => !deletedMissions.includes(m.id))
        .filter(m => !isMissionHiddenOnDay(activeDay, m.id))
        .filter(m => m.id !== "gimel" && m.id !== "maatzar")
        .sort((a,b)=>priorityOrder(a.id)-priorityOrder(b.id));
      for (const m of missions) {
        const ms = getMissionSlots(m);
        const ass = c[activeDay][m.id] = c[activeDay][m.id] || {commanders:Array(ms.commander).fill(null), soldiers:Array(ms.soldiers).fill(null)};
        while (ass.commanders.length < ms.commander) ass.commanders.push(null);
        while (ass.soldiers.length < ms.soldiers) ass.soldiers.push(null);
        const restBlocked = getBlockedNames(c, activeDay, m, missionSettings, platoons, restExemptions, customMissions).blocked;
        // Night-shift-before-home rule: if soldier goes home tomorrow, don't assign to night missions (starting >=20:00)
        const isNightMission = (m.startH || 0) >= 20 || (m.endH || 0) > 24;
        const baseCanUse = (p) => {
          if (usedNames.has(p.name)) return false;
          if (p.statusBlocked) return false;
          if (aftarToday.has(p.name) || gimelToday.has(p.name) || prevAftar.has(p.name)) return false;
          if (p.blocked.includes(m.id)) return false;
          if (restBlocked.has(p.name)) return false;
          if (m.allowedNames && m.allowedNames.length>0 && !m.allowedNames.includes(p.name)) return false;
          // Apply global night-before-home rule if enabled
          if (typeof globalRules !== 'undefined' && globalRules?.nightBeforeHome && isNightMission && nextAftar.has(p.name)) return false;
          return true;
        };
        // טבלת צדק: sort candidates by how many times they've done THIS mission (fewest first)
        const missionCountForM = {};
        Object.values(prev).forEach(dayData => {
          const a = dayData[m.id]; if (!a) return;
          [...(a.commanders||[]),...(a.soldiers||[])].filter(Boolean).forEach(p => {
            missionCountForM[p.name] = (missionCountForM[p.name] || 0) + 1;
          });
        });
        const fairCands = [...allCands].sort((a,b) => (missionCountForM[a.name]||0) - (missionCountForM[b.name]||0));
        for (let i = 0; i < ms.commander; i++) {
          if (ass.commanders[i]) continue;
          const cand = fairCands.find(p => baseCanUse(p) && (p.isCmdPlat || p.roles.some(r => ["מפקד","סמל","קצין"].includes(r))))
                  || fairCands.find(p => baseCanUse(p));
          if (cand) { ass.commanders[i] = {name:cand.name, platoon:cand.platoon}; usedNames.add(cand.name); }
        }
        for (let i = 0; i < ms.soldiers; i++) {
          if (ass.soldiers[i]) continue;
          let requiredRole = null;
          if (ms.roleSlots) {
            let cum = 0;
            for (const rs of ms.roleSlots) {
              if (i < cum + rs.count) { requiredRole = rs.role; break; }
              cum += rs.count;
            }
          }
          const cand = fairCands.find(p => baseCanUse(p) && (!requiredRole || p.roles.includes(requiredRole)) && (requiredRole || !p.isCmdPlat))
                  || fairCands.find(p => baseCanUse(p) && (!requiredRole || p.roles.includes(requiredRole)));
          if (cand) { ass.soldiers[i] = {name:cand.name, platoon:cand.platoon}; usedNames.add(cand.name); }
        }
      }
      return c;
    });
  }, [activeDay, allMissionDefs, deletedMissions, isMissionHiddenOnDay, aftarByDay, platoons, missionSettings, restExemptions]);

  function slotClick(type, idx) {
    const effM = getEffectiveMission(mission, activeDay);
    const ms = getMissionSlots(effM);
    // If no people pre-selected → open picker modal filtered by role/type
    if (selPeople.length === 0) {
      let requiredRole = null;
      if (ms.roleSlots && type === 'soldiers') {
        let cum = 0;
        for (const rs of ms.roleSlots) {
          if (idx < cum + rs.count) { requiredRole = rs.role; break; }
          cum += rs.count;
        }
      }
      setPicker({ type, idx, requiredRole, isCommander: type === 'commanders' });
      return;
    }
    // Block soldiers explicitly blocked from this mission
    const blockedSoldier = selPeople.find(p => {
      const m = allMembers.find(x=>x.name===p.name);
      return m && (m.blockedMissions||[]).includes(activeMission);
    });
    if (blockedSoldier && !bypassConstraints) {
      alert(`❌ החייל ${blockedSoldier.name} חסום למשימה זו (לפי הגדרות חייל)`);
      return;
    }
    // Strict role enforcement: roleSlots → only matching roles allowed
    if (ms.roleSlots) {
      let cumIdx = 0, expectedRole = null;
      for (const rs of ms.roleSlots) {
        if (idx < cumIdx + rs.count) { expectedRole = rs.role; break; }
        cumIdx += rs.count;
      }
      if (expectedRole) {
        const bad = selPeople.find(p => {
          const m = allMembers.find(x=>x.name===p.name);
          return !m || !m.roles.includes(expectedRole);
        });
        if (bad && !bypassConstraints) {
          alert(`❌ ${bad.name} לא מוגדר כ-"${expectedRole}". הגדר לו את התפקיד דרך מסך "חיילים" או לחץ "ללא אילוצים".`);
          return;
        }
      }
    }
    setAllAssAndSave(prev => {
      const c = JSON.parse(JSON.stringify(prev));
      if (!c[activeDay]) c[activeDay] = {};
      if (!c[activeDay][activeMission]) c[activeDay][activeMission] = {
        commanders: Array(ms.commander).fill(null),
        soldiers: Array(ms.soldiers).fill(null),
      };
      const needed = type==='commanders' ? ms.commander : ms.soldiers;
      while ((c[activeDay][activeMission][type]||[]).length < needed) {
        c[activeDay][activeMission][type].push(null);
      }
      const slots = c[activeDay][activeMission][type];
      let qi = 0;
      for (let i = idx; i < slots.length && qi < selPeople.length; i++) {
        if (!slots[i]) { slots[i] = selPeople[qi++]; }
      }
      return c;
    });
    setSelPeople([]);
  }
  function removePerson(type,idx) {
    setAllAssAndSave(prev=>{const c=JSON.parse(JSON.stringify(prev));if(c[activeDay]&&c[activeDay][activeMission]&&c[activeDay][activeMission][type])c[activeDay][activeMission][type][idx]=null;return c;});
  }
  function removeSwap(type, idx) {
    setAllAssAndSave(prev => {
      const c = JSON.parse(JSON.stringify(prev));
      const slot = c[activeDay]?.[activeMission]?.[type]?.[idx];
      if (slot && slot.replacement) {
        delete slot.replacement;
      }
      return c;

  }
  function setSwap(type, idx, name, platoonKey, atHour, atMinute) {
    setAllAssAndSave(prev => {

  }
  const aftarThisDay = aftarByDay[activeDay] || [];
  const total = allMembers.length;
  const assigned = assignedThisDay.size;
  const visibleMissions = allMissionDefs.filter(m => {
    if (deletedMissions.includes(m.id)) return false;
    if (isMissionHiddenOnDay(activeDay, m.id)) return false;
    return true;
  });

  // ═══ DISPLAY VIEW ═══
  function DisplayView() {
    const f = visibleMissions.filter(m => !m.hideFromDisplay);
    // Support up to 10 display columns
    const cols = Array.from({length:10}, (_,i)=>f.filter(m=>(+m.col||1)===(i+1)));
    // "בבית" column removed from display per user request
    const numCols = cols.filter(c=>c.length>0).length;
    return (
      <div className="main">
        <div id="display-export-area" style={{background:"var(--bg)",padding:8,borderRadius:12}}>
          <div className="display-grid" style={{gridTemplateColumns:`repeat(${numCols||1},1fr)`,zoom:0.80}}>
            <div style={{gridColumn:"1 / -1",display:"grid",placeItems:"stretch",marginBottom:4}}>

                    else if(isAllowBlk) cls+=" blocked";
                    else if(hasRoleMismatch) cls+=" blocked";
                    else if(isAftarBlk) cls+=" aftar";
                    else if(isAftarYesterdayBlk) cls+=" blocked";

  // ═══ CALENDAR VIEW ═══
  function CalendarView() {
    const [selPpl, setSelPpl] = React.useState([]);
    const [startD, setStartD] = React.useState(null);
    const [endD, setEndD] = React.useState(null);
    const [filterRole, setFilterRole] = React.useState("הכל");
    const [manageDay, setManageDay] = React.useState(null); // dayId for inline manage
    const [pplPicker, setPplPicker] = React.useState(null); // {startD, endD} for popup picker

    const monthGroups = React.useMemo(() => {
      const groups = {};
      // Determine month range from reserveSettings (if set), else fallback to April-August
      let startY = null, startM = null, endY = null, endM = null;
      if (reserveSettings.startDate && reserveSettings.endDate) {
        const s = new Date(reserveSettings.startDate);
        const e = new Date(reserveSettings.endDate);
        startY = s.getFullYear(); startM = s.getMonth()+1;
        endY = e.getFullYear(); endM = e.getMonth()+1;
      }
      DAYS.forEach(d => {
        const [y,m] = d.id.split('_').map(Number);
        if (startY !== null) {
          // Show only months within reserve period
          const dKey = y*12 + m;
          const sKey = startY*12 + startM;
          const eKey = endY*12 + endM;
          if (dKey < sKey || dKey > eKey) return;
        } else {
          // Fallback: April-August
          if (m < 4 || m > 8) return;
        }
        const key = `${y}_${String(m).padStart(2,'0')}`;
        if (!groups[key]) groups[key] = [];
        groups[key].push(d);
      });
      return Object.entries(groups);
    }, [reserveSettings]);

    const handleDateClick = (dayId) => {
      if (manageDay === dayId) { setManageDay(null); return; }
      if (!startD || (startD && endD)) {
        setStartD(dayId); setEndD(null);
      } else if (dayId < startD) {
        setEndD(startD); setStartD(dayId);
      } else if (dayId === startD) {
        // clicking same day opens manage panel
        setManageDay(dayId);
      } else {
        setEndD(dayId);
      }
    };

    const isInRange = (dayId) => {
      if (!startD) return false;
      const end = endD || startD;
      return dayId >= startD && dayId <= end;
    };

    const applyLeave = () => {
      if (!startD || selPpl.length === 0) { alert('בחר חיילים וגם תאריך בלוח'); return; }
      const end = endD || startD;
      const startIdx = DAY_IDS.indexOf(startD);
      const endIdx = DAY_IDS.indexOf(end);
      const range = DAY_IDS.slice(startIdx, endIdx + 1);
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        range.forEach(dayId => {
          if (!c[dayId]) c[dayId] = [];
          selPpl.forEach(name => {
            if (!c[dayId].includes(name)) c[dayId].push(name);
          });
        });
        return c;
      });
      setStartD(null); setEndD(null);
      alert(`✓ נוספו ${selPpl.length} חיילים ל-${range.length} ימים`);
    };

    const clearLeave = () => {
      if (!startD) return;
      const end = endD || startD;
      const startIdx = DAY_IDS.indexOf(startD);
      const endIdx = DAY_IDS.indexOf(end);
      const range = DAY_IDS.slice(startIdx, endIdx + 1);
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        range.forEach(dayId => {
          if (!c[dayId]) return;
          if (selPpl.length === 0) c[dayId] = [];
          else c[dayId] = c[dayId].filter(n => !selPpl.includes(n));
        });
        return c;
      });
      setStartD(null); setEndD(null);
    };

    const removeFromDay = (dayId, name) => {
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        if (c[dayId]) c[dayId] = c[dayId].filter(n => n !== name);
        return c;
      });
    };

    const todayId = (() => {
      const n = new Date(); const p = x => String(x).padStart(2,'0');
      return `${n.getFullYear()}_${p(n.getMonth()+1)}_${p(n.getDate())}`;
    })();
    const HEB_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

    const filteredMembers = filterRole === "הכל" ? allMembers : allMembers.filter(m => m.roles.includes(filterRole));

    return (
      <div className="main" style={{maxWidth:1200,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>🏠 לוח יציאות הביתה</div>
        <div style={{fontSize:13,color:"var(--text2)",marginBottom:18,lineHeight:1.6}}>
          <strong>איך זה עובד:</strong> 1) לחץ על תאריך יציאה → 2) לחץ על תאריך חזרה לסמן טווח → 3) לחץ "בחר חיילים לטווח" → 4) בחר חיילים מתוך החלון
        </div>

        {/* Sticky action panel */}
        <div style={{background:"var(--surface)",border:"1.5px solid var(--accent)",borderRadius:14,padding:"14px",marginBottom:20,position:"sticky",top:48,zIndex:50}}>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700}}>חיילים נבחרים ({selPpl.length}):</span>
            {selPpl.length === 0 ? <span style={{fontSize:12,color:"var(--text3)"}}>בחר חיילים מהרשימה למטה</span> :
              selPpl.map(n => {
                const m = allMembers.find(x=>x.name===n);
                return <span key={n} style={{...(m?getPlatoonStyle(m.platoon):{background:"#555",color:"#fff"}),borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700,display:"inline-flex",gap:4,alignItems:"center"}}>
                  {n} <button onClick={()=>setSelPpl(p=>p.filter(x=>x!==n))} style={{background:"rgba(0,0,0,.25)",border:"none",borderRadius:3,color:"inherit",cursor:"pointer",fontSize:10,padding:"0 3px",fontFamily:"Heebo,sans-serif"}}>✕</button>
                </span>;
              })
            }
            {selPpl.length > 0 && <button onClick={()=>setSelPpl([])} style={{background:"none",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text3)",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>נקה הכל</button>}
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700}}>טווח תאריכים:</span>
            {startD && <span style={{background:"var(--accent)",color:"#fff",borderRadius:6,padding:"3px 12px",fontSize:12,fontWeight:700}}>📤 {DAYS.find(d=>d.id===startD)?.date}</span>}
            {endD && <><span style={{fontSize:14,color:"var(--text2)"}}>→</span><span style={{background:"var(--accent)",color:"#fff",borderRadius:6,padding:"3px 12px",fontSize:12,fontWeight:700}}>📥 {DAYS.find(d=>d.id===endD)?.date}</span></>}
            {!startD && <span style={{fontSize:12,color:"var(--text3)"}}>לחץ על תאריך בלוח השנה</span>}
            <button onClick={()=>{setStartD(null);setEndD(null);}} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text2)",padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>נקה טווח</button>
            <button onClick={()=>{
              if(!startD){alert('בחר תאריך בלוח השנה תחילה');return;}
              setPplPicker({startD, endD: endD || startD});
            }} style={{background:"var(--accent)",border:"none",borderRadius:6,color:"#fff",padding:"6px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif",marginRight:"auto"}}>👥 בחר חיילים לטווח</button>
            <button onClick={applyLeave} style={{background:"var(--green)",border:"none",borderRadius:6,color:"#fff",padding:"6px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>✓ הוסף נבחרים</button>
            <button onClick={clearLeave} style={{background:"#ef535033",border:"1px solid #ef5350",borderRadius:6,color:"#ef5350",padding:"6px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>🗑 הסר מהטווח</button>
          </div>
          <div style={{fontSize:11,color:"var(--text2)",marginTop:8,paddingTop:8,borderTop:"1px solid var(--border)",display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
            <span>⏰ שעת יציאה: <strong style={{color:"var(--text)"}}>{aftarSettings.startH}:00</strong></span>
            <span>שעת חזרה: <strong style={{color:"var(--text)"}}>{aftarSettings.endH}:00</strong></span>
            <span style={{marginRight:"auto"}}>לעריכה → הגדרות → יציאה הביתה</span>
          </div>
        </div>

        {/* Calendar */}
        {monthGroups.map(([key, days]) => {
          const [y,m] = key.split('_');
          const monthName = HEB_MONTHS[parseInt(m)-1];
          const firstDay = days[0];
          const blanks = firstDay.dow;
          return (
            <div key={key} className="cal-month">
              <div className="cal-month-title">{monthName} {y}</div>
              <div className="cal-grid">
                {["א'","ב'","ג'","ד'","ה'","ו'","ש'"].map(d=><div key={d} className="cal-head">{d}</div>)}
                {Array(blanks).fill(null).map((_,i)=><div key={"b"+i} className="cal-cell empty"/>)}
                {days.map(d=>{
                  const leaves = aftarByDay[d.id] || [];
                  const isStart = d.id===startD;
                  const isEnd = d.id===endD;
                  const inRng = isInRange(d.id);
                  const isToday = d.id===todayId;
                  const isManage = d.id===manageDay;
                  let cls = "cal-cell";
                  if (isToday) cls += " today";
                  if (leaves.length>0) cls += " has-leave";
                  if (inRng) cls += " in-range";
                  if (isStart) cls += " start";
                  if (isEnd) cls += " end";
                  return (
                    <React.Fragment key={d.id}>
                      <div className={cls} onClick={()=>handleDateClick(d.id)} style={isManage?{borderColor:"var(--orange)",boxShadow:"0 0 0 2px var(--orange)44"}:{}}>
                        <div className="cal-day-num">{d.date.split('/')[0]}</div>
                        {leaves.length>0 && <div className="cal-leave-count">{leaves.length}</div>}
                        {leaves.length>0 && <div className="cal-names">{leaves.slice(0,3).join(", ")}{leaves.length>3?"...":""}</div>}
                        {isManage && <div style={{position:"absolute",bottom:1,left:0,right:0,textAlign:"center",fontSize:7,color:"var(--orange)",fontWeight:700}}>לחץ לסגירה</div>}
                      </div>
                      {isManage && leaves.length > 0 && (
                        <div style={{gridColumn:"1 / -1",background:"var(--surface)",border:"1px solid var(--orange)66",borderRadius:10,padding:"10px 12px",marginBottom:4,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                          <span style={{fontSize:11,fontWeight:700,color:"var(--orange)",marginLeft:6}}>📅 {d.date} — ניהול יציאות:</span>
                          {leaves.map(name => {
                            const member = allMembers.find(x=>x.name===name);
                            return (
                              <span key={name} style={{...(member?getPlatoonStyle(member.platoon):{background:"#555",color:"#fff"}),borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700,display:"inline-flex",gap:4,alignItems:"center"}}>
                                {name}
                                <button onClick={()=>removeFromDay(d.id, name)} style={{background:"rgba(0,0,0,.3)",border:"none",borderRadius:3,color:"inherit",cursor:"pointer",fontSize:10,padding:"0 3px",fontFamily:"Heebo,sans-serif"}}>✕</button>
                              </span>
                            );
                          })}
                          <button onClick={()=>{if(confirm(`למחוק את כל היציאות ביום ${d.date}?`)){setAftarByDayAndSave(prev=>{const c=JSON.parse(JSON.stringify(prev));c[d.id]=[];return c;});setManageDay(null);}}} style={{background:"#ef535022",border:"1px solid #ef5350",borderRadius:6,color:"#ef5350",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif",marginRight:"auto"}}>🗑 נקה יום</button>
                        </div>
                      )}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          );
        })}

        {/* People selector */}
        <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:14,padding:"16px",marginTop:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
            <div style={{fontSize:14,fontWeight:700}}>👥 בחר חיילים:</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginRight:"auto"}}>
              {["הכל",...availableRoles].map(r=>(
                <button key={r} onClick={()=>setFilterRole(r)} style={{background:filterRole===r?"var(--accent)":"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:filterRole===r?"#fff":"var(--text2)",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif",fontWeight:filterRole===r?700:400}}>
                  {r}
                </button>
              ))}
            </div>
            <button onClick={()=>setSelPpl(filteredMembers.map(m=>m.name))} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text2)",padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>בחר הכל</button>
          </div>
          {allMembers.length === 0 ? <div style={{color:"var(--text3)",fontSize:12}}>אין חיילים. הוסף דרך מסך "חיילים"</div> :
            Object.entries(platoons).map(([key,p])=>{
              const members = sortMembersByName(p.members.filter(rawM => filterRole==="הכל" || getMemberRoles(rawM).includes(filterRole)));
              if(members.length===0) return null;
              return (
                <div key={key} style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:p.color,marginBottom:6}}>{p.label}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {members.map(rawM=>{
                      const name = getMemberName(rawM);
                      const roles = getMemberRoles(rawM);
                      const isSel = selPpl.includes(name);
                      const leavesCount = DAY_IDS.filter(d=>(aftarByDay[d]||[]).includes(name)).length;
                      return (
                        <button key={name} className={`chip ${isSel?"selected":""}`} style={getPlatoonStyle(key)}
                          onClick={()=>setSelPpl(prev=>isSel?prev.filter(n=>n!==name):[...prev,name])}>
                          {name}
                          {roles.length>0 && <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:1,marginTop:1}}>
                            {roles.slice(0,2).map(r=><span key={r} className="role-tag">{r}</span>)}
                          </div>}
                          {leavesCount>0 && <span className="chip-sub">{leavesCount} ימי חופש</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })
          }
        </div>
        {/* People picker modal (open after selecting date range) */}
        {pplPicker && (() => {
          const range = (() => {
            const s = pplPicker.startD, e = pplPicker.endD;
            const si = DAY_IDS.indexOf(s), ei = DAY_IDS.indexOf(e);
            return DAY_IDS.slice(Math.min(si,ei), Math.max(si,ei)+1);
          })();
          const rangeLabel = pplPicker.startD === pplPicker.endD
            ? DAYS.find(d=>d.id===pplPicker.startD)?.date
            : `${DAYS.find(d=>d.id===pplPicker.startD)?.date} → ${DAYS.find(d=>d.id===pplPicker.endD)?.date}`;
          const togglePplPick = (name) => {
            setSelPpl(prev => prev.includes(name) ? prev.filter(n=>n!==name) : [...prev, name]);
          };
          const applyAndClose = () => {
            if (selPpl.length === 0) { alert('בחר חיילים'); return; }
            setAftarByDayAndSave(prev => {
              const c = JSON.parse(JSON.stringify(prev));
              range.forEach(dayId => {
                if (!c[dayId]) c[dayId] = [];
                selPpl.forEach(name => { if (!c[dayId].includes(name)) c[dayId].push(name); });
              });
              return c;
            });
            const added = selPpl.length;
            setSelPpl([]); setStartD(null); setEndD(null); setPplPicker(null);
            alert(`✓ נוספו ${added} חיילים ל-${range.length} ימים`);
          };
          return (
            <div onClick={()=>setPplPicker(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",border:"2px solid var(--accent)",borderRadius:16,padding:20,maxWidth:900,width:"100%",maxHeight:"90vh",overflow:"auto",boxShadow:"0 0 40px rgba(79,156,249,0.3)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,borderBottom:"1px solid var(--border)",paddingBottom:10}}>
                  <span style={{fontSize:26}}>🏠</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:18,fontWeight:800}}>בחירת חיילים ליציאה הביתה</div>
                    <div style={{fontSize:12,color:"var(--text2)"}}>📅 {rangeLabel} · {range.length} ימים</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:"var(--accent)"}}>נבחרו: {selPpl.length}</div>
                  <button onClick={()=>setPplPicker(null)} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",padding:"6px 14px",fontFamily:"Heebo,sans-serif",fontSize:13}}>✕ סגור</button>
                  <button onClick={applyAndClose} style={{background:"var(--green)",border:"none",borderRadius:7,color:"#fff",cursor:"pointer",padding:"6px 18px",fontFamily:"Heebo,sans-serif",fontSize:14,fontWeight:800}}>✓ הוסף ({selPpl.length})</button>
                </div>
                {Object.entries(platoons).map(([k,pp])=>pp.members.length===0?null:(
                  <div key={k} style={{marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:700,color:pp.color,marginBottom:6,padding:"4px 10px",background:pp.color+"22",borderRadius:6,display:"inline-block"}}>
                      {pp.label} ({pp.members.filter(m => getMemberStatus(m) !== 'absent').length})
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {sortMembersByName(pp.members).map(rawM=>{
                        const name = getMemberName(rawM);
                        const isSel = selPpl.includes(name);
                        const alreadyInRange = range.some(d => (aftarByDay[d]||[]).includes(name));
                        return (
                          <button key={name} onClick={()=>togglePplPick(name)}
                            style={{...getPlatoonStyle(k),border:isSel?"3px solid #fff":"2px solid transparent",borderRadius:8,padding:"6px 12px",fontFamily:"Heebo,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",position:"relative",opacity:isSel?1:(alreadyInRange?0.6:0.9),boxShadow:isSel?"0 0 8px rgba(255,255,255,0.5)":"none"}}>
                            {name}
                            {isSel && <span style={{position:"absolute",top:-6,right:-6,background:"#fff",color:"#111",borderRadius:"50%",width:16,height:16,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>✓</span>}
                            {alreadyInRange && !isSel && <div style={{fontSize:9,opacity:0.8,marginTop:2}}>חלקית בטווח</div>}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  // ═══ LOGIN ═══
  if (!authed) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div style={{background:"var(--surface)",border:"2px solid var(--accent)",borderRadius:18,padding:"40px 48px",display:"flex",flexDirection:"column",alignItems:"center",gap:18,boxShadow:"0 0 40px rgba(79,156,249,0.2)"}}>
        <div style={{fontSize:32}}>🔐</div>
        <div style={{fontSize:22,fontWeight:800,color:"var(--text)"}}>{APP_TITLE}</div>
        <div style={{fontSize:13,color:"var(--text2)"}}>הכנס סיסמה לגישה</div>
        <input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
          onKeyDown={e=>{if(e.key==='Enter'){if(customPasswords.includes(pwInput)){sessionStorage.setItem('shabzak_auth','1');setAuthed(true);}else setPwError(true);}}}
          placeholder="סיסמה..."
          style={{padding:"10px 16px",borderRadius:9,border:`1.5px solid ${pwError?"#ef5350":"var(--border2)"}`,background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:15,outline:"none",textAlign:"center",width:200,direction:"ltr"}}
          autoFocus/>
        {pwError && <div style={{fontSize:12,color:"#ef5350"}}>סיסמה שגויה ❌</div>}
        <button onClick={()=>{if(customPasswords.includes(pwInput)){sessionStorage.setItem('shabzak_auth','1');setAuthed(true);}else setPwError(true);}}
          style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:9,padding:"10px 32px",fontFamily:"Heebo,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer"}}>
          כניסה
        </button>
        <div style={{fontSize:10,color:"var(--text3)"}}>סיסמה ברירת מחדל: 1234</div>
      </div>
    </div>
  );

  // ═══ SETTINGS VIEW ═══
  function SettingsView() {
    const [settingsTab, setSettingsTab] = useState(pendingMissionEdit ? "missions" : "missions");
    const inp = {display:"block",width:"100%",marginTop:3,padding:"5px 8px",borderRadius:7,border:"1px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:13};
    const btn = (extra={}) => ({background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:12,padding:"4px 10px",...extra});
    const [editId, setEditId] = useState(null);
    const [draft, setDraft] = useState({});
    const [showNewMission, setShowNewMission] = useState(false);
    const [newMissionDraft, setNewMissionDraft] = useState({label:"",icon:"🎯",time:"",startH:8,endH:16,restHours:0,slots_commander:0,slots_soldiers:1,col:1,border:"#7e57c2",roleSlots:[],allowedNames:[]});
    const visibleForSettings = [...MISSION_DEFS, ...customMissions].filter(m => !deletedMissions.includes(m.id));
    const startEdit = (m) => {
      const cur = missionSettings[m.id] || {
        label: m.label, icon: m.icon, time: m.time,
        startH: m.startH, endH: m.endH,
        restHours: 0, slots_commander: m.slots.commander, slots_soldiers: m.slots.soldiers,
        col: m.col || 1, roleSlots: m.roleSlots || [], allowedNames: m.allowedNames || [],
      };
      setEditId(m.id);
      setDraft({...cur, roleSlots: cur.roleSlots || []});
    };
    // Auto-open the requested mission edit (from display screen)
    React.useEffect(() => {
      if (pendingMissionEdit) {
        const m = [...MISSION_DEFS, ...customMissions].find(x => x.id === pendingMissionEdit);
        if (m) {
          setSettingsTab("missions");
          startEdit(m);
          setTimeout(() => {
            const el = document.getElementById('mission-edit-' + pendingMissionEdit);
            if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
          }, 100);
        }
        setPendingMissionEdit(null);
      }
    // eslint-disable-next-line
    }, [pendingMissionEdit]);
    const addNewMission = () => {
      if (!newMissionDraft.label.trim()) { alert("חסר שם משימה"); return; }
      const id = "custom_" + Date.now();
      const newM = {
        id,
        label: newMissionDraft.label, icon: newMissionDraft.icon || "🎯",
        time: newMissionDraft.time,
        slots: { commander: newMissionDraft.slots_commander, soldiers: newMissionDraft.slots_soldiers },
        border: newMissionDraft.border || "#7e57c2",
        col: newMissionDraft.col || 1,
        startH: newMissionDraft.startH, endH: newMissionDraft.endH,
        roleSlots: newMissionDraft.roleSlots || [],
        allowedNames: [],
      };
      setCustomMissions(prev => [...prev, newM]);
      setMissionSettings(prev => ({...prev, [id]: {...newMissionDraft, allowedNames:[]}}));
      // init assignments for this mission
      setAllAssAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        DAY_IDS.forEach(dayId => {
          if (!c[dayId]) c[dayId] = {};
          const totalSol = newMissionDraft.roleSlots && newMissionDraft.roleSlots.length > 0
            ? newMissionDraft.roleSlots.reduce((s,r)=>s+(r.count||0),0)
            : newMissionDraft.slots_soldiers;
          c[dayId][id] = {
            commanders: Array(newMissionDraft.slots_commander).fill(null),
            soldiers: Array(totalSol).fill(null),
          };
        });
        return c;
      });

                        // Cascade: remove role from members and mission roleSlots
                        setPlatoons(prev => {

                              norm.roles = norm.roles.filter(x => x !== r);

                      }}} style={{background:"none",border:"none",color:"#ef5350",cursor:"pointer",fontSize:14,padding:0}} title="מחק">🗑</button>

  // ═══ MORNING PARADE VIEW ═══
  function ParadeView() {
    // ═══ לוגיקה פשוטה ═══
    // 1. חייל נוכח במסדר = חייל שלא משובץ במשימה מסומנת + לא בבית/גימל/חו"ל + לא מ"מ/מפקדת פלוגה
    // 2. חייל לא במסדר = משובץ למשימה שסומנה "לא במסדר בוקר" / בבית / חוזר מהבית / גימל / חו"ל
    // 3. מ"מ + מפקדת פלוגה - מוסתרים לחלוטין מהמסך

    const da = allAss[activeDay] || {};
    const prevDayIdxP = DAY_IDS.indexOf(activeDay) - 1;
    const prevDayIdP = prevDayIdxP >= 0 ? DAY_IDS[prevDayIdxP] : null;
    const daPrev = prevDayIdP ? (allAss[prevDayIdP] || {}) : {};

    // משימה מוחרגת מהמסדר אם:
    // 1. מסומנת ידנית כ"לא במסדר בוקר" (lateWakeMission/excludesFromParade)
    // 2. מתקיימת ביום הנוכחי ומתחילה לפני 09:00 (startH < 9)
    // 3. מתקיימת ביום הקודם ומסתיימת אחרי 20:00 (endH > 20)
    const allMissionsList = [...MISSION_DEFS, ...customMissions];

    const getMissionEffective = (m, dayId) => {
      const ov = (dayMissionOverrides[dayId]||{})[m.id] || {};
      const ms = missionSettings[m.id] || {};
      return {
        startH: ov.startH ?? ms.startH ?? m.startH ?? 0,
        endH: ov.endH ?? ms.endH ?? m.endH ?? 0,
        label: ov.label ?? ms.label ?? m.label,
        lateWake: ov.lateWakeMission ?? ms.lateWakeMission ?? m.lateWakeMission ?? false,
        excludes: ov.excludesFromParade ?? ms.excludesFromParade ?? m.excludesFromParade ?? false,
      };
    };

    // חיילים שמשובצים למשימות שמוחרגות מהמסדר
    const inExcludedMission = new Map(); // name → mission label

    // בדיקת משימות יום נוכחי: startH < 9
    allMissionsList.forEach(m => {
      const eff = getMissionEffective(m, activeDay);
      const isExcluded = eff.lateWake || eff.excludes || eff.startH < 9;
      if (!isExcluded) return;
      const ass = da[m.id]; if (!ass) return;
      [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(p => {
        if (!inExcludedMission.has(p.name)) inExcludedMission.set(p.name, eff.label);
      });
    });

    // בדיקת משימות יום קודם: endH > 20 (מסיימות אחרי 20:00 = עדיין רצות בלילה/בוקר)
    if (prevDayIdP) {
      allMissionsList.forEach(m => {
        const eff = getMissionEffective(m, prevDayIdP);
        const isExcluded = eff.lateWake || eff.excludes || eff.endH > 20;
        if (!isExcluded) return;
        const ass = daPrev[m.id]; if (!ass) return;
        [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(p => {
          if (!inExcludedMission.has(p.name)) inExcludedMission.set(p.name, eff.label + ' (אתמול)');
        });
      });
    }

    // בבית היום / אתמול
    const aftarToday = new Set(aftarByDay[activeDay]||[]);
    const aftarYesterday = new Set(prevDayIdP ? (aftarByDay[prevDayIdP]||[]) : []);
    // גימל היום
    const gimelToday = new Set([...(da["gimel"]?.soldiers||[])].filter(Boolean).map(p=>p.name));

    // אילו חיילים מסתתרים לחלוטין מהמסך (מ"מ / מפקדת פלוגה)
    const isHiddenFromParade = (platoonKey, platoon, roles) => {
      if (platoonKey === 'pluga2') return true;
      if (platoon.label && (platoon.label.includes('מפקדת פלוגה') || platoon.label.includes('מפקדת הפלוגה'))) return true;
      if (roles && roles.some(r => r.includes('מ"מ') || r.includes('מ״מ'))) return true;
      return false;
    };

    const paradeList = [];  // נוכחים במסדר
    const notInParade = []; // לא במסדר (מסיבה כלשהי)

    Object.entries(platoons).forEach(([k,p]) => {
      p.members.forEach(rawM => {
        const name = getMemberName(rawM);
        const roles = getMemberRoles(rawM);
        // הסתרה מוחלטת
        if (isHiddenFromParade(k, p, roles)) return;
        // בדיקות
        const status = getMemberStatus(rawM);
        if (status !== 'active') return; // רק חיילים פעילים
        let reason = null, reasonColor = '#e67e22';
        if (aftarToday.has(name)) { reason = 'בבית'; reasonColor = '#e67e22'; }
        else if (aftarYesterday.has(name)) { reason = 'חוזר מהבית'; reasonColor = '#e67e22'; }
        else if (gimelToday.has(name)) { reason = 'גימלים'; reasonColor = '#ff9800'; }
        else if (inExcludedMission.has(name)) { reason = inExcludedMission.get(name); reasonColor = '#7e57c2'; }
        if (reason) notInParade.push({name, platoonKey:k, reason, reasonColor});
        else paradeList.push({name, platoonKey:k});
      });
    });

    // קיבוץ "לא במסדר" לפי סיבה
    const groupsByReason = {};
    notInParade.forEach(r => {
      if (!groupsByReason[r.reason]) groupsByReason[r.reason] = {color: r.reasonColor, list: []};
      groupsByReason[r.reason].list.push(r);
    });

    const sectionStyle = (color) => ({background:"var(--surface)",border:`2px solid ${color}66`,borderRadius:14,marginBottom:16,overflow:"hidden"});

    return (
      <div className="main" style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>☀️ מסדר בוקר — יום {activeDayObj?.label} {activeDayObj?.date}</div>
        <div style={{fontSize:12,color:"var(--text2)",marginBottom:18,lineHeight:1.5}}>
          רשימה אוטומטית: חייל נמצא במסדר אם הוא לא בבית, לא בגימל, ולא משובץ למשימה שמתקיימת בין 20:00 אתמול ל-09:00 היום. חיילים לא פעילים לא מופיעים כלל.
        </div>

        {/* נוכחים במסדר */}
        <div style={sectionStyle('#34c77b')}>
          <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",background:"linear-gradient(90deg,#34c77b22,transparent)"}}>
            <div style={{fontSize:17,fontWeight:800,color:"#34c77b"}}>✓ נוכחים במסדר בוקר ({paradeList.length})</div>
          </div>
          <div style={{padding:"14px 16px",display:"flex",flexWrap:"wrap",gap:7}}>
            {paradeList.length === 0
              ? <div style={{color:"var(--text3)",fontSize:13}}>אין חיילים במסדר</div>
              : paradeList
                  .sort((a,b)=> getMemberName(a.name).localeCompare(getMemberName(b.name),'he'))
                  .map(r => <div key={r.name} style={{...getPlatoonStyle(r.platoonKey),borderRadius:8,padding:"7px 14px",fontSize:14,fontWeight:700}}>{r.name}</div>)
            }
          </div>
        </div>

        {/* לא במסדר - מקובץ לפי סיבה */}
        {Object.keys(groupsByReason).length > 0 && (
          <div style={{marginTop:18}}>
            <div style={{fontSize:14,fontWeight:800,color:"var(--text2)",marginBottom:10,paddingRight:6}}>📋 לא במסדר בוקר ({notInParade.length})</div>
            {Object.entries(groupsByReason).map(([reason, g]) => (
              <div key={reason} style={sectionStyle(g.color)}>
                <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",background:`linear-gradient(90deg,${g.color}22,transparent)`}}>
                  <div style={{fontSize:14,fontWeight:800,color:g.color}}>{reason} ({g.list.length})</div>
                </div>
                <div style={{padding:"12px 14px",display:"flex",flexWrap:"wrap",gap:6}}>
                  {g.list
                    .sort((a,b)=> a.name.localeCompare(b.name,'he'))
                    .map(r => <div key={r.name} style={{...getPlatoonStyle(r.platoonKey),borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,opacity:0.85}}>{r.name}</div>)
                  }
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ═══ TRACKING VIEW ═══
  function TrackingView() {
    const PLATOON_ORDER = ["cmd1","soldiers1","cmd2","soldiers2","cmd3","soldiers3","pluga","pluga2"];
    const platoonIdx = (pl) => { const i = PLATOON_ORDER.indexOf(pl); return i>=0?i:99; };
    return (
      <div className="main" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>⚖️ טבלת צדק</div>
        {(() => {
          const counts = {};
          allMembers.forEach(m => { counts[m.name] = { count: 0, platoon: m.platoon }; });
          DAY_IDS.forEach(dayId => {
            (aftarByDay[dayId]||[]).forEach(name => {
              if (counts[name] !== undefined) counts[name].count++;
            });
          });
          const sorted = Object.entries(counts).filter(([,v])=>v.count>0).sort((a,b) => { const pi = platoonIdx(a[1].platoon) - platoonIdx(b[1].platoon); return pi !== 0 ? pi : b[1].count - a[1].count; });

            <div style={{background:"var(--surface)",border:"1.5px solid #e67e2244",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🏠</span>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>מעקב יציאות הביתה</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>סה"כ ימים</div>
              </div>
              <div style={{padding:"10px 12px"}}>
                {sorted.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>אין יציאות עדיין</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {sorted.map(([name,{count,platoon}]) => (
                        <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                          <span>{name}</span>
                          <span style={{background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"1px 6px",fontSize:11,fontWeight:800}}>{count}</span>
                        </div>
                      ))}
                    </div>
                }
              </div>
            </div>
          );
        })()}
        {(() => {
          const matbahIds = ["matbah_boker","matbah_tzaharayim"];
          const counts = {};
          allMembers.forEach(m => { counts[m.name] = { count: 0, platoon: m.platoon }; });
          DAY_IDS.forEach(dayId => {
            const da = allAss[dayId] || {};
            matbahIds.forEach(mid => {
              const ass = da[mid]; if (!ass) return;
              [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(p => {
                if (counts[p.name] !== undefined) counts[p.name].count += 0.5;
              });
            });
          });
          const sorted = Object.entries(counts).filter(([,v])=>v.count>0).sort((a,b) => { const pi = platoonIdx(a[1].platoon) - platoonIdx(b[1].platoon); return pi !== 0 ? pi : b[1].count - a[1].count; });
          return (
            <div style={{background:"var(--surface)",border:"1.5px solid #ff980044",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🍳</span>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>מעקב תורנות מטבח</div>
              </div>
              <div style={{padding:"10px 12px"}}>
                {sorted.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>אין תורנויות עדיין</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {sorted.map(([name,{count,platoon}]) => (
                        <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                          <span>{name}</span>

                        </div>
                      ))}
                    </div>
                }
              </div>
            </div>
