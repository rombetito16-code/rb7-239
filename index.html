                    const isAss=assignedThisDay.has(name), isSel=selPeople.some(p=>p.name===name);
                    const allowedNames = effMission?.allowedNames;
                    const isAllowBlk = allowedNames && allowedNames.length>0 && !allowedNames.includes(name);
                    const isMissionBlocked = memberBlocked.includes(effMission?.id);
                    const isRestBlk=blocked.has(name);
                    const AFTAR_EFFECTIVE_START = {"philbox": 14, "hetz4": 14};
                    const missionEffectiveStart = effMission ? (AFTAR_EFFECTIVE_START[effMission.id] ?? effMission.startH) : 0;
                    const isAftarBlk=aftarThisDay.includes(name) && missionEffectiveStart >= aftarSettings.startH;
                    const ti2=DAY_IDS.indexOf(activeDay);
                    const prevAftar = ti2>0 ? (aftarByDay[DAY_IDS[ti2-1]]||[]) : [];
                    const isAftarYesterdayBlk = prevAftar.includes(name) && effMission && effMission.startH < aftarSettings.endH && effMission.id!=="philbox" && effMission.id!=="hetz4";
                    const isGimelBlk=gimelThisDay.has(name) && effMission?.id!=="gimel";
                    const isMaatzar = effMission?.id==="maatzar";
                    // Role match check (STRICT): roleSlots missions require matching role
                    const missionRoles = effMission?.roleSlots && effMission.roleSlots.length > 0 ? effMission.roleSlots.map(rs=>rs.role) : null;
                    const hasRoleMismatch = missionRoles && !missionRoles.some(r => roles.includes(r));
                    const isBlk=!bypassConstraints&&(isStatusBlk||(!isMaatzar&&(isAllowBlk||isMissionBlocked||isAftarBlk||isAftarYesterdayBlk||isGimelBlk||hasRoleMismatch)));
                    let cls="chip";
                    if(isSel) cls+=" selected";
                    else if(isStatusBlk) cls+=" blocked";
                    else if(isMissionBlocked) cls+=" blocked";
                    else if(isAllowBlk) cls+=" blocked";
                    else if(hasRoleMismatch) cls+=" blocked";
                    else if(isAftarBlk) cls+=" aftar";
                    else if(isAftarYesterdayBlk) cls+=" blocked";
                    else if(isGimelBlk) cls+=" blocked";
                    else if(isAss) cls+=" assigned";
                    else if(isRestBlk) cls+=" resting";
                    return (
                      <button key={name} className={cls} style={{...getPlatoonStyle(key), ...(isStatusBlk?{outline:`2px solid ${statusInfo.color}`,outlineOffset:-2}:{})}}
                        title={isStatusBlk?statusInfo.label:isBlk?(isMissionBlocked?"חסום מהמשימה (הגדרת חייל)":hasRoleMismatch?"אין תפקיד מתאים":isAftarBlk?"בבית":isAftarYesterdayBlk?"חזר היום מהבית":isGimelBlk?"בגימל":blockedReasons[name]||"לא מורשה"):isRestBlk?`${blockedReasons[name]||'במנוחה'} - לחץ לאישור`:""}
                        onClick={()=>{
                          if(isBlk && !bypassConstraints) return;
                          // If in rest period - show custom modal for confirmation
                          if(isRestBlk && !isSel && !bypassConstraints) {
                            setRestConfirm({
                              name,
                              reason: blockedReasons[name] || 'במנוחה לאחר משימה',
                              onConfirm: () => setSelPeople(prev=>[...prev,{name,platoon:key}])
                            });
                            return;
                          }
                          if(isSel) setSelPeople(prev=>prev.filter(p=>p.name!==name));
                          else setSelPeople(prev=>[...prev,{name,platoon:key}]);
                        }}>
                        {name}
                        {roles.length>0 && <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center"}}>
                          {roles.slice(0,3).map(r=><span key={r} className="role-tag">{r}</span>)}
                        </div>}
                        {isSel&&<span className="chip-badge" style={{background:"#fff",color:"#111"}}>{selPeople.findIndex(p=>p.name===name)+1}</span>}
                        {!isSel&&isStatusBlk&&<span className="chip-sub" style={{color:statusInfo.color,fontWeight:700}}>{statusInfo.label}</span>}
                        {!isSel&&!isStatusBlk&&isMissionBlocked&&<span className="chip-sub">חסום למשימה זו</span>}
                        {!isSel&&!isStatusBlk&&hasRoleMismatch&&<span className="chip-sub">אין תפקיד מתאים</span>}
                        {!isSel&&!isStatusBlk&&isRestBlk&&<span className="chip-sub" style={{color:"#ffcc80"}}>⚠ במנוחה</span>}
                        {!isSel&&!isStatusBlk&&isAftarBlk&&<span className="chip-sub">בבית</span>}
                        {!isSel&&!isStatusBlk&&isGimelBlk&&<span className="chip-sub">בגימל</span>}
                        {!isSel&&!isStatusBlk&&!isRestBlk&&!isAftarBlk&&!isGimelBlk&&!isMissionBlocked&&!hasRoleMismatch&&personMissions[name]&&personMissions[name].length>0&&<span className="chip-sub">{personMissions[name].join(" | ")}</span>}
                        {!isSel&&isAss&&!isBlk&&<span className="chip-badge" style={{background:"#26c6da",color:"#000"}}>✓</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ═══ CALENDAR VIEW ═══
  function CalendarView() {
    const [selPpl, setSelPpl] = React.useState([]);
    const [startD, setStartD] = React.useState(null);
    const [endD, setEndD] = React.useState(null);
    const [filterRole, setFilterRole] = React.useState("הכל");
    const [manageDay, setManageDay] = React.useState(null); // dayId for inline manage
    const [pplPicker, setPplPicker] = React.useState(null); // {startD, endD} for popup picker

    const monthGroups = React.useMemo(() => {
      const groups = {};
      // Determine month range from reserveSettings (if set), else fallback to April-August
      let startY = null, startM = null, endY = null, endM = null;
      if (reserveSettings.startDate && reserveSettings.endDate) {
        const s = new Date(reserveSettings.startDate);
        const e = new Date(reserveSettings.endDate);
        startY = s.getFullYear(); startM = s.getMonth()+1;
        endY = e.getFullYear(); endM = e.getMonth()+1;
      }
      DAYS.forEach(d => {
        const [y,m] = d.id.split('_').map(Number);
        if (startY !== null) {
          // Show only months within reserve period
          const dKey = y*12 + m;
          const sKey = startY*12 + startM;
          const eKey = endY*12 + endM;
          if (dKey < sKey || dKey > eKey) return;
        } else {
          // Fallback: April-August
          if (m < 4 || m > 8) return;
        }
        const key = `${y}_${String(m).padStart(2,'0')}`;
        if (!groups[key]) groups[key] = [];
        groups[key].push(d);
      });
      return Object.entries(groups);
    }, [reserveSettings]);

    const handleDateClick = (dayId) => {
      if (manageDay === dayId) { setManageDay(null); return; }
      if (!startD || (startD && endD)) {
        setStartD(dayId); setEndD(null);
      } else if (dayId < startD) {
        setEndD(startD); setStartD(dayId);
      } else if (dayId === startD) {
        // clicking same day opens manage panel
        setManageDay(dayId);
      } else {
        setEndD(dayId);
      }
    };

    const isInRange = (dayId) => {
      if (!startD) return false;
      const end = endD || startD;
      return dayId >= startD && dayId <= end;
    };

    const applyLeave = () => {
      if (!startD || selPpl.length === 0) { alert('בחר חיילים וגם תאריך בלוח'); return; }
      const end = endD || startD;
      const startIdx = DAY_IDS.indexOf(startD);
      const endIdx = DAY_IDS.indexOf(end);
      const range = DAY_IDS.slice(startIdx, endIdx + 1);
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        range.forEach(dayId => {
          if (!c[dayId]) c[dayId] = [];
          selPpl.forEach(name => {
            if (!c[dayId].includes(name)) c[dayId].push(name);
          });
        });
        return c;
      });
      setStartD(null); setEndD(null);
      alert(`✓ נוספו ${selPpl.length} חיילים ל-${range.length} ימים`);
    };

    const clearLeave = () => {
      if (!startD) return;
      const end = endD || startD;
      const startIdx = DAY_IDS.indexOf(startD);
      const endIdx = DAY_IDS.indexOf(end);
      const range = DAY_IDS.slice(startIdx, endIdx + 1);
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        range.forEach(dayId => {
          if (!c[dayId]) return;
          if (selPpl.length === 0) c[dayId] = [];
          else c[dayId] = c[dayId].filter(n => !selPpl.includes(n));
        });
        return c;
      });
      setStartD(null); setEndD(null);
    };

    const removeFromDay = (dayId, name) => {
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        if (c[dayId]) c[dayId] = c[dayId].filter(n => n !== name);
        return c;
      });
    };

    const todayId = (() => {
      const n = new Date(); const p = x => String(x).padStart(2,'0');
      return `${n.getFullYear()}_${p(n.getMonth()+1)}_${p(n.getDate())}`;
    })();
    const HEB_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

    const filteredMembers = filterRole === "הכל" ? allMembers : allMembers.filter(m => m.roles.includes(filterRole));

    return (
      <div className="main" style={{maxWidth:1200,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>🏠 לוח יציאות הביתה</div>
        <div style={{fontSize:13,color:"var(--text2)",marginBottom:18,lineHeight:1.6}}>
          <strong>איך זה עובד:</strong> 1) לחץ על תאריך יציאה → 2) לחץ על תאריך חזרה לסמן טווח → 3) לחץ "בחר חיילים לטווח" → 4) בחר חיילים מתוך החלון
        </div>

        {/* Sticky action panel */}
        <div style={{background:"var(--surface)",border:"1.5px solid var(--accent)",borderRadius:14,padding:"14px",marginBottom:20,position:"sticky",top:48,zIndex:50}}>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700}}>חיילים נבחרים ({selPpl.length}):</span>
            {selPpl.length === 0 ? <span style={{fontSize:12,color:"var(--text3)"}}>בחר חיילים מהרשימה למטה</span> :
              selPpl.map(n => {
                const m = allMembers.find(x=>x.name===n);
                return <span key={n} style={{...(m?getPlatoonStyle(m.platoon):{background:"#555",color:"#fff"}),borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700,display:"inline-flex",gap:4,alignItems:"center"}}>
                  {n} <button onClick={()=>setSelPpl(p=>p.filter(x=>x!==n))} style={{background:"rgba(0,0,0,.25)",border:"none",borderRadius:3,color:"inherit",cursor:"pointer",fontSize:10,padding:"0 3px",fontFamily:"Heebo,sans-serif"}}>✕</button>
                </span>;
              })
            }
            {selPpl.length > 0 && <button onClick={()=>setSelPpl([])} style={{background:"none",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text3)",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>נקה הכל</button>}
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700}}>טווח תאריכים:</span>
            {startD && <span style={{background:"var(--accent)",color:"#fff",borderRadius:6,padding:"3px 12px",fontSize:12,fontWeight:700}}>📤 {DAYS.find(d=>d.id===startD)?.date}</span>}
            {endD && <><span style={{fontSize:14,color:"var(--text2)"}}>→</span><span style={{background:"var(--accent)",color:"#fff",borderRadius:6,padding:"3px 12px",fontSize:12,fontWeight:700}}>📥 {DAYS.find(d=>d.id===endD)?.date}</span></>}
            {!startD && <span style={{fontSize:12,color:"var(--text3)"}}>לחץ על תאריך בלוח השנה</span>}
            <button onClick={()=>{setStartD(null);setEndD(null);}} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text2)",padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>נקה טווח</button>
            <button onClick={()=>{
              if(!startD){alert('בחר תאריך בלוח השנה תחילה');return;}
              setPplPicker({startD, endD: endD || startD});
            }} style={{background:"var(--accent)",border:"none",borderRadius:6,color:"#fff",padding:"6px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif",marginRight:"auto"}}>👥 בחר חיילים לטווח</button>
            <button onClick={applyLeave} style={{background:"var(--green)",border:"none",borderRadius:6,color:"#fff",padding:"6px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>✓ הוסף נבחרים</button>
            <button onClick={clearLeave} style={{background:"#ef535033",border:"1px solid #ef5350",borderRadius:6,color:"#ef5350",padding:"6px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>🗑 הסר מהטווח</button>
          </div>
          <div style={{fontSize:11,color:"var(--text2)",marginTop:8,paddingTop:8,borderTop:"1px solid var(--border)",display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
            <span>⏰ שעת יציאה: <strong style={{color:"var(--text)"}}>{aftarSettings.startH}:00</strong></span>
            <span>שעת חזרה: <strong style={{color:"var(--text)"}}>{aftarSettings.endH}:00</strong></span>
            <span style={{marginRight:"auto"}}>לעריכה → הגדרות → יציאה הביתה</span>
          </div>
        </div>

        {/* Calendar */}
        {monthGroups.map(([key, days]) => {
          const [y,m] = key.split('_');
          const monthName = HEB_MONTHS[parseInt(m)-1];
          const firstDay = days[0];
          const blanks = firstDay.dow;
          return (
            <div key={key} className="cal-month">
              <div className="cal-month-title">{monthName} {y}</div>
              <div className="cal-grid">
                {["א'","ב'","ג'","ד'","ה'","ו'","ש'"].map(d=><div key={d} className="cal-head">{d}</div>)}
                {Array(blanks).fill(null).map((_,i)=><div key={"b"+i} className="cal-cell empty"/>)}
                {days.map(d=>{
                  const leaves = aftarByDay[d.id] || [];
                  const isStart = d.id===startD;
                  const isEnd = d.id===endD;
                  const inRng = isInRange(d.id);
                  const isToday = d.id===todayId;
                  const isManage = d.id===manageDay;
                  let cls = "cal-cell";
                  if (isToday) cls += " today";
                  if (leaves.length>0) cls += " has-leave";
                  if (inRng) cls += " in-range";
                  if (isStart) cls += " start";
                  if (isEnd) cls += " end";
                  return (
                    <React.Fragment key={d.id}>
                      <div className={cls} onClick={()=>handleDateClick(d.id)} style={isManage?{borderColor:"var(--orange)",boxShadow:"0 0 0 2px var(--orange)44"}:{}}>
                        <div className="cal-day-num">{d.date.split('/')[0]}</div>
                        {leaves.length>0 && <div className="cal-leave-count">{leaves.length}</div>}
                        {leaves.length>0 && <div className="cal-names">{leaves.slice(0,3).join(", ")}{leaves.length>3?"...":""}</div>}
                        {isManage && <div style={{position:"absolute",bottom:1,left:0,right:0,textAlign:"center",fontSize:7,color:"var(--orange)",fontWeight:700}}>לחץ לסגירה</div>}
                      </div>
                      {isManage && leaves.length > 0 && (
                        <div style={{gridColumn:"1 / -1",background:"var(--surface)",border:"1px solid var(--orange)66",borderRadius:10,padding:"10px 12px",marginBottom:4,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                          <span style={{fontSize:11,fontWeight:700,color:"var(--orange)",marginLeft:6}}>📅 {d.date} — ניהול יציאות:</span>
                          {leaves.map(name => {
                            const member = allMembers.find(x=>x.name===name);
                            return (
                              <span key={name} style={{...(member?getPlatoonStyle(member.platoon):{background:"#555",color:"#fff"}),borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700,display:"inline-flex",gap:4,alignItems:"center"}}>
                                {name}
                                <button onClick={()=>removeFromDay(d.id, name)} style={{background:"rgba(0,0,0,.3)",border:"none",borderRadius:3,color:"inherit",cursor:"pointer",fontSize:10,padding:"0 3px",fontFamily:"Heebo,sans-serif"}}>✕</button>
                              </span>
                            );
                          })}
                          <button onClick={()=>{if(confirm(`למחוק את כל היציאות ביום ${d.date}?`)){setAftarByDayAndSave(prev=>{const c=JSON.parse(JSON.stringify(prev));c[d.id]=[];return c;});setManageDay(null);}}} style={{background:"#ef535022",border:"1px solid #ef5350",borderRadius:6,color:"#ef5350",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif",marginRight:"auto"}}>🗑 נקה יום</button>
                        </div>
                      )}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          );
        })}

        {/* People selector */}
        <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:14,padding:"16px",marginTop:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
            <div style={{fontSize:14,fontWeight:700}}>👥 בחר חיילים:</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginRight:"auto"}}>
              {["הכל",...availableRoles].map(r=>(
                <button key={r} onClick={()=>setFilterRole(r)} style={{background:filterRole===r?"var(--accent)":"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:filterRole===r?"#fff":"var(--text2)",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif",fontWeight:filterRole===r?700:400}}>
                  {r}
                </button>
              ))}
            </div>
            <button onClick={()=>setSelPpl(filteredMembers.map(m=>m.name))} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text2)",padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>בחר הכל</button>
          </div>
          {allMembers.length === 0 ? <div style={{color:"var(--text3)",fontSize:12}}>אין חיילים. הוסף דרך מסך "חיילים"</div> :
            Object.entries(platoons).map(([key,p])=>{
              const members = sortMembersByName(p.members.filter(rawM => filterRole==="הכל" || getMemberRoles(rawM).includes(filterRole)));
              if(members.length===0) return null;
              return (
                <div key={key} style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:p.color,marginBottom:6}}>{p.label}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {members.map(rawM=>{
                      const name = getMemberName(rawM);
                      const roles = getMemberRoles(rawM);
                      const isSel = selPpl.includes(name);
                      const leavesCount = DAY_IDS.filter(d=>(aftarByDay[d]||[]).includes(name)).length;
                      return (
                        <button key={name} className={`chip ${isSel?"selected":""}`} style={getPlatoonStyle(key)}
                          onClick={()=>setSelPpl(prev=>isSel?prev.filter(n=>n!==name):[...prev,name])}>
                          {name}
                          {roles.length>0 && <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:1,marginTop:1}}>
                            {roles.slice(0,2).map(r=><span key={r} className="role-tag">{r}</span>)}
                          </div>}
                          {leavesCount>0 && <span className="chip-sub">{leavesCount} ימי חופש</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })
          }
        </div>
        {/* People picker modal (open after selecting date range) */}
        {pplPicker && (() => {
          const range = (() => {
            const s = pplPicker.startD, e = pplPicker.endD;
            const si = DAY_IDS.indexOf(s), ei = DAY_IDS.indexOf(e);
            return DAY_IDS.slice(Math.min(si,ei), Math.max(si,ei)+1);
          })();
          const rangeLabel = pplPicker.startD === pplPicker.endD
            ? DAYS.find(d=>d.id===pplPicker.startD)?.date
            : `${DAYS.find(d=>d.id===pplPicker.startD)?.date} → ${DAYS.find(d=>d.id===pplPicker.endD)?.date}`;
          const togglePplPick = (name) => {
            setSelPpl(prev => prev.includes(name) ? prev.filter(n=>n!==name) : [...prev, name]);
          };
          const applyAndClose = () => {
            if (selPpl.length === 0) { alert('בחר חיילים'); return; }
            setAftarByDayAndSave(prev => {
              const c = JSON.parse(JSON.stringify(prev));
              range.forEach(dayId => {
                if (!c[dayId]) c[dayId] = [];
                selPpl.forEach(name => { if (!c[dayId].includes(name)) c[dayId].push(name); });
              });
              return c;
            });
            const added = selPpl.length;
            setSelPpl([]); setStartD(null); setEndD(null); setPplPicker(null);
            alert(`✓ נוספו ${added} חיילים ל-${range.length} ימים`);
          };
          return (
            <div onClick={()=>setPplPicker(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
              <div onClick={e=>e.stopPropagation()} style={{background:"var(--surface)",border:"2px solid var(--accent)",borderRadius:16,padding:20,maxWidth:900,width:"100%",maxHeight:"90vh",overflow:"auto",boxShadow:"0 0 40px rgba(79,156,249,0.3)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,borderBottom:"1px solid var(--border)",paddingBottom:10}}>
                  <span style={{fontSize:26}}>🏠</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:18,fontWeight:800}}>בחירת חיילים ליציאה הביתה</div>
                    <div style={{fontSize:12,color:"var(--text2)"}}>📅 {rangeLabel} · {range.length} ימים</div>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,color:"var(--accent)"}}>נבחרו: {selPpl.length}</div>
                  <button onClick={()=>setPplPicker(null)} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",padding:"6px 14px",fontFamily:"Heebo,sans-serif",fontSize:13}}>✕ סגור</button>
                  <button onClick={applyAndClose} style={{background:"var(--green)",border:"none",borderRadius:7,color:"#fff",cursor:"pointer",padding:"6px 18px",fontFamily:"Heebo,sans-serif",fontSize:14,fontWeight:800}}>✓ הוסף ({selPpl.length})</button>
                </div>
                {Object.entries(platoons).map(([k,pp])=>pp.members.length===0?null:(
                  <div key={k} style={{marginBottom:12}}>
                    <div style={{fontSize:13,fontWeight:700,color:pp.color,marginBottom:6,padding:"4px 10px",background:pp.color+"22",borderRadius:6,display:"inline-block"}}>
                      {pp.label} ({pp.members.length})
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {sortMembersByName(pp.members).map(rawM=>{
                        const name = getMemberName(rawM);
                        const isSel = selPpl.includes(name);
                        const alreadyInRange = range.some(d => (aftarByDay[d]||[]).includes(name));
                        return (
                          <button key={name} onClick={()=>togglePplPick(name)}
                            style={{...getPlatoonStyle(k),border:isSel?"3px solid #fff":"2px solid transparent",borderRadius:8,padding:"6px 12px",fontFamily:"Heebo,sans-serif",fontSize:13,fontWeight:700,cursor:"pointer",position:"relative",opacity:isSel?1:(alreadyInRange?0.6:0.9),boxShadow:isSel?"0 0 8px rgba(255,255,255,0.5)":"none"}}>
                            {name}
                            {isSel && <span style={{position:"absolute",top:-6,right:-6,background:"#fff",color:"#111",borderRadius:"50%",width:16,height:16,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>✓</span>}
                            {alreadyInRange && !isSel && <div style={{fontSize:9,opacity:0.8,marginTop:2}}>חלקית בטווח</div>}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  // ═══ LOGIN ═══
  if (!authed) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div style={{background:"var(--surface)",border:"2px solid var(--accent)",borderRadius:18,padding:"40px 48px",display:"flex",flexDirection:"column",alignItems:"center",gap:18,boxShadow:"0 0 40px rgba(79,156,249,0.2)"}}>
        <div style={{fontSize:32}}>🔐</div>
        <div style={{fontSize:22,fontWeight:800,color:"var(--text)"}}>{APP_TITLE}</div>
        <div style={{fontSize:13,color:"var(--text2)"}}>הכנס סיסמה לגישה</div>
        <input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
          onKeyDown={e=>{if(e.key==='Enter'){if(customPasswords.includes(pwInput)){sessionStorage.setItem('shabzak_auth','1');setAuthed(true);}else setPwError(true);}}}
          placeholder="סיסמה..."
          style={{padding:"10px 16px",borderRadius:9,border:`1.5px solid ${pwError?"#ef5350":"var(--border2)"}`,background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:15,outline:"none",textAlign:"center",width:200,direction:"ltr"}}
          autoFocus/>
        {pwError && <div style={{fontSize:12,color:"#ef5350"}}>סיסמה שגויה ❌</div>}
        <button onClick={()=>{if(customPasswords.includes(pwInput)){sessionStorage.setItem('shabzak_auth','1');setAuthed(true);}else setPwError(true);}}
          style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:9,padding:"10px 32px",fontFamily:"Heebo,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer"}}>
          כניסה
        </button>
        <div style={{fontSize:10,color:"var(--text3)"}}>סיסמה ברירת מחדל: 1234</div>
      </div>
    </div>
  );

  // ═══ SETTINGS VIEW ═══
  function SettingsView() {
    const [settingsTab, setSettingsTab] = useState(pendingMissionEdit ? "missions" : "missions");
    const inp = {display:"block",width:"100%",marginTop:3,padding:"5px 8px",borderRadius:7,border:"1px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:13};
    const btn = (extra={}) => ({background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:12,padding:"4px 10px",...extra});
    const [editId, setEditId] = useState(null);
    const [draft, setDraft] = useState({});
    const [showNewMission, setShowNewMission] = useState(false);
    const [newMissionDraft, setNewMissionDraft] = useState({label:"",icon:"🎯",time:"",startH:8,endH:16,restHours:0,slots_commander:0,slots_soldiers:1,col:1,border:"#7e57c2",roleSlots:[],allowedNames:[]});
    const visibleForSettings = [...MISSION_DEFS, ...customMissions].filter(m => !deletedMissions.includes(m.id));
    const startEdit = (m) => {
      const cur = missionSettings[m.id] || {
        label: m.label, icon: m.icon, time: m.time,
        startH: m.startH, endH: m.endH,
        restHours: 0, slots_commander: m.slots.commander, slots_soldiers: m.slots.soldiers,
        col: m.col || 1, roleSlots: m.roleSlots || [], allowedNames: m.allowedNames || [],
      };
      setEditId(m.id);
      setDraft({...cur, roleSlots: cur.roleSlots || []});
    };
    // Auto-open the requested mission edit (from display screen)
    React.useEffect(() => {
      if (pendingMissionEdit) {
        const m = [...MISSION_DEFS, ...customMissions].find(x => x.id === pendingMissionEdit);
        if (m) {
          setSettingsTab("missions");
          startEdit(m);
          setTimeout(() => {
            const el = document.getElementById('mission-edit-' + pendingMissionEdit);
            if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
          }, 100);
        }
        setPendingMissionEdit(null);
      }
    // eslint-disable-next-line
    }, [pendingMissionEdit]);
    const addNewMission = () => {
      if (!newMissionDraft.label.trim()) { alert("חסר שם משימה"); return; }
      const id = "custom_" + Date.now();
      const newM = {
        id,
        label: newMissionDraft.label, icon: newMissionDraft.icon || "🎯",
        time: newMissionDraft.time,
        slots: { commander: newMissionDraft.slots_commander, soldiers: newMissionDraft.slots_soldiers },
        border: newMissionDraft.border || "#7e57c2",
        col: newMissionDraft.col || 1,
        startH: newMissionDraft.startH, endH: newMissionDraft.endH,
        roleSlots: newMissionDraft.roleSlots || [],
        allowedNames: [],
      };
      setCustomMissions(prev => [...prev, newM]);
      setMissionSettings(prev => ({...prev, [id]: {...newMissionDraft, allowedNames:[]}}));
      // init assignments for this mission
      setAllAssAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        DAY_IDS.forEach(dayId => {
          if (!c[dayId]) c[dayId] = {};
          const totalSol = newMissionDraft.roleSlots && newMissionDraft.roleSlots.length > 0
            ? newMissionDraft.roleSlots.reduce((s,r)=>s+(r.count||0),0)
            : newMissionDraft.slots_soldiers;
          c[dayId][id] = {
            commanders: Array(newMissionDraft.slots_commander).fill(null),
            soldiers: Array(totalSol).fill(null),
          };
        });
        return c;
      });
      setNewMissionDraft({label:"",icon:"🎯",time:"",startH:8,endH:16,restHours:0,slots_commander:0,slots_soldiers:1,col:1,border:"#7e57c2",roleSlots:[],allowedNames:[]});
      setShowNewMission(false);
    };
    const saveEdit = () => {
      const prev_s = missionSettings[editId];
      const updated = {...missionSettings,[editId]:{...draft}};
      setMissionSettings(updated);
      if (draft.slots_commander !== prev_s?.slots_commander || draft.slots_soldiers !== prev_s?.slots_soldiers) {
        setAllAssAndSave(prev => {
          const c = JSON.parse(JSON.stringify(prev));
          DAY_IDS.forEach(dayId => {
            if (!c[dayId] || !c[dayId][editId]) return;
            const cur = c[dayId][editId];
            const newCmd = draft.slots_commander || 0;
            const newSol = draft.slots_soldiers || 0;
            const resizeArr = (arr, size) => {
              const a = Array(size).fill(null);
              (arr||[]).forEach((v,i) => { if(i<size) a[i]=v; });
              return a;
            };
            c[dayId][editId] = {
              commanders: resizeArr(cur.commanders, newCmd),
              soldiers: resizeArr(cur.soldiers, newSol),
            };
          });
          return c;
        });
      }
      setEditId(null);
    };
    const tabStyle = (t) => ({padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:13,fontWeight:settingsTab===t?700:400,background:settingsTab===t?"var(--accent)":"var(--surface2)",color:settingsTab===t?"#fff":"var(--text2)"});
    return (
      <div className="main" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          <button style={tabStyle("missions")} onClick={()=>setSettingsTab("missions")}>⚙️ משימות</button>
          <button style={tabStyle("aftar")} onClick={()=>setSettingsTab("aftar")}>🏠 יציאה הביתה</button>
          <button style={tabStyle("reserve")} onClick={()=>setSettingsTab("reserve")}>📅 תקופת מילואים</button>
          <button style={tabStyle("roles")} onClick={()=>setSettingsTab("roles")}>🎖️ תפקידים</button>
          <button style={tabStyle("rules")} onClick={()=>setSettingsTab("rules")}>📜 חוקים</button>
          <button style={tabStyle("password")} onClick={()=>setSettingsTab("password")}>🔐 סיסמה</button>
        </div>
        {settingsTab==="missions" && (
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{fontSize:16,fontWeight:800}}>⚙️ הגדרות משימות</div>
              <button onClick={()=>setShowNewMission(p=>!p)} style={btn({background:"var(--green)",color:"#fff",fontWeight:700,padding:"6px 14px",marginRight:"auto"})}>
                {showNewMission?"✕ ביטול":"+ משימה חדשה"}
              </button>
            </div>
            <div style={{fontSize:11,color:"var(--text2)",marginBottom:14}}>אפשר לערוך כל פרט: שם, אייקון, שעות, מספר חיילים, תפקידים נדרשים ועמודת תצוגה</div>
            {showNewMission && (
              <div style={{background:"var(--surface)",border:"2px solid var(--green)",borderRadius:12,padding:"14px",marginBottom:14}}>
                <div style={{fontSize:14,fontWeight:800,color:"var(--green)",marginBottom:10}}>➕ יצירת משימה חדשה</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:7}}>
                  <label style={{fontSize:11,color:"var(--text2)"}}>שם משימה<input style={inp} value={newMissionDraft.label} onChange={e=>setNewMissionDraft(d=>({...d,label:e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>אייקון<input style={inp} value={newMissionDraft.icon} onChange={e=>setNewMissionDraft(d=>({...d,icon:e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>שעות תצוגה<input style={inp} placeholder="למשל: 8:00-14:00" value={newMissionDraft.time} onChange={e=>setNewMissionDraft(d=>({...d,time:e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>שעת התחלה<input type="number" min={0} max={30} style={inp} value={newMissionDraft.startH} onChange={e=>setNewMissionDraft(d=>({...d,startH:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>שעת סיום<input type="number" min={0} max={30} style={inp} value={newMissionDraft.endH} onChange={e=>setNewMissionDraft(d=>({...d,endH:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>מנוחה (שעות)<input type="number" min={0} max={24} style={inp} value={newMissionDraft.restHours} onChange={e=>setNewMissionDraft(d=>({...d,restHours:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>מפקדים<input type="number" min={0} max={10} style={inp} value={newMissionDraft.slots_commander} onChange={e=>setNewMissionDraft(d=>({...d,slots_commander:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>חיילים<input type="number" min={0} max={20} style={inp} value={newMissionDraft.slots_soldiers} onChange={e=>setNewMissionDraft(d=>({...d,slots_soldiers:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>עמודה (1-6)<input type="number" min={1} max={6} style={inp} value={newMissionDraft.col} onChange={e=>setNewMissionDraft(d=>({...d,col:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>צבע מסגרת<input type="color" style={{...inp,height:32,padding:0}} value={newMissionDraft.border} onChange={e=>setNewMissionDraft(d=>({...d,border:e.target.value}))}/></label>
                </div>
                <div style={{borderTop:"1px solid var(--border)",paddingTop:10,marginTop:10}}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"var(--accent)"}}>🎖️ תפקידים נדרשים (אופציונלי)</div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {(newMissionDraft.roleSlots||[]).map((rs,i)=>(
                      <div key={i} style={{display:"flex",gap:5,alignItems:"center"}}>
                        <select style={{...inp,marginTop:0,flex:2}} value={rs.role} onChange={e=>setNewMissionDraft(d=>{const nrs=[...d.roleSlots];nrs[i]={...nrs[i],role:e.target.value};return {...d,roleSlots:nrs};})}>
                          {availableRoles.map(r=><option key={r} value={r}>{r}</option>)}
                        </select>
                        <input type="number" min={1} max={20} style={{...inp,marginTop:0,flex:1}} value={rs.count} onChange={e=>setNewMissionDraft(d=>{const nrs=[...d.roleSlots];nrs[i]={...nrs[i],count:+e.target.value};return {...d,roleSlots:nrs};})}/>
                        <button onClick={()=>setNewMissionDraft(d=>({...d,roleSlots:d.roleSlots.filter((_,j)=>j!==i)}))} style={btn({color:"#ef5350",padding:"4px 8px"})}>✕</button>
                      </div>
                    ))}
                    <button onClick={()=>setNewMissionDraft(d=>({...d,roleSlots:[...(d.roleSlots||[]),{role:availableRoles[0]||"לוחם",count:1}]}))} style={btn({background:"var(--accent)22",color:"var(--accent)",fontWeight:700})}>+ הוסף תפקיד</button>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={addNewMission} style={btn({background:"var(--green)",color:"#fff",flex:1,fontWeight:700,padding:"8px"})}>✓ צור משימה</button>
                  <button onClick={()=>setShowNewMission(false)} style={btn({flex:1,padding:"8px"})}>ביטול</button>
                </div>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {visibleForSettings.map(m => {
                const s = missionSettings[m.id] || {};
                const isEditing = editId === m.id;
                const hiddenCount = DAY_IDS.filter(d => isMissionHiddenOnDay(d, m.id)).length;
                return (
                  <div key={m.id} id={"mission-edit-"+m.id} style={{background:"var(--surface)",border:`1.5px solid ${isEditing?"var(--accent)":m.border+"66"}`,borderRadius:12,overflow:"hidden"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",flexWrap:"wrap"}}>
                      <span style={{fontSize:10}}>{hiddenCount===0?"🟢":hiddenCount===DAY_IDS.length?"🔴":"🟡"}</span>
                      <span style={{fontSize:15}}>{s.icon||m.icon}</span>
                      <span style={{fontWeight:700,fontSize:13,flex:1}}>{s.label||m.label}</span>
                      {!isEditing && <span style={{fontSize:11,color:"var(--text3)"}}>🕐 {s.startH}:00–{s.endH>24?(s.endH-24)+":00+":s.endH+":00"} | 😴 {s.restHours}ש׳ | ⭐{s.slots_commander} 🪖{s.slots_soldiers}{s.roleSlots && s.roleSlots.length>0?" 🎖️":""}</span>}
                      {!isEditing && <button onClick={()=>startEdit(m)} style={btn()} title="ערוך משימה">✏️</button>}
                      {!isEditing && <button onClick={()=>{
                        const baseSettings = missionSettings[m.id] || {};
                        const id = "custom_" + Date.now();
                        const dupLabel = (baseSettings.label || m.label) + " (העתק)";
                        const newM = {
                          id,
                          label: dupLabel,
                          icon: baseSettings.icon || m.icon || "🎯",
                          time: baseSettings.time || m.time || "",
                          slots: { commander: baseSettings.slots_commander ?? m.slots.commander, soldiers: baseSettings.slots_soldiers ?? m.slots.soldiers },
                          border: m.border || "#7e57c2",
                          col: baseSettings.col || m.col || 1,
                          startH: baseSettings.startH ?? m.startH,
                          endH: baseSettings.endH ?? m.endH,
                          roleSlots: JSON.parse(JSON.stringify(baseSettings.roleSlots || m.roleSlots || [])),
                          allowedNames: [],
                        };
                        setCustomMissions(prev => [...prev, newM]);
                        setMissionSettings(prev => ({...prev, [id]: {
                          label: dupLabel, icon: newM.icon, time: newM.time,
                          startH: newM.startH, endH: newM.endH,
                          restHours: baseSettings.restHours || 0,
                          slots_commander: newM.slots.commander,
                          slots_soldiers: newM.slots.soldiers,
                          col: newM.col,
                          roleSlots: newM.roleSlots,
                          allowedNames: [],
                        }}));
                        setAllAssAndSave(prev => {
                          const c = JSON.parse(JSON.stringify(prev));
                          DAY_IDS.forEach(dayId => {
                            if (!c[dayId]) c[dayId] = {};
                            const totalSol = newM.roleSlots && newM.roleSlots.length>0 ? newM.roleSlots.reduce((s,r)=>s+(r.count||0),0) : newM.slots.soldiers;
                            c[dayId][id] = {
                              commanders: Array(newM.slots.commander).fill(null),
                              soldiers: Array(totalSol).fill(null),
                            };
                          });
                          return c;
                        });
                        alert(`✓ המשימה שוכפלה: ${dupLabel}`);
                      }} style={btn({color:"var(--accent)"})} title="שכפל משימה">📋</button>}
                      {!isEditing && <button onClick={()=>{if(confirm(`למחוק את "${m.label}"?`)) setDeletedMissions(p=>[...p,m.id]);}} style={btn({color:"#ef5350"})} title="מחק משימה">🗑</button>}
                    </div>
                    {!isEditing && (
                      <div style={{padding:"4px 14px 10px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:10,color:"var(--text3)"}}>📍 עמודה בתצוגה:</span>
                        {[1,2,3,4,5,6].map(c=>(
                          <button key={c} onClick={()=>setMissionSettings(prev=>({...prev,[m.id]:{...prev[m.id],col:c}}))}
                            style={{...btn(),background:(s.col||m.col||1)===c?"var(--accent)":"var(--surface2)",color:(s.col||m.col||1)===c?"#fff":"var(--text2)",fontSize:11,fontWeight:700,padding:"3px 10px",minWidth:28}}>
                            {c}
                          </button>
                        ))}
                        <span style={{fontSize:9,color:"var(--text3)",marginRight:6}}>(משימות באותה עמודה יוצגו אחת מתחת לשנייה)</span>
                      </div>
                    )}
                    {isEditing && (
                      <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:8}}>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:7}}>
                          <label style={{fontSize:11,color:"var(--text2)"}}>שם<input style={inp} value={draft.label||""} onChange={e=>setDraft(d=>({...d,label:e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>אייקון<input style={inp} value={draft.icon||""} onChange={e=>setDraft(d=>({...d,icon:e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>שעות תצוגה<input style={inp} value={draft.time||""} onChange={e=>setDraft(d=>({...d,time:e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>שעת התחלה<input type="number" min={0} max={30} style={inp} value={draft.startH||0} onChange={e=>setDraft(d=>({...d,startH:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>שעת סיום<input type="number" min={0} max={30} style={inp} value={draft.endH||0} onChange={e=>setDraft(d=>({...d,endH:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>מנוחה (שעות)<input type="number" min={0} max={24} style={inp} value={draft.restHours||0} onChange={e=>setDraft(d=>({...d,restHours:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>מפקדים<input type="number" min={0} max={10} style={inp} value={draft.slots_commander||0} onChange={e=>setDraft(d=>({...d,slots_commander:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>חיילים<input type="number" min={0} max={20} style={inp} value={draft.slots_soldiers||0} onChange={e=>setDraft(d=>({...d,slots_soldiers:+e.target.value}))}/></label>

  // ═══ MORNING PARADE VIEW ═══
  function ParadeView() {
    // ═══ לוגיקה פשוטה ═══
    // 1. חייל נוכח במסדר = חייל שלא משובץ במשימה מסומנת + לא בבית/גימל/חו"ל + לא מ"מ/מפקדת פלוגה
    // 2. חייל לא במסדר = משובץ למשימה שסומנה "לא במסדר בוקר" / בבית / חוזר מהבית / גימל / חו"ל
    // 3. מ"מ + מפקדת פלוגה - מוסתרים לחלוטין מהמסך

    const da = allAss[activeDay] || {};

    // משימות שהוגדרו כ"לא במסדר בוקר"
    const excludedMissionIds = new Set();
    [...MISSION_DEFS, ...customMissions].forEach(m => {
      const dayOv = (dayMissionOverrides[activeDay]||{})[m.id] || {};
      if (dayOv.lateWakeMission ?? missionSettings[m.id]?.lateWakeMission ?? m.lateWakeMission) {
        excludedMissionIds.add(m.id);
      }
    });

    // חיילים שמשובצים למשימות מסומנות (= לא במסדר)
    const inExcludedMission = new Map(); // name → mission label
    Object.entries(da).forEach(([mid, ass]) => {
      if (!excludedMissionIds.has(mid)) return;
      const m = [...MISSION_DEFS, ...customMissions].find(x => x.id === mid);
      const label = (missionSettings[mid]?.label) || m?.label || mid;
      [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(p => {
        if (!inExcludedMission.has(p.name)) inExcludedMission.set(p.name, label);
      });
    });

    // בבית היום / אתמול
    const aftarToday = new Set(aftarByDay[activeDay]||[]);
    const prevDayIdx = DAY_IDS.indexOf(activeDay) - 1;
    const prevDay = prevDayIdx >= 0 ? DAY_IDS[prevDayIdx] : null;
    const aftarYesterday = new Set(prevDay ? (aftarByDay[prevDay]||[]) : []);
    // גימל היום
    const gimelToday = new Set([...(da["gimel"]?.soldiers||[])].filter(Boolean).map(p=>p.name));

    // אילו חיילים מסתתרים לחלוטין מהמסך (מ"מ / מפקדת פלוגה)
    const isHiddenFromParade = (platoonKey, platoon, roles) => {
      if (platoonKey === 'pluga2') return true;
      if (platoon.label && (platoon.label.includes('מפקדת פלוגה') || platoon.label.includes('מפקדת הפלוגה'))) return true;
      if (roles && roles.some(r => r.includes('מ"מ') || r.includes('מ״מ'))) return true;
      return false;
    };

    const paradeList = [];  // נוכחים במסדר
    const notInParade = []; // לא במסדר (מסיבה כלשהי)

    Object.entries(platoons).forEach(([k,p]) => {
      p.members.forEach(rawM => {
        const name = getMemberName(rawM);
        const roles = getMemberRoles(rawM);
        // הסתרה מוחלטת
        if (isHiddenFromParade(k, p, roles)) return;
        // בדיקות
        const status = getMemberStatus ? getMemberStatus(rawM) : 'active';
        const statusInfo = getStatusInfo ? getStatusInfo(status) : {blocks:false,label:'פעיל',color:'#34c77b'};
        let reason = null, reasonColor = '#e67e22';
        if (statusInfo.blocks) { reason = statusInfo.label; reasonColor = statusInfo.color; }
        else if (aftarToday.has(name)) { reason = 'בבית'; reasonColor = '#e67e22'; }
        else if (aftarYesterday.has(name)) { reason = 'חוזר מהבית'; reasonColor = '#e67e22'; }
        else if (gimelToday.has(name)) { reason = 'גימלים'; reasonColor = '#ff9800'; }
        else if (inExcludedMission.has(name)) { reason = inExcludedMission.get(name); reasonColor = '#7e57c2'; }
        if (reason) notInParade.push({name, platoonKey:k, reason, reasonColor});
        else paradeList.push({name, platoonKey:k});
      });
    });

    // קיבוץ "לא במסדר" לפי סיבה
    const groupsByReason = {};
    notInParade.forEach(r => {
      if (!groupsByReason[r.reason]) groupsByReason[r.reason] = {color: r.reasonColor, list: []};
      groupsByReason[r.reason].list.push(r);
    });

    const sectionStyle = (color) => ({background:"var(--surface)",border:`2px solid ${color}66`,borderRadius:14,marginBottom:16,overflow:"hidden"});

    return (
      <div className="main" style={{maxWidth:1100,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>☀️ מסדר בוקר — יום {activeDayObj?.label} {activeDayObj?.date}</div>
        <div style={{fontSize:12,color:"var(--text2)",marginBottom:18,lineHeight:1.5}}>
          רשימה אוטומטית: חייל נמצא במסדר אם הוא לא בבית, לא בגימל, לא בחו"ל, לא משובץ למשימה שסומנה כ"לא במסדר", ולא מ"מ/מפקדת פלוגה.
          <br/>לסימון משימות שלא נמצאות במסדר: לחץ "ערוך" על משימה → סמן "😴 לא נמצא במסדר בוקר".
        </div>

        {/* נוכחים במסדר */}
        <div style={sectionStyle('#34c77b')}>
          <div style={{padding:"14px 16px",borderBottom:"1px solid var(--border)",background:"linear-gradient(90deg,#34c77b22,transparent)"}}>
            <div style={{fontSize:17,fontWeight:800,color:"#34c77b"}}>✓ נוכחים במסדר בוקר ({paradeList.length})</div>
          </div>
          <div style={{padding:"14px 16px",display:"flex",flexWrap:"wrap",gap:7}}>
            {paradeList.length === 0
              ? <div style={{color:"var(--text3)",fontSize:13}}>אין חיילים במסדר</div>
              : paradeList
                  .sort((a,b)=> getMemberName(a.name).localeCompare(getMemberName(b.name),'he'))
                  .map(r => <div key={r.name} style={{...getPlatoonStyle(r.platoonKey),borderRadius:8,padding:"7px 14px",fontSize:14,fontWeight:700}}>{r.name}</div>)
            }
          </div>
        </div>

        {/* לא במסדר - מקובץ לפי סיבה */}
        {Object.keys(groupsByReason).length > 0 && (
          <div style={{marginTop:18}}>
            <div style={{fontSize:14,fontWeight:800,color:"var(--text2)",marginBottom:10,paddingRight:6}}>📋 לא במסדר בוקר ({notInParade.length})</div>
            {Object.entries(groupsByReason).map(([reason, g]) => (
              <div key={reason} style={sectionStyle(g.color)}>
                <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",background:`linear-gradient(90deg,${g.color}22,transparent)`}}>
                  <div style={{fontSize:14,fontWeight:800,color:g.color}}>{reason} ({g.list.length})</div>
                </div>
                <div style={{padding:"12px 14px",display:"flex",flexWrap:"wrap",gap:6}}>
                  {g.list
                    .sort((a,b)=> a.name.localeCompare(b.name,'he'))
                    .map(r => <div key={r.name} style={{...getPlatoonStyle(r.platoonKey),borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,opacity:0.85}}>{r.name}</div>)
                  }
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ═══ TRACKING VIEW ═══
  function TrackingView() {
    const PLATOON_ORDER = ["cmd1","soldiers1","cmd2","soldiers2","cmd3","soldiers3","pluga","pluga2"];
    const platoonIdx = (pl) => { const i = PLATOON_ORDER.indexOf(pl); return i>=0?i:99; };
    return (
      <div className="main" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>📊 מעקבים</div>
        {(() => {
          const counts = {};
          allMembers.forEach(m => { counts[m.name] = { count: 0, platoon: m.platoon }; });
          DAY_IDS.forEach(dayId => {
            (aftarByDay[dayId]||[]).forEach(name => {
              if (counts[name] !== undefined) counts[name].count++;
            });
          });
          const sorted = Object.entries(counts).filter(([,v])=>v.count>0).sort((a,b) => { const pi = platoonIdx(a[1].platoon) - platoonIdx(b[1].platoon); return pi !== 0 ? pi : b[1].count - a[1].count; });
          return (
            <div style={{background:"var(--surface)",border:"1.5px solid #e67e2244",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🏠</span>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>מעקב יציאות הביתה</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>סה"כ ימים</div>
              </div>
              <div style={{padding:"10px 12px"}}>
                {sorted.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>אין יציאות עדיין</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {sorted.map(([name,{count,platoon}]) => (
                        <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                          <span>{name}</span>
                          <span style={{background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"1px 6px",fontSize:11,fontWeight:800}}>{count}</span>
                        </div>
                      ))}
                    </div>
                }
              </div>
            </div>
          );
        })()}
        {(() => {
          const matbahIds = ["matbah_boker","matbah_tzaharayim"];
          const counts = {};
          allMembers.forEach(m => { counts[m.name] = { count: 0, platoon: m.platoon }; });
          DAY_IDS.forEach(dayId => {
            const da = allAss[dayId] || {};
            matbahIds.forEach(mid => {
              const ass = da[mid]; if (!ass) return;
              [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(p => {
                if (counts[p.name] !== undefined) counts[p.name].count += 0.5;
              });
            });
          });
          const sorted = Object.entries(counts).filter(([,v])=>v.count>0).sort((a,b) => { const pi = platoonIdx(a[1].platoon) - platoonIdx(b[1].platoon); return pi !== 0 ? pi : b[1].count - a[1].count; });
          return (
            <div style={{background:"var(--surface)",border:"1.5px solid #ff980044",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🍳</span>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>מעקב תורנות מטבח</div>
              </div>
              <div style={{padding:"10px 12px"}}>
                {sorted.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>אין תורנויות עדיין</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {sorted.map(([name,{count,platoon}]) => (
                        <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                          <span>{name}</span>
                          <span style={{background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"1px 6px",fontSize:11,fontWeight:800}}>{Number.isInteger(count)?count:(Math.floor(count)>0?Math.floor(count)+"½":"½")}</span>
                        </div>
                      ))}
                    </div>
                }
              </div>
            </div>
          );
        })()}
        {(() => {
          // Include custom missions too. Exclude only specific command roles by ID/exact label
          const EXCLUDE_TRACK = new Set(["maatzar","gimel","katzin","katzin_a","katzin_b","matbah_boker","matbah_tzaharayim","map","smp","hfk"]);
          const EXACT_EXCLUDE_LABELS = new Set(["מפ","סמפ","חפק","מ\"פ","סמ\"פ"]);
          const allTrackable = [...MISSION_DEFS, ...customMissions];
          const trackMissions = allTrackable.filter(m => {
            if (m.hideFromDisplay) return false;
            if (EXCLUDE_TRACK.has(m.id)) return false;
            if (deletedMissions.includes(m.id)) return false;
            const label = (missionSettings[m.id]?.label || m.label || '').trim();
            if (EXACT_EXCLUDE_LABELS.has(label)) return false;
            if (label.startsWith('קצין מוצב')) return false;
            return true;
          });
          return (
            <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>📋</span>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>מעקב כל המשימות</div>
              </div>
              <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:10}}>
                {trackMissions.map(nm => {
                  const counts = {};
                  allMembers.forEach(m => { counts[m.name] = { count: 0, platoon: m.platoon }; });
                  DAY_IDS.forEach(dayId => {
                    const ass = (allAss[dayId]||{})[nm.id]; if (!ass) return;
                    [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(p => {
                      if (counts[p.name] !== undefined) counts[p.name].count++;
                    });
                  });
                  const sorted = Object.entries(counts).filter(([,v])=>v.count>0).sort((a,b) => { const pi = platoonIdx(a[1].platoon) - platoonIdx(b[1].platoon); return pi !== 0 ? pi : b[1].count - a[1].count; });
                  if (sorted.length === 0) return null;
                  const s = missionSettings[nm.id]||{};
                  return (
                    <div key={nm.id}>
                      <div style={{fontSize:11,fontWeight:700,color:"var(--text2)",marginBottom:5}}>{s.icon||nm.icon} {s.label||nm.label}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {sorted.map(([name,{count,platoon}]) => (
                          <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"3px 9px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                            <span>{name}</span>
                            <span style={{background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"1px 5px",fontSize:11,fontWeight:800}}>{count}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  // ═══ MEMBERS VIEW ═══
  function MembersView() {
    const inp = {display:"block",width:"100%",marginTop:3,padding:"5px 8px",borderRadius:7,border:"1px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:13};
    const btn = (extra={}) => ({background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:12,padding:"4px 10px",...extra});
    const [newMemberName, setNewMemberName] = useState("");
    const [newMemberPlatoon, setNewMemberPlatoon] = useState("soldiers1");
    const [newMemberRoles, setNewMemberRoles] = useState([]);
    const [newMemberBlocked, setNewMemberBlocked] = useState([]);
    const [newMemberPersonal, setNewMemberPersonal] = useState("");
    const [newMemberPhone, setNewMemberPhone] = useState("");
    const [editingMember, setEditingMember] = useState(null);
    const allMissionsList = allMissionDefs.filter(m => !deletedMissions.includes(m.id));
    return (
      <div className="main" style={{maxWidth:1000,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:14}}>👥 ניהול חיילים ותפקידים</div>
        <div style={{background:"var(--surface)",border:"1.5px solid var(--accent)44",borderRadius:14,padding:"16px",marginBottom:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"var(--accent)",marginBottom:10}}>➕ הוספת חייל חדש</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <label style={{fontSize:11,color:"var(--text2)"}}>שם
              <input style={inp} placeholder="שם מלא" value={newMemberName} onChange={e=>setNewMemberName(e.target.value)}/>
            </label>
            <label style={{fontSize:11,color:"var(--text2)"}}>מחלקה
              <select style={inp} value={newMemberPlatoon} onChange={e=>setNewMemberPlatoon(e.target.value)}>
                {Object.entries(platoons).map(([k,p])=><option key={k} value={k}>{p.label}</option>)}
              </select>
            </label>
            <label style={{fontSize:11,color:"var(--text2)"}}>מספר אישי
              <input style={inp} placeholder="מ.א" value={newMemberPersonal} onChange={e=>setNewMemberPersonal(e.target.value)}/>
            </label>
            <label style={{fontSize:11,color:"var(--text2)"}}>טלפון
              <input style={inp} placeholder="050-1234567" value={newMemberPhone} onChange={e=>setNewMemberPhone(e.target.value)}/>
            </label>
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,color:"var(--text2)",marginBottom:5,display:"flex",alignItems:"center",gap:6}}>
              <span>תפקידים (סמן את התפקידים של החייל):</span>
              <button onClick={()=>{
                const r = prompt("שם תפקיד חדש:");
                if (r && r.trim() && !availableRoles.includes(r.trim())) setAvailableRoles(p=>[...p,r.trim()]);
              }} style={{...btn(),background:"var(--accent)22",color:"var(--accent)",fontSize:10,padding:"1px 8px"}}>+ תפקיד חדש</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {availableRoles.map(r=>{
                const isSel = newMemberRoles.includes(r);
                return <button key={r} onClick={()=>setNewMemberRoles(p=>isSel?p.filter(x=>x!==r):[...p,r])}
                  style={{...btn(),background:isSel?"var(--accent)":"var(--surface2)",color:isSel?"#fff":"var(--text2)",fontSize:11}}>{r}</button>;
              })}
            </div>
          </div>
          <div style={{marginTop:10}}>
            <div style={{fontSize:11,color:"#ef5350",marginBottom:5,fontWeight:700}}>🚫 משימות חסומות (לא יוכל להישבץ):</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
              {allMissionsList.map(m=>{
                const isSel = newMemberBlocked.includes(m.id);
                return <button key={m.id} onClick={()=>setNewMemberBlocked(p=>isSel?p.filter(x=>x!==m.id):[...p,m.id])}
                  style={{...btn(),background:isSel?"#ef5350":"var(--surface2)",color:isSel?"#fff":"var(--text2)",fontSize:11}}>{m.icon} {m.label}</button>;
              })}
            </div>
          </div>
          <button style={btn({background:"var(--accent)",color:"#fff",fontWeight:700,padding:"7px 18px",marginTop:10})} onClick={()=>{
            const name = newMemberName.trim();
            if(!name) return;
            if(platoons[newMemberPlatoon].members.some(m=>getMemberName(m)===name)){ alert("החייל כבר קיים"); return; }
            setPlatoons(prev => {
              const n=JSON.parse(JSON.stringify(prev));
              n[newMemberPlatoon].members.push({name, roles:newMemberRoles, blockedMissions:newMemberBlocked, personalNumber: newMemberPersonal.trim(), phone: newMemberPhone.trim()});
              return n;
            });
            setNewMemberName(""); setNewMemberRoles([]); setNewMemberBlocked([]); setNewMemberPersonal(""); setNewMemberPhone("");
          }}>✓ הוסף</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:10}}>
          {Object.entries(platoons).map(([k,p])=>(
            <div key={k} style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:12,padding:"12px 14px"}}>
              <div style={{fontWeight:700,fontSize:13,color:p.color,marginBottom:8}}>{p.label} ({p.members.length})</div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {p.members.length === 0 && <div style={{fontSize:11,color:"var(--text3)"}}>אין חיילים</div>}
                {sortMembersByName(p.members.map((rawM,idx)=>({...normalizeMember(rawM),__idx:idx}))).map((rawM)=>{const idx=rawM.__idx;
                  const name = getMemberName(rawM);
                  const roles = getMemberRoles(rawM);
                  const memberBlocked = getMemberBlocked(rawM);
                  const memberPersonal = getMemberPersonalNumber(rawM);
                  const memberPhone = getMemberPhone(rawM);
                  const memberStatus = getMemberStatus(rawM);
                  const statusInfo = getStatusInfo(memberStatus);
                  const isEditing = editingMember === `${k}_${idx}`;
                  return (
                    <div key={k+"_"+idx} style={{borderTop:"1px solid var(--border)",paddingTop:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}>
                        <div style={{...getPlatoonStyle(k),borderRadius:6,padding:"2px 8px",fontSize:12,flex:1,fontWeight:600,...(statusInfo.blocks?{outline:`2px solid ${statusInfo.color}`,outlineOffset:-1}:{})}}>{name}</div>
                        {statusInfo.blocks && <span style={{background:statusInfo.color,color:"#fff",borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:800}}>{statusInfo.label}</span>}
                        <button style={btn({fontSize:10,padding:"2px 6px"})} onClick={()=>setEditingMember(isEditing?null:`${k}_${idx}`)}>
                          {isEditing?"✕":"✏️"}
                        </button>
                        <button style={btn({fontSize:10,padding:"2px 6px",color:"#ef5350"})} onClick={()=>{
                          if(confirm(`למחוק את ${name}?`)) setPlatoons(prev=>{const n=JSON.parse(JSON.stringify(prev));n[k].members=n[k].members.filter((_,i)=>i!==idx);return n;});
                        }}>🗑</button>
                      </div>
                      {!isEditing && (memberPersonal || memberPhone) && (
                        <div style={{fontSize:10,color:"var(--text3)",direction:"ltr",textAlign:"right",marginBottom:3}}>
                          {memberPersonal && <span>📋 {memberPersonal}</span>}
                          {memberPersonal && memberPhone && <span> · </span>}
                          {memberPhone && <span>📞 {memberPhone}</span>}
                        </div>
                      )}
                      {isEditing && <MemberEditor name={name} roles={roles} blockedMissions={memberBlocked} personalNumber={memberPersonal} phone={memberPhone} status={memberStatus} platoonKey={k} idx={idx} platoons={platoons} availableRoles={availableRoles} allMissionsList={allMissionsList} setPlatoons={setPlatoons} setAvailableRoles={setAvailableRoles} setAllAssAndSave={setAllAssAndSave} btn={btn} inp={inp} onDone={()=>setEditingMember(null)}/>}
                      {!isEditing && roles.length>0 && (
                        <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:3}}>
                          {roles.map(r=><span key={r} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:4,padding:"1px 6px",fontSize:10,color:"var(--text2)"}}>{r}</span>)}
                        </div>
                      )}
                      {!isEditing && memberBlocked.length>0 && (
                        <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                          {memberBlocked.map(mid=>{
                            const m = allMissionsList.find(x=>x.id===mid);
                            return <span key={mid} style={{background:"#ef535033",border:"1px solid #ef5350",borderRadius:4,padding:"1px 6px",fontSize:9,color:"#ef5350"}}>🚫 {m?m.label:mid}</span>;
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  return (
    <div style={{minHeight:"100vh"}}>
      <div className="topbar">
        <div className="topbar-logo">שבצ<span>"</span>ק פלוגה א׳ 239</div>
        {view==="display" && activeDayObj && (
          <div style={{fontSize:12,fontWeight:700,color:"var(--accent)",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"3px 10px",whiteSpace:"nowrap"}}>
            יום {activeDayObj.label} · {activeDayObj.date}
          </div>
        )}
        {view!=="calendar" && <div className="day-tabs" ref={el => {
          if (el) {
            const active = el.querySelector('.day-tab.active');
            if (active) {
              const tabsRect = el.getBoundingClientRect();
              const activeRect = active.getBoundingClientRect();
              el.scrollLeft += (activeRect.left - tabsRect.left + activeRect.width/2) - tabsRect.width/2;
            }
          }
        }}>
          {DAYS.map(d=>(
            <button key={d.id} className={`day-tab ${activeDay===d.id?"active":""}`}
              onClick={()=>{setActiveDay(d.id);setSelPeople([]);}}>
              {d.label}<span className="ds">{d.date}</span>
            </button>
          ))}
        </div>}
        <div className="stats-badge">{assigned}/{total}</div>
        <div style={{fontSize:10,color:synced?"var(--green)":"var(--text3)",display:"flex",alignItems:"center",gap:4,background:"var(--surface2)",border:`1px solid ${syncStatus==='live'?"var(--green)44":syncStatus==='saving'?"var(--accent)44":syncStatus==='local'?"var(--orange)44":"var(--border)"}`,borderRadius:20,padding:"2px 8px",whiteSpace:"nowrap"}}>
          {syncStatus==='live' && <><span style={{color:"var(--green)"}}>●</span> Firebase חי</>}
          {syncStatus==='saving' && <><span style={{color:"var(--accent)"}}>⟳</span> שומר...</>}
          {syncStatus==='local' && <><span style={{color:"var(--orange)"}}>●</span> מקומי בלבד</>}
          {syncStatus==='connecting' && <><span style={{color:"var(--text3)"}}>◌</span> מתחבר...</>}
        </div>
        <div className="view-toggle">
          <button className={`view-btn ${view==="display"?"active":""}`} onClick={()=>setView("display")}>👁 תצוגה</button>

          <button className={`view-btn ${view==="calendar"?"active":""}`} onClick={()=>setView("calendar")}>📅 לוח חופשות</button>
          <button className={`view-btn ${view==="tracking"?"active":""}`} onClick={()=>setView("tracking")}>📊 מעקבים</button>
          <button className={`view-btn ${view==="members"?"active":""}`} onClick={()=>setView("members")}>👥 חיילים</button>

            {bypassConstraints?"🔓":"🔒"}
          </button>
        </div>
        {view==="display" && <button onClick={()=>exportDisplayToPDF(`${activeDayObj?.label}_${activeDayObj?.date}`, activeDayObj?.date)} style={{background:"#ef535022",border:"1px solid #ef5350",borderRadius:7,color:"#ef5350",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,fontWeight:700,padding:"4px 12px"}}>📄 ייצוא PDF</button>}
        {(view==="display"||view==="builder") && <button onClick={()=>{ if(confirm(`לבצע שיבוץ אוטומטי ליום ${activeDayObj?.date}? פעולה זו תמלא תאים ריקים בלבד.`)) autoAssignDay(); }} style={{background:"#34c77b22",border:"1px solid var(--green)",borderRadius:7,color:"var(--green)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:11,fontWeight:700,padding:"4px 12px",whiteSpace:"nowrap"}}>🪄 שבצ"ק אוטומטי</button>}
        <button onClick={()=>{
