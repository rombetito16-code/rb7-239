  const days = [];

  const start = new Date(today);

    const d = new Date(start);
    d.setDate(start.getDate() + i);

    days.push({ id, label: dayNames[d.getDay()], date, dow: d.getDay() });
  }
  return days;
}

// === HELPERS ===
function normalizeMember(m) {
  if (typeof m === 'string') return { name: m, roles: [], blockedMissions: [], personalNumber: '', phone: '' };
  return {
    name: m.name,
    roles: Array.isArray(m.roles) ? m.roles : [],
    blockedMissions: Array.isArray(m.blockedMissions) ? m.blockedMissions : [],
    personalNumber: m.personalNumber || '',
    phone: m.phone || '',
  };
}
function getMemberName(m) { return typeof m === 'string' ? m : (m && m.name) || ''; }
function getMemberRoles(m) {
  if (typeof m === 'string') return [];
  return Array.isArray(m && m.roles) ? m.roles : [];
}
function getMemberBlocked(m) {
  if (typeof m === 'string') return [];
  return Array.isArray(m && m.blockedMissions) ? m.blockedMissions : [];
}
function getMemberPersonalNumber(m) {
  if (typeof m === 'string') return '';
  return (m && m.personalNumber) || '';
}
function getMemberPhone(m) {
  if (typeof m === 'string') return '';
  return (m && m.phone) || '';
}
// Lookup member details across all platoons from window._platoons
function findMemberDetails(name) {
  const plts = window._platoons || {};
  for (const k in plts) {
    for (const m of (plts[k].members || [])) {
      if (getMemberName(m) === name) {
        return { personalNumber: getMemberPersonalNumber(m), phone: getMemberPhone(m), roles: getMemberRoles(m) };
      }
    }
  }
  return { personalNumber: '', phone: '', roles: [] };
}

function getMissionSlots(mission) {
  if (mission.roleSlots && mission.roleSlots.length > 0) {
    const totalCount = mission.roleSlots.reduce((s,r)=>s+(r.count||0),0);
    return { commander: 0, soldiers: totalCount, roleSlots: mission.roleSlots };
  }
  return { commander: mission.slots.commander, soldiers: mission.slots.soldiers };
}

    const s = getMissionSlots(m);
    init[m.id] = { commanders: Array(s.commander).fill(null), soldiers: Array(s.soldiers).fill(null) };
  });
  return init;
}

function getBlockedNames(allAss, targetDayId, targetMission, missionSettings, platoons, restExemptions) {
  const ms = missionSettings || {};
  const plugaMembers = new Set([
    ...(platoons?.pluga?.members||[]).map(getMemberName),
    ...(platoons?.pluga2?.members||[]).map(getMemberName)
  ]);
  const blocked = new Set(), reasons = {};
  const dayOrder = DAY_IDS;
  const ti = dayOrder.indexOf(targetDayId);
  const isMorningDutyNextDay = (targetMission.id==="matbah_boker");
  const isPilboxNextDay = (targetMission.id==="philbox");
  const isHetz = (targetMission.id==="hetz4");
  if (targetMission.id==="maatzar") return { blocked: new Set(), blockedReasons: {} };
  dayOrder.forEach((dayId, di) => {
    const da = allAss[dayId] || {};
    MISSION_DEFS.filter(m => m.isSiyur).forEach(sm => {
      const ass = da[sm.id]; if (!ass) return;
      const restH = ms[sm.id]?.restHours ?? 16;
      if (restH === 0) return;
      if (isHetz) return;
      [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(person => {
        if (MULTI_MISSION_OFFICERS.has(person.name) || plugaMembers.has(person.name)) return;
        const sEnd = di*24 + sm.endH, tStart = ti*24 + targetMission.startH;
        const isSameSlot = (dayId===targetDayId && sm.id===targetMission.id);
        const targetIsAfterPatrolStart = tStart >= di*24 + sm.startH;
        if (tStart < sEnd+restH && !isSameSlot && targetIsAfterPatrolStart) {
          const isNextDay = di === ti-1;
          if (sm.id==="siyur_tzo" && isNextDay && isMorningDutyNextDay) return;
          if (isNextDay && isPilboxNextDay) return;
          if ((sm.id==="siyur_tzo" || sm.id.startsWith("sg")) && isNextDay && (targetMission.id==="matbah_boker"||targetMission.id==="matbah_tzaharayim")) return;
          blocked.add(person.name); reasons[person.name] = `במנוחה לאחר ${sm.label}`;
        }
      });
    });
    MISSION_DEFS.filter(m => m.id.startsWith("sg") || m.id==="amada_a" || m.id==="amada_b" || m.id==="toren_rasp" || m.id==="hetz4" || m.id==="siyur_boker" || m.id==="siyur_tzo").forEach(sm => {
      const ass = da[sm.id]; if (!ass) return;
      const restH = ms[sm.id]?.restHours ?? (sm.id==="toren_rasp" ? 8 : (sm.id==="hetz4") ? 12 : 12);
      if (restH === 0) return;
      const isSameSlot = (dayId===targetDayId && sm.id===targetMission.id);
      if (isSameSlot) return;
      [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(person => {
        if (SG_REST_EXEMPT.has(person.name) || plugaMembers.has(person.name)) return;
        const sEnd = di*24 + sm.endH;
        const EFFECTIVE_START = {"philbox":14,"hetz4":14};
        const targetEffectiveStart = EFFECTIVE_START[targetMission.id] ?? targetMission.startH;
        let tStart = ti*24 + targetEffectiveStart;
        if (ti === di && targetEffectiveStart <= (sm.endH % 24) && targetEffectiveStart < 12) tStart += 24;
        if (tStart >= sEnd && tStart < sEnd + restH) {
          if (!blocked.has(person.name)) {
            blocked.add(person.name); reasons[person.name] = `במנוחה לאחר ${sm.label}`;
          }
        }
      });
    });
  });
  return { blocked, blockedReasons: reasons };
}

    #display-export-area .display-grid > div:first-child > div > div > div { margin: 4px 0 !important; }
  `;
  document.head.appendChild(printStyle);
  try {
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 500));
    const canvas = await html2canvas(el, {
      scale: 3,
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false,
      imageTimeout: 0,
      letterRendering: true,
      windowWidth: el.scrollWidth,
      windowHeight: el.scrollHeight,
      onclone: (doc) => {
        const c = doc.getElementById('display-export-area');
        if (c) { c.style.zoom = '1'; c.style.padding = '14px'; }
      }
    });
    const imgData = canvas.toDataURL('image/png');
    const { jsPDF } = window.jspdf;
    const imgRatio = canvas.width / canvas.height;
    const orient = imgRatio >= 1 ? 'landscape' : 'portrait';
    const pdf = new jsPDF({ orientation: orient, unit: 'mm', format: 'a4' });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const headerH = 14;
    const footerH = 8;
    const margin = 5;
    const usableW = pageW - margin*2;
    const usableH = pageH - margin*2 - headerH - footerH;
    const pageRatio = usableW / usableH;
    let w, h;
    if (imgRatio > pageRatio) { w = usableW; h = w / imgRatio; }
    else { h = usableH; w = h * imgRatio; }
    // White background
    pdf.setFillColor(255, 255, 255);
    pdf.rect(0, 0, pageW, pageH, 'F');
    // Header bar
    pdf.setFillColor(15, 25, 53);
    pdf.rect(0, 0, pageW, headerH + 2, 'F');
    pdf.setTextColor(255, 255, 255);
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');

    pdf.text(title, pageW - margin, 8, { align: 'right' });
    // Main content
    pdf.addImage(imgData, 'PNG', (pageW-w)/2, headerH + margin + 2, w, h);
    // Footer
    pdf.setFillColor(240, 244, 255);
    pdf.rect(0, pageH - footerH - 1, pageW, footerH + 2, 'F');
    pdf.setTextColor(100, 110, 140);
    pdf.setFontSize(7);
    pdf.setFont('helvetica', 'normal');
    const now = new Date();
    const ts = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    pdf.text(`\u05d4\u05d5\u05e4\u05e7 \u05d1\u05ea\u05d0\u05e8\u05d9\u05da: ${ts}`, pageW - margin, pageH - 3, { align: 'right' });
    pdf.text('CONFIDENTIAL', margin, pageH - 3);
    // Border
    pdf.setDrawColor(79, 156, 249);
    pdf.setLineWidth(0.5);
    pdf.rect(1, 1, pageW - 2, pageH - 2);
    pdf.save(`\u05e9\u05d1\u05e6\u05e7_${dayLabel.replace(/[\/\\:]/g,'-')}.pdf`);
  } catch (e) {
    console.error(e);
    alert('שגיאה בייצוא PDF: ' + e.message);
  } finally {
    el.style.zoom = prevZoom;
    const s = document.getElementById('__pdf_print_style');
    if (s) s.remove();
  }
}

// === STORAGE (Firebase + localStorage fallback) ===
const STORAGE_KEY = 'shabzak_data_v2';

function loadFromStorage() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function saveToLocalStorage(data) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) { console.error('שמירה מקומית נכשלה:', e); }
}
function saveToStorage(data) {
  // Always save locally as backup
  saveToLocalStorage(data);
  // Also save to Firebase if available
  if (window.__firebase) {
    window.__firebase.saveToFirebase(data).catch(e => console.error('Firebase save error:', e));
  }
}

function getPlatoonStyleFromMap(platoonsMap, platoon) {
  const p = platoonsMap[platoon];

  return { background:p.color, color:p.textColor };
}

function DisplayCard({ mission, assignment, dayId, platoons }) {
  if (!assignment) return null;
  const getStyle = (p) => getPlatoonStyleFromMap(platoons, p);
  const normalizeArr = (arr, size) => {
    const cur = Array.isArray(arr) ? [...arr] : [];
    while (cur.length < size) cur.push(null);
    return cur;
  };
  const ms = getMissionSlots(mission);
  const ass = {
    commanders: normalizeArr(assignment.commanders||[], ms.commander),
    soldiers:   normalizeArr(assignment.soldiers||[], ms.soldiers),
  };
  const filled = [...ass.commanders,...ass.soldiers].filter(Boolean).length;
  const total = ms.commander + ms.soldiers;
  const done = filled===total && total>0;
  const isCompact = mission.id.startsWith("sg") || mission.id==="amada_a" || mission.id==="amada_b" || mission.id==="toren_rasp";

  // Helper: render full info for an assigned person (name + personal# + phone)
  const renderPerson = (p, fallbackText, big) => {
    if (!p) return <span style={{fontStyle:"italic",opacity:0.7}}>{fallbackText}</span>;
    const det = findMemberDetails(p.name);
    return (
      <>
        <div style={{fontSize: big?13:12, fontWeight:800}}>{p.name}</div>
        {(det.personalNumber || det.phone) && (
          <div style={{fontSize:9,fontWeight:600,opacity:0.85,marginTop:1,letterSpacing:0.3,direction:'ltr'}}>
            {det.personalNumber && <span>{det.personalNumber}</span>}
            {det.personalNumber && det.phone && <span style={{margin:"0 4px"}}>•</span>}
            {det.phone && <span>{det.phone}</span>}
          </div>
        )}
      </>
    );
  };

  return (
    <div className={`mcard${isCompact?" compact":""}`} style={{ borderColor: mission.border!=="#555" ? mission.border+"88" : undefined }}>
      <div className="mcard-header">
        <span className="mcard-icon">{mission.icon}</span>
        <div style={{ flex:1 }}>
          <div className="mcard-title">{mission.label}</div>
          {mission.time && <div className="mcard-time">{mission.time}</div>}
        </div>
        <div style={{ fontSize:11, fontWeight:700, color: done?"var(--green)":"var(--text3)" }}>
          {mission.noCount ? "" : done ? "✓" : `${filled}/${total}`}
        </div>
      </div>
      <div className="mcard-body">
        {ms.roleSlots ? (
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {(()=>{ let idx=0; return ms.roleSlots.flatMap((rs,ri)=>
              Array(rs.count).fill(null).map((_,i)=>{
                const p = ass.soldiers[idx++];
                return (
                  <div key={ri+"_"+i} className={`ntag ${p?"filled":"empty"}`} style={{...(p?getStyle(p.platoon):{}),width:"100%",textAlign:"center",padding:"5px 8px"}}>
                    {p ? <>
                      {renderPerson(p, rs.role, false)}
                      <div style={{fontSize:8,opacity:.75,marginTop:1}}>· {rs.role}</div>
                    </> : <span style={{fontStyle:"italic",opacity:0.7,fontSize:12,fontWeight:700}}>{rs.role}</span>}
                  </div>
                );
              })
            ); })()}
          </div>
        ) : (mission.id==="siyur_boker"||mission.id==="siyur_tzo"||mission.id==="siyur_layla"||mission.id==="hetz4"||mission.id==="philbox") ? (
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {ass.commanders.map((p,i)=>(
              <div key={"c"+i} className={`ntag ${p?"filled":"empty"}`} style={{...(p?getStyle(p.platoon):{}),width:"100%",textAlign:"center",padding:"6px 8px"}}>
                {renderPerson(p, "מפקד", true)}
              </div>
            ))}
            {ass.soldiers.length>0 && (
              <div className="ntag-grid">
                {ass.soldiers.map((p,i)=>(
                  <div key={"s"+i} className={`ntag ${p?"filled":"empty"}`} style={p?getStyle(p.platoon):{}}>
                    {renderPerson(p, "חייל", false)}
                  </div>
                ))}
              </div>
            )}
          </div>
        ) : mission.id==="katzin" ? (
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {ass.commanders.map((p,i)=>(
              <div key={i} className={`ntag ${p?"filled":"empty"}`} style={p?getStyle(p.platoon):{}}>
                {renderPerson(p, "קצין", false)}
              </div>
            ))}
          </div>
        ) : (mission.id==="matbah_boker"||mission.id==="matbah_tzaharayim"||mission.id.startsWith("sg")||mission.id==="amada_a"||mission.id==="amada_b"||mission.id==="toren_rasp") ? (
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {ass.soldiers.map((p,i)=>(
              <div key={i} className={`ntag ${p?"filled":"empty"}`} style={{...(p?getStyle(p.platoon):{}),width:"100%",textAlign:"center",padding:"6px 8px"}}>
                {renderPerson(p, "חייל", true)}
              </div>
            ))}
          </div>
        ) : (
          <>
            {ms.commander>0 && (<>
              {!mission.noLabel && <div className="slot-label">מפקד</div>}
              <div className="ntag-grid">
                {ass.commanders.map((p,i)=>(
                  <div key={i} className={`ntag ${p?"filled":"empty"}`} style={p?getStyle(p.platoon):{}}>
                    {renderPerson(p, "מפקד", false)}
                  </div>
                ))}

            </>)}
            {ms.soldiers>0 && (<>
              {!mission.noLabel && <div className="slot-label">חיילים</div>}
              <div className="ntag-grid">
                {ass.soldiers.map((p,i)=>(
                  <div key={i} className={`ntag ${p?"filled":"empty"}`} style={p?getStyle(p.platoon):{}}>
                    {renderPerson(p, "חייל", false)}
                  </div>
                ))}
              </div>
            </>)}
          </>
        )}
      </div>
    </div>
  );
}

      setSyncStatus('connecting');
      // Listen to Firebase in real time
      unsubscribe = window.__firebase.listenToFirebase((data) => {
        if (isSavingRef.current) return; // skip our own saves coming back
        if (data) {
          applyLoadedData(data);
          // Also update local backup
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
        } else {
          // Firebase is empty — load from localStorage if available
          const local = loadFromStorage();
          if (local) applyLoadedData(local);
        }
        if (!isSettingsLoaded.current) {
          isSettingsLoaded.current = true;
          setSynced(true);
          setSyncStatus('live');
        }
      });
      return true;
    };

    if (window.__firebaseReady) {
      setupFirebase();
    } else {
      // Wait for Firebase to be ready
      const handler = () => setupFirebase();
      window.addEventListener('firebaseReady', handler);
      // Fallback: load from localStorage immediately
      const local = loadFromStorage();
      if (local) {
        applyLoadedData(local);
        isSettingsLoaded.current = true;
        setSynced(true);
        setSyncStatus('local');
      }
      return () => {
        window.removeEventListener('firebaseReady', handler);
        if (unsubscribe) unsubscribe();
      };
    }

    return () => { if (unsubscribe) unsubscribe(); };
  }, [authed, applyLoadedData]);

  React.useEffect(() => {
    if (!isSettingsLoaded.current) return;
    const t = setTimeout(() => {
      const data = {
        ass: allAss, aftar: aftarByDay,

        }
      };
      isSavingRef.current = true;
      setSyncStatus('saving');
      saveToStorage(data);
      // Reset saving flag after a moment
      setTimeout(() => {

        setSyncStatus(window.__firebaseReady ? 'live' : 'local');
      }, 1500);
    }, 400);
    return () => clearTimeout(t);
  }, [allAss, aftarByDay, missionSettings, aftarSettings, spontMissions, hiddenMissionsByDay, deletedMissions, dayMissionOverrides, platoons, availableRoles, customPasswords, customMissions]);

  // Auto-assign: fill all empty slots across all visible missions for the active day
  const autoAssignDay = React.useCallback(() => {
    const isCmdPlatoon = (k) => CMD_PLATOONS.has(k) || (platoons[k]?.isCustomCmd === true);
    setAllAssAndSave(prev => {
      const c = JSON.parse(JSON.stringify(prev));

      const usedNames = new Set();
      Object.values(c[activeDay]||{}).forEach(a => {
        [...(a.commanders||[]),...(a.soldiers||[])].filter(Boolean).forEach(p => usedNames.add(p.name));
      });
      const aftarToday = new Set(aftarByDay[activeDay] || []);
      const gimelToday = new Set([...(c[activeDay]?.gimel?.soldiers || [])].filter(Boolean).map(p=>p.name));
      const prevDayIdx = DAY_IDS.indexOf(activeDay) - 1;
      const prevAftar = new Set(prevDayIdx>=0 ? (aftarByDay[DAY_IDS[prevDayIdx]]||[]) : []);
      // Get all candidates with their platoon key
      const allCands = Object.entries(platoons).flatMap(([k,p]) =>
        p.members.map(rawM => ({
          name: getMemberName(rawM),
          platoon: k,
          roles: getMemberRoles(rawM),
          blocked: getMemberBlocked(rawM),
          isCmdPlat: isCmdPlatoon(k),
        }))
      );
      // Iterate missions in priority order: katzin first, then siyurim, then sgs, then rest
      const priorityOrder = (mid) => {
        if (mid === "katzin") return 0;
        if (mid.includes("siyur")) return 1;
        if (mid === "hetz4") return 2;
        if (mid.startsWith("sg")) return 3;
        if (mid === "philbox") return 4;
        return 5;
      };
      const missions = allMissionDefs
        .filter(m => !deletedMissions.includes(m.id))
        .filter(m => !isMissionHiddenOnDay(activeDay, m.id))
        .filter(m => m.id !== "gimel" && m.id !== "maatzar")
        .sort((a,b)=>priorityOrder(a.id)-priorityOrder(b.id));

      for (const m of missions) {
        const ms = getMissionSlots(m);
        const ass = c[activeDay][m.id] = c[activeDay][m.id] || {commanders:Array(ms.commander).fill(null), soldiers:Array(ms.soldiers).fill(null)};
        // Ensure correct size
        while (ass.commanders.length < ms.commander) ass.commanders.push(null);
        while (ass.soldiers.length < ms.soldiers) ass.soldiers.push(null);
        // Get rest-blocked list now using current `c`
        const restBlocked = getBlockedNames(c, activeDay, m, missionSettings, platoons, restExemptions).blocked;
        // Fill commander slots
        for (let i = 0; i < ms.commander; i++) {
          if (ass.commanders[i]) continue;
          const cand = allCands.find(p => {
            if (usedNames.has(p.name) || aftarToday.has(p.name) || gimelToday.has(p.name) || prevAftar.has(p.name)) return false;
            if (p.blocked.includes(m.id)) return false;
            if (restBlocked.has(p.name)) return false;
            if (m.allowedNames && m.allowedNames.length>0 && !m.allowedNames.includes(p.name)) return false;
            // prefer cmd platoons
            return p.isCmdPlat || p.roles.some(r => ["מפקד","סמל","קצין"].includes(r));
          }) || allCands.find(p => {
            if (usedNames.has(p.name) || aftarToday.has(p.name) || gimelToday.has(p.name) || prevAftar.has(p.name)) return false;
            if (p.blocked.includes(m.id)) return false;
            if (restBlocked.has(p.name)) return false;
            if (m.allowedNames && m.allowedNames.length>0 && !m.allowedNames.includes(p.name)) return false;
            return true;
          });
          if (cand) { ass.commanders[i] = {name:cand.name, platoon:cand.platoon}; usedNames.add(cand.name); }
        }
        // Fill soldier slots (with role check if applicable)
        for (let i = 0; i < ms.soldiers; i++) {
          if (ass.soldiers[i]) continue;
          let requiredRole = null;
          if (ms.roleSlots) {
            let cum = 0;
            for (const rs of ms.roleSlots) {
              if (i < cum + rs.count) { requiredRole = rs.role; break; }
              cum += rs.count;
            }
          }
          const cand = allCands.find(p => {
            if (usedNames.has(p.name) || aftarToday.has(p.name) || gimelToday.has(p.name) || prevAftar.has(p.name)) return false;
            if (p.blocked.includes(m.id)) return false;
            if (restBlocked.has(p.name)) return false;
            if (requiredRole && !p.roles.includes(requiredRole)) return false;
            if (m.allowedNames && m.allowedNames.length>0 && !m.allowedNames.includes(p.name)) return false;
            // For pure soldier slot, prefer non-cmd platoons
            if (!requiredRole && p.isCmdPlat) return false;
            return true;
          }) || allCands.find(p => {
            if (usedNames.has(p.name) || aftarToday.has(p.name) || gimelToday.has(p.name) || prevAftar.has(p.name)) return false;
            if (p.blocked.includes(m.id)) return false;
            if (restBlocked.has(p.name)) return false;
            if (requiredRole && !p.roles.includes(requiredRole)) return false;
            if (m.allowedNames && m.allowedNames.length>0 && !m.allowedNames.includes(p.name)) return false;
            return true;
          });
          if (cand) { ass.soldiers[i] = {name:cand.name, platoon:cand.platoon}; usedNames.add(cand.name); }
        }
      }

    });

  function slotClick(type, idx) {
    const effM = getEffectiveMission(mission, activeDay);
    const ms = getMissionSlots(effM);
    // If no soldiers selected, open picker modal
    if (selPeople.length === 0) {
      let requiredRole = null;
      if (ms.roleSlots && type === 'soldiers') {
        let cum = 0;
        for (const rs of ms.roleSlots) {
          if (idx < cum + rs.count) { requiredRole = rs.role; break; }
          cum += rs.count;
        }
      }
      setPicker({ type, idx, requiredRole, isCommander: type === 'commanders' });
      return;
    }
    // Block soldiers explicitly blocked from this mission
    const blockedSoldier = selPeople.find(p => {
      const m = allMembers.find(x=>x.name===p.name);
      return m && (m.blockedMissions||[]).includes(activeMission);
    });
    if (blockedSoldier && !bypassConstraints) {
      alert(`❌ החייל ${blockedSoldier.name} חסום למשימה זו (לפי הגדרות חייל)`);
      return;
    }
    // Strict role enforcement: roleSlots → only matching roles allowed
    if (ms.roleSlots) {
      let cumIdx = 0, expectedRole = null;
      for (const rs of ms.roleSlots) {
        if (idx < cumIdx + rs.count) { expectedRole = rs.role; break; }
        cumIdx += rs.count;
      }
      if (expectedRole) {
        const bad = selPeople.find(p => {
          const m = allMembers.find(x=>x.name===p.name);
          return !m || !m.roles.includes(expectedRole);
        });
        if (bad && !bypassConstraints) {
          alert(`❌ ${bad.name} לא מוגדר כ-"${expectedRole}". הגדר לו את התפקיד דרך מסך "חיילים" או לחץ "ללא אילוצים".`);
          return;
        }
      }
    }
    setAllAssAndSave(prev => {
      const c = JSON.parse(JSON.stringify(prev));
      if (!c[activeDay]) c[activeDay] = {};
      if (!c[activeDay][activeMission]) c[activeDay][activeMission] = {
        commanders: Array(ms.commander).fill(null),
        soldiers: Array(ms.soldiers).fill(null),
      };
      const needed = type==='commanders' ? ms.commander : ms.soldiers;
      while ((c[activeDay][activeMission][type]||[]).length < needed) {
        c[activeDay][activeMission][type].push(null);
      }
      const slots = c[activeDay][activeMission][type];
      let qi = 0;
      for (let i = idx; i < slots.length && qi < selPeople.length; i++) {
        if (!slots[i]) { slots[i] = selPeople[qi++]; }

      return c;
    });

            <div style={{fontSize:12,color:"var(--text2)",marginBottom:14}}>סמן אנשים ואז לחץ על תא פנוי במשימה</div>
            {effMission && effMission.roleSlots && effMission.roleSlots.length > 0 && (
              <div style={{background:"var(--surface2)",border:"1px solid var(--accent)44",borderRadius:10,padding:"8px 12px",marginBottom:12,fontSize:11}}>
                <span style={{color:"var(--accent)",fontWeight:700}}>🎖️ תפקידים נדרשים למשימה זו: </span>
                {effMission.roleSlots.map((rs,i) => <span key={i} style={{background:"var(--accent)22",color:"var(--accent)",borderRadius:4,padding:"1px 7px",marginRight:4,fontSize:10,fontWeight:700}}>{rs.role} ×{rs.count}</span>)}
                <div style={{color:"var(--text3)",marginTop:4}}>חיילים ללא תפקיד מתאים יסומנו בצהוב</div>
              </div>
            )}
            {(() => {
              const assignedNames = new Set(Object.values(dayAss).flatMap(a=>[...(a.commanders||[]),...(a.soldiers||[])]).filter(Boolean).map(p=>p.name));
              const aftarNames = new Set(aftarByDay[activeDay]||[]);
              const gimelNames = new Set([...(dayAss["gimel"]?.soldiers||[])].filter(Boolean).map(p=>p.name));
              const trulyFree = allMembers.filter(({name}) => !assignedNames.has(name) && !aftarNames.has(name) && !gimelNames.has(name));
              return (
                <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
                  <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:16}}>🕊️</span>
                    <div style={{fontSize:14,fontWeight:700,flex:1}}>חיילים פנויים</div>
                    <div style={{fontSize:11,color:"var(--text3)"}}>{trulyFree.length}</div>
                  </div>
                  <div style={{padding:"10px 12px"}}>
                    {trulyFree.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>כולם משובצים 🎉</div>
                      : <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                          {trulyFree.map(({name,platoon})=>(
                            <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600}}>{name}</div>
                          ))}
                        </div>
                    }
                  </div>
                </div>
              );
            })()}
            {Object.entries(platoons).map(([key,p])=>p.members.length===0?null:(
              <div key={key} className="pool-sec">
                <div className="pool-lbl" style={{color:p.color,borderColor:p.color+"33"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:p.color,flexShrink:0}}/>
                  {p.label}
                </div>
                <div className="pool-chips">
                  {p.members.map(rawMember=>{
                    const name = getMemberName(rawMember);
                    const roles = getMemberRoles(rawMember);
                    const memberBlocked = getMemberBlocked(rawMember);
                    const isAss=assignedThisDay.has(name), isSel=selPeople.some(p=>p.name===name);
                    const allowedNames = effMission?.allowedNames;
                    const isAllowBlk = allowedNames && allowedNames.length>0 && !allowedNames.includes(name);
                    const isMissionBlocked = memberBlocked.includes(effMission?.id);
                    const isRestBlk=blocked.has(name);
                    const AFTAR_EFFECTIVE_START = {"philbox": 14, "hetz4": 14};
                    const missionEffectiveStart = effMission ? (AFTAR_EFFECTIVE_START[effMission.id] ?? effMission.startH) : 0;
                    const isAftarBlk=aftarThisDay.includes(name) && missionEffectiveStart >= aftarSettings.startH;
                    const ti2=DAY_IDS.indexOf(activeDay);
                    const prevAftar = ti2>0 ? (aftarByDay[DAY_IDS[ti2-1]]||[]) : [];
                    const isAftarYesterdayBlk = prevAftar.includes(name) && effMission && effMission.startH < aftarSettings.endH && effMission.id!=="philbox" && effMission.id!=="hetz4";
                    const isGimelBlk=gimelThisDay.has(name) && effMission?.id!=="gimel";
                    const isMaatzar = effMission?.id==="maatzar";
                    // Role match check (STRICT): roleSlots missions require matching role
                    const missionRoles = effMission?.roleSlots && effMission.roleSlots.length > 0 ? effMission.roleSlots.map(rs=>rs.role) : null;
                    const hasRoleMismatch = missionRoles && !missionRoles.some(r => roles.includes(r));
                    const isBlk=!bypassConstraints&&!isMaatzar&&(isAllowBlk||isMissionBlocked||isRestBlk||isAftarBlk||isAftarYesterdayBlk||isGimelBlk||hasRoleMismatch);
                    let cls="chip";
                    if(isSel) cls+=" selected";
                    else if(isMissionBlocked) cls+=" blocked";
                    else if(isAllowBlk) cls+=" blocked";
                    else if(hasRoleMismatch) cls+=" blocked";
                    else if(isAftarBlk) cls+=" aftar";
                    else if(isAftarYesterdayBlk) cls+=" blocked";
                    else if(isGimelBlk) cls+=" blocked";
                    else if(isAss) cls+=" assigned";
                    else if(isRestBlk) cls+=" resting";
                    return (
                      <button key={name} className={cls} style={getPlatoonStyle(key)}
                        title={isBlk?(isMissionBlocked?"חסום מהמשימה (הגדרת חייל)":hasRoleMismatch?"אין תפקיד מתאים":isAftarBlk?"בבית":isAftarYesterdayBlk?"חזר היום מהבית":isGimelBlk?"בגימל":blockedReasons[name]||"לא מורשה"):""}
                        onClick={()=>{
                          if(isBlk && !bypassConstraints) return;
                          if(isSel) setSelPeople(prev=>prev.filter(p=>p.name!==name));
                          else setSelPeople(prev=>[...prev,{name,platoon:key}]);
                        }}>
                        {name}
                        {roles.length>0 && <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center"}}>
                          {roles.slice(0,3).map(r=><span key={r} className="role-tag">{r}</span>)}
                        </div>}
                        {isSel&&<span className="chip-badge" style={{background:"#fff",color:"#111"}}>{selPeople.findIndex(p=>p.name===name)+1}</span>}
                        {!isSel&&isMissionBlocked&&<span className="chip-sub">חסום למשימה זו</span>}
                        {!isSel&&hasRoleMismatch&&<span className="chip-sub">אין תפקיד מתאים</span>}
                        {!isSel&&isRestBlk&&<span className="chip-sub">{blockedReasons[name]||"במנוחה"}</span>}
                        {!isSel&&isAftarBlk&&<span className="chip-sub">בבית</span>}
                        {!isSel&&isGimelBlk&&<span className="chip-sub">בגימל</span>}
                        {!isSel&&!isRestBlk&&!isAftarBlk&&!isGimelBlk&&!isMissionBlocked&&!hasRoleMismatch&&personMissions[name]&&personMissions[name].length>0&&<span className="chip-sub">{personMissions[name].join(" | ")}</span>}
                        {!isSel&&isAss&&!isBlk&&<span className="chip-badge" style={{background:"#26c6da",color:"#000"}}>✓</span>}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ═══ CALENDAR VIEW ═══
  function CalendarView() {
    const [selPpl, setSelPpl] = React.useState([]);
    const [startD, setStartD] = React.useState(null);
    const [endD, setEndD] = React.useState(null);
    const [filterRole, setFilterRole] = React.useState("הכל");
    const [manageDay, setManageDay] = React.useState(null); // dayId for inline manage

    const monthGroups = React.useMemo(() => {
      const groups = {};
      DAYS.forEach(d => {
        const [y,m] = d.id.split('_');
        const key = `${y}_${m}`;
        if (!groups[key]) groups[key] = [];
        groups[key].push(d);
      });
      return Object.entries(groups);
    }, []);

    const handleDateClick = (dayId) => {
      if (manageDay === dayId) { setManageDay(null); return; }
      if (!startD || (startD && endD)) {
        setStartD(dayId); setEndD(null);
      } else if (dayId < startD) {
        setEndD(startD); setStartD(dayId);
      } else if (dayId === startD) {
        // clicking same day opens manage panel
        setManageDay(dayId);
      } else {
        setEndD(dayId);
      }
    };

    const isInRange = (dayId) => {
      if (!startD) return false;
      const end = endD || startD;
      return dayId >= startD && dayId <= end;
    };

    const applyLeave = () => {
      if (!startD || selPpl.length === 0) { alert('בחר חיילים וגם תאריך בלוח'); return; }
      const end = endD || startD;
      const startIdx = DAY_IDS.indexOf(startD);
      const endIdx = DAY_IDS.indexOf(end);
      const range = DAY_IDS.slice(startIdx, endIdx + 1);
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        range.forEach(dayId => {
          if (!c[dayId]) c[dayId] = [];
          selPpl.forEach(name => {
            if (!c[dayId].includes(name)) c[dayId].push(name);
          });
        });
        return c;
      });
      setStartD(null); setEndD(null);
      alert(`✓ נוספו ${selPpl.length} חיילים ל-${range.length} ימים`);
    };

    const clearLeave = () => {
      if (!startD) return;
      const end = endD || startD;
      const startIdx = DAY_IDS.indexOf(startD);
      const endIdx = DAY_IDS.indexOf(end);
      const range = DAY_IDS.slice(startIdx, endIdx + 1);
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        range.forEach(dayId => {
          if (!c[dayId]) return;
          if (selPpl.length === 0) c[dayId] = [];
          else c[dayId] = c[dayId].filter(n => !selPpl.includes(n));
        });
        return c;
      });
      setStartD(null); setEndD(null);
    };

    const removeFromDay = (dayId, name) => {
      setAftarByDayAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        if (c[dayId]) c[dayId] = c[dayId].filter(n => n !== name);
        return c;
      });
    };

    const todayId = (() => {
      const n = new Date(); const p = x => String(x).padStart(2,'0');
      return `${n.getFullYear()}_${p(n.getMonth()+1)}_${p(n.getDate())}`;
    })();
    const HEB_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

    const filteredMembers = filterRole === "הכל" ? allMembers : allMembers.filter(m => m.roles.includes(filterRole));

    return (
      <div className="main" style={{maxWidth:1200,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>🏠 לוח יציאות הביתה</div>
        <div style={{fontSize:13,color:"var(--text2)",marginBottom:18,lineHeight:1.6}}>
          <strong>איך זה עובד:</strong> 1) בחר חיילים מהרשימה למטה → 2) לחץ על תאריך יציאה בלוח → 3) לחץ על תאריך חזרה לסמן טווח → 4) לחץ "הוסף יציאה"
        </div>

        {/* Sticky action panel */}
        <div style={{background:"var(--surface)",border:"1.5px solid var(--accent)",borderRadius:14,padding:"14px",marginBottom:20,position:"sticky",top:48,zIndex:50}}>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:10}}>
            <span style={{fontSize:12,fontWeight:700}}>חיילים נבחרים ({selPpl.length}):</span>
            {selPpl.length === 0 ? <span style={{fontSize:12,color:"var(--text3)"}}>בחר חיילים מהרשימה למטה</span> :
              selPpl.map(n => {
                const m = allMembers.find(x=>x.name===n);
                return <span key={n} style={{...(m?getPlatoonStyle(m.platoon):{background:"#555",color:"#fff"}),borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700,display:"inline-flex",gap:4,alignItems:"center"}}>
                  {n} <button onClick={()=>setSelPpl(p=>p.filter(x=>x!==n))} style={{background:"rgba(0,0,0,.25)",border:"none",borderRadius:3,color:"inherit",cursor:"pointer",fontSize:10,padding:"0 3px",fontFamily:"Heebo,sans-serif"}}>✕</button>
                </span>;
              })
            }
            {selPpl.length > 0 && <button onClick={()=>setSelPpl([])} style={{background:"none",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text3)",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>נקה הכל</button>}
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:12,fontWeight:700}}>טווח תאריכים:</span>
            {startD && <span style={{background:"var(--accent)",color:"#fff",borderRadius:6,padding:"3px 12px",fontSize:12,fontWeight:700}}>📤 {DAYS.find(d=>d.id===startD)?.date}</span>}
            {endD && <><span style={{fontSize:14,color:"var(--text2)"}}>→</span><span style={{background:"var(--accent)",color:"#fff",borderRadius:6,padding:"3px 12px",fontSize:12,fontWeight:700}}>📥 {DAYS.find(d=>d.id===endD)?.date}</span></>}
            {!startD && <span style={{fontSize:12,color:"var(--text3)"}}>לחץ על תאריך בלוח השנה</span>}
            <button onClick={()=>{setStartD(null);setEndD(null);}} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text2)",padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>נקה טווח</button>
            <button onClick={applyLeave} style={{background:"var(--green)",border:"none",borderRadius:6,color:"#fff",padding:"6px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif",marginRight:"auto"}}>✓ הוסף יציאה</button>
            <button onClick={clearLeave} style={{background:"#ef535033",border:"1px solid #ef5350",borderRadius:6,color:"#ef5350",padding:"6px 18px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>🗑 הסר מהטווח</button>
          </div>
          <div style={{fontSize:11,color:"var(--text2)",marginTop:8,paddingTop:8,borderTop:"1px solid var(--border)",display:"flex",gap:14,alignItems:"center",flexWrap:"wrap"}}>
            <span>⏰ שעת יציאה: <strong style={{color:"var(--text)"}}>{aftarSettings.startH}:00</strong></span>
            <span>שעת חזרה: <strong style={{color:"var(--text)"}}>{aftarSettings.endH}:00</strong></span>
            <span style={{marginRight:"auto"}}>לעריכה → הגדרות → יציאה הביתה</span>
          </div>
        </div>

        {/* Calendar */}
        {monthGroups.map(([key, days]) => {
          const [y,m] = key.split('_');
          const monthName = HEB_MONTHS[parseInt(m)-1];
          const firstDay = days[0];
          const blanks = firstDay.dow;
          return (
            <div key={key} className="cal-month">
              <div className="cal-month-title">{monthName} {y}</div>
              <div className="cal-grid">
                {["א'","ב'","ג'","ד'","ה'","ו'","ש'"].map(d=><div key={d} className="cal-head">{d}</div>)}
                {Array(blanks).fill(null).map((_,i)=><div key={"b"+i} className="cal-cell empty"/>)}
                {days.map(d=>{
                  const leaves = aftarByDay[d.id] || [];
                  const isStart = d.id===startD;
                  const isEnd = d.id===endD;
                  const inRng = isInRange(d.id);
                  const isToday = d.id===todayId;
                  const isManage = d.id===manageDay;
                  let cls = "cal-cell";
                  if (isToday) cls += " today";
                  if (leaves.length>0) cls += " has-leave";
                  if (inRng) cls += " in-range";
                  if (isStart) cls += " start";
                  if (isEnd) cls += " end";
                  return (
                    <React.Fragment key={d.id}>
                      <div className={cls} onClick={()=>handleDateClick(d.id)} style={isManage?{borderColor:"var(--orange)",boxShadow:"0 0 0 2px var(--orange)44"}:{}}>
                        <div className="cal-day-num">{d.date.split('/')[0]}</div>
                        {leaves.length>0 && <div className="cal-leave-count">{leaves.length}</div>}
                        {leaves.length>0 && <div className="cal-names">{leaves.slice(0,3).join(", ")}{leaves.length>3?"...":""}</div>}
                        {isManage && <div style={{position:"absolute",bottom:1,left:0,right:0,textAlign:"center",fontSize:7,color:"var(--orange)",fontWeight:700}}>לחץ לסגירה</div>}
                      </div>
                      {isManage && leaves.length > 0 && (
                        <div style={{gridColumn:"1 / -1",background:"var(--surface)",border:"1px solid var(--orange)66",borderRadius:10,padding:"10px 12px",marginBottom:4,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
                          <span style={{fontSize:11,fontWeight:700,color:"var(--orange)",marginLeft:6}}>📅 {d.date} — ניהול יציאות:</span>
                          {leaves.map(name => {
                            const member = allMembers.find(x=>x.name===name);
                            return (
                              <span key={name} style={{...(member?getPlatoonStyle(member.platoon):{background:"#555",color:"#fff"}),borderRadius:6,padding:"2px 8px",fontSize:12,fontWeight:700,display:"inline-flex",gap:4,alignItems:"center"}}>
                                {name}
                                <button onClick={()=>removeFromDay(d.id, name)} style={{background:"rgba(0,0,0,.3)",border:"none",borderRadius:3,color:"inherit",cursor:"pointer",fontSize:10,padding:"0 3px",fontFamily:"Heebo,sans-serif"}}>✕</button>
                              </span>
                            );
                          })}
                          <button onClick={()=>{if(confirm(`למחוק את כל היציאות ביום ${d.date}?`)){setAftarByDayAndSave(prev=>{const c=JSON.parse(JSON.stringify(prev));c[d.id]=[];return c;});setManageDay(null);}}} style={{background:"#ef535022",border:"1px solid #ef5350",borderRadius:6,color:"#ef5350",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif",marginRight:"auto"}}>🗑 נקה יום</button>
                        </div>
                      )}
                    </React.Fragment>
                  );
                })}
              </div>
            </div>
          );
        })}

        {/* People selector */}
        <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:14,padding:"16px",marginTop:20}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
            <div style={{fontSize:14,fontWeight:700}}>👥 בחר חיילים:</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",marginRight:"auto"}}>
              {["הכל",...availableRoles].map(r=>(
                <button key={r} onClick={()=>setFilterRole(r)} style={{background:filterRole===r?"var(--accent)":"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:filterRole===r?"#fff":"var(--text2)",padding:"2px 8px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif",fontWeight:filterRole===r?700:400}}>
                  {r}
                </button>
              ))}
            </div>
            <button onClick={()=>setSelPpl(filteredMembers.map(m=>m.name))} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:6,color:"var(--text2)",padding:"3px 10px",fontSize:11,cursor:"pointer",fontFamily:"Heebo,sans-serif"}}>בחר הכל</button>
          </div>
          {allMembers.length === 0 ? <div style={{color:"var(--text3)",fontSize:12}}>אין חיילים. הוסף דרך מסך "חיילים"</div> :
            Object.entries(platoons).map(([key,p])=>{
              const members = p.members.filter(rawM => filterRole==="הכל" || getMemberRoles(rawM).includes(filterRole));
              if(members.length===0) return null;
              return (
                <div key={key} style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:700,color:p.color,marginBottom:6}}>{p.label}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {members.map(rawM=>{
                      const name = getMemberName(rawM);
                      const roles = getMemberRoles(rawM);
                      const isSel = selPpl.includes(name);
                      const leavesCount = DAY_IDS.filter(d=>(aftarByDay[d]||[]).includes(name)).length;
                      return (
                        <button key={name} className={`chip ${isSel?"selected":""}`} style={getPlatoonStyle(key)}
                          onClick={()=>setSelPpl(prev=>isSel?prev.filter(n=>n!==name):[...prev,name])}>
                          {name}
                          {roles.length>0 && <div style={{display:"flex",flexWrap:"wrap",justifyContent:"center",gap:1,marginTop:1}}>
                            {roles.slice(0,2).map(r=><span key={r} className="role-tag">{r}</span>)}
                          </div>}
                          {leavesCount>0 && <span className="chip-sub">{leavesCount} ימי חופש</span>}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    );
  }

  // ═══ LOGIN ═══
  if (!authed) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"var(--bg)"}}>
      <div style={{background:"var(--surface)",border:"2px solid var(--accent)",borderRadius:18,padding:"40px 48px",display:"flex",flexDirection:"column",alignItems:"center",gap:18,boxShadow:"0 0 40px rgba(79,156,249,0.2)"}}>
        <div style={{fontSize:32}}>🔐</div>
        <div style={{fontSize:22,fontWeight:800,color:"var(--text)"}}>{APP_TITLE}</div>
        <div style={{fontSize:13,color:"var(--text2)"}}>הכנס סיסמה לגישה</div>
        <input type="password" value={pwInput} onChange={e=>{setPwInput(e.target.value);setPwError(false);}}
          onKeyDown={e=>{if(e.key==='Enter'){if(customPasswords.includes(pwInput)){sessionStorage.setItem('shabzak_auth','1');setAuthed(true);}else setPwError(true);}}}
          placeholder="סיסמה..."
          style={{padding:"10px 16px",borderRadius:9,border:`1.5px solid ${pwError?"#ef5350":"var(--border2)"}`,background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:15,outline:"none",textAlign:"center",width:200,direction:"ltr"}}
          autoFocus/>
        {pwError && <div style={{fontSize:12,color:"#ef5350"}}>סיסמה שגויה ❌</div>}
        <button onClick={()=>{if(customPasswords.includes(pwInput)){sessionStorage.setItem('shabzak_auth','1');setAuthed(true);}else setPwError(true);}}
          style={{background:"var(--accent)",color:"#fff",border:"none",borderRadius:9,padding:"10px 32px",fontFamily:"Heebo,sans-serif",fontSize:15,fontWeight:700,cursor:"pointer"}}>
          כניסה
        </button>
        <div style={{fontSize:10,color:"var(--text3)"}}>סיסמה ברירת מחדל: 1234</div>
      </div>
    </div>
  );

  // ═══ SETTINGS VIEW ═══
  function SettingsView() {
    const [settingsTab, setSettingsTab] = useState("missions");
    const inp = {display:"block",width:"100%",marginTop:3,padding:"5px 8px",borderRadius:7,border:"1px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:13};
    const btn = (extra={}) => ({background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:12,padding:"4px 10px",...extra});
    const [editId, setEditId] = useState(null);
    const [draft, setDraft] = useState({});
    const [showNewMission, setShowNewMission] = useState(false);
    const [newMissionDraft, setNewMissionDraft] = useState({label:"",icon:"🎯",time:"",startH:8,endH:16,restHours:0,slots_commander:0,slots_soldiers:1,col:1,border:"#7e57c2",roleSlots:[],allowedNames:[]});
    const visibleForSettings = [...MISSION_DEFS, ...customMissions].filter(m => !deletedMissions.includes(m.id));
    const startEdit = (m) => {
      const cur = missionSettings[m.id] || {
        label: m.label, icon: m.icon, time: m.time,
        startH: m.startH, endH: m.endH,
        restHours: 0, slots_commander: m.slots.commander, slots_soldiers: m.slots.soldiers,
        col: m.col || 1, roleSlots: m.roleSlots || [], allowedNames: m.allowedNames || [],
      };
      setEditId(m.id);
      setDraft({...cur, roleSlots: cur.roleSlots || []});
    };
    const addNewMission = () => {
      if (!newMissionDraft.label.trim()) { alert("חסר שם משימה"); return; }
      const id = "custom_" + Date.now();
      const newM = {
        id,
        label: newMissionDraft.label, icon: newMissionDraft.icon || "🎯",
        time: newMissionDraft.time,
        slots: { commander: newMissionDraft.slots_commander, soldiers: newMissionDraft.slots_soldiers },
        border: newMissionDraft.border || "#7e57c2",
        col: newMissionDraft.col || 1,
        startH: newMissionDraft.startH, endH: newMissionDraft.endH,
        roleSlots: newMissionDraft.roleSlots || [],
        allowedNames: [],
      };
      setCustomMissions(prev => [...prev, newM]);
      setMissionSettings(prev => ({...prev, [id]: {...newMissionDraft, allowedNames:[]}}));
      // init assignments for this mission
      setAllAssAndSave(prev => {
        const c = JSON.parse(JSON.stringify(prev));
        DAY_IDS.forEach(dayId => {
          if (!c[dayId]) c[dayId] = {};
          const totalSol = newMissionDraft.roleSlots && newMissionDraft.roleSlots.length > 0
            ? newMissionDraft.roleSlots.reduce((s,r)=>s+(r.count||0),0)
            : newMissionDraft.slots_soldiers;
          c[dayId][id] = {
            commanders: Array(newMissionDraft.slots_commander).fill(null),
            soldiers: Array(totalSol).fill(null),
          };
        });
        return c;
      });
      setNewMissionDraft({label:"",icon:"🎯",time:"",startH:8,endH:16,restHours:0,slots_commander:0,slots_soldiers:1,col:1,border:"#7e57c2",roleSlots:[],allowedNames:[]});
      setShowNewMission(false);
    };
    const saveEdit = () => {
      const prev_s = missionSettings[editId];
      const updated = {...missionSettings,[editId]:{...draft}};
      setMissionSettings(updated);
      if (draft.slots_commander !== prev_s?.slots_commander || draft.slots_soldiers !== prev_s?.slots_soldiers) {
        setAllAssAndSave(prev => {
          const c = JSON.parse(JSON.stringify(prev));
          DAY_IDS.forEach(dayId => {
            if (!c[dayId] || !c[dayId][editId]) return;
            const cur = c[dayId][editId];
            const newCmd = draft.slots_commander || 0;
            const newSol = draft.slots_soldiers || 0;
            const resizeArr = (arr, size) => {
              const a = Array(size).fill(null);
              (arr||[]).forEach((v,i) => { if(i<size) a[i]=v; });
              return a;
            };
            c[dayId][editId] = {
              commanders: resizeArr(cur.commanders, newCmd),
              soldiers: resizeArr(cur.soldiers, newSol),
            };
          });
          return c;
        });
      }
      setEditId(null);
    };
    const tabStyle = (t) => ({padding:"6px 14px",borderRadius:8,border:"none",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:13,fontWeight:settingsTab===t?700:400,background:settingsTab===t?"var(--accent)":"var(--surface2)",color:settingsTab===t?"#fff":"var(--text2)"});
    return (
      <div className="main" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
          <button style={tabStyle("missions")} onClick={()=>setSettingsTab("missions")}>⚙️ משימות</button>
          <button style={tabStyle("aftar")} onClick={()=>setSettingsTab("aftar")}>🏠 יציאה הביתה</button>
          <button style={tabStyle("roles")} onClick={()=>setSettingsTab("roles")}>🎖️ תפקידים</button>
          <button style={tabStyle("password")} onClick={()=>setSettingsTab("password")}>🔐 סיסמה</button>
        </div>
        {settingsTab==="missions" && (
          <div>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
              <div style={{fontSize:16,fontWeight:800}}>⚙️ הגדרות משימות</div>
              <button onClick={()=>setShowNewMission(p=>!p)} style={btn({background:"var(--green)",color:"#fff",fontWeight:700,padding:"6px 14px",marginRight:"auto"})}>
                {showNewMission?"✕ ביטול":"+ משימה חדשה"}
              </button>
            </div>
            <div style={{fontSize:11,color:"var(--text2)",marginBottom:14}}>אפשר לערוך כל פרט: שם, אייקון, שעות, מספר חיילים, תפקידים נדרשים ועמודת תצוגה</div>
            {showNewMission && (
              <div style={{background:"var(--surface)",border:"2px solid var(--green)",borderRadius:12,padding:"14px",marginBottom:14}}>
                <div style={{fontSize:14,fontWeight:800,color:"var(--green)",marginBottom:10}}>➕ יצירת משימה חדשה</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:7}}>
                  <label style={{fontSize:11,color:"var(--text2)"}}>שם משימה<input style={inp} value={newMissionDraft.label} onChange={e=>setNewMissionDraft(d=>({...d,label:e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>אייקון<input style={inp} value={newMissionDraft.icon} onChange={e=>setNewMissionDraft(d=>({...d,icon:e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>שעות תצוגה<input style={inp} placeholder="למשל: 8:00-14:00" value={newMissionDraft.time} onChange={e=>setNewMissionDraft(d=>({...d,time:e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>שעת התחלה<input type="number" min={0} max={30} style={inp} value={newMissionDraft.startH} onChange={e=>setNewMissionDraft(d=>({...d,startH:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>שעת סיום<input type="number" min={0} max={30} style={inp} value={newMissionDraft.endH} onChange={e=>setNewMissionDraft(d=>({...d,endH:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>מנוחה (שעות)<input type="number" min={0} max={24} style={inp} value={newMissionDraft.restHours} onChange={e=>setNewMissionDraft(d=>({...d,restHours:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>מפקדים<input type="number" min={0} max={10} style={inp} value={newMissionDraft.slots_commander} onChange={e=>setNewMissionDraft(d=>({...d,slots_commander:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>חיילים<input type="number" min={0} max={20} style={inp} value={newMissionDraft.slots_soldiers} onChange={e=>setNewMissionDraft(d=>({...d,slots_soldiers:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>עמודה (1-6)<input type="number" min={1} max={6} style={inp} value={newMissionDraft.col} onChange={e=>setNewMissionDraft(d=>({...d,col:+e.target.value}))}/></label>
                  <label style={{fontSize:11,color:"var(--text2)"}}>צבע מסגרת<input type="color" style={{...inp,height:32,padding:0}} value={newMissionDraft.border} onChange={e=>setNewMissionDraft(d=>({...d,border:e.target.value}))}/></label>
                </div>
                <div style={{borderTop:"1px solid var(--border)",paddingTop:10,marginTop:10}}>
                  <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"var(--accent)"}}>🎖️ תפקידים נדרשים (אופציונלי)</div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {(newMissionDraft.roleSlots||[]).map((rs,i)=>(
                      <div key={i} style={{display:"flex",gap:5,alignItems:"center"}}>
                        <select style={{...inp,marginTop:0,flex:2}} value={rs.role} onChange={e=>setNewMissionDraft(d=>{const nrs=[...d.roleSlots];nrs[i]={...nrs[i],role:e.target.value};return {...d,roleSlots:nrs};})}>
                          {availableRoles.map(r=><option key={r} value={r}>{r}</option>)}
                        </select>
                        <input type="number" min={1} max={20} style={{...inp,marginTop:0,flex:1}} value={rs.count} onChange={e=>setNewMissionDraft(d=>{const nrs=[...d.roleSlots];nrs[i]={...nrs[i],count:+e.target.value};return {...d,roleSlots:nrs};})}/>
                        <button onClick={()=>setNewMissionDraft(d=>({...d,roleSlots:d.roleSlots.filter((_,j)=>j!==i)}))} style={btn({color:"#ef5350",padding:"4px 8px"})}>✕</button>
                      </div>
                    ))}
                    <button onClick={()=>setNewMissionDraft(d=>({...d,roleSlots:[...(d.roleSlots||[]),{role:availableRoles[0]||"לוחם",count:1}]}))} style={btn({background:"var(--accent)22",color:"var(--accent)",fontWeight:700})}>+ הוסף תפקיד</button>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button onClick={addNewMission} style={btn({background:"var(--green)",color:"#fff",flex:1,fontWeight:700,padding:"8px"})}>✓ צור משימה</button>
                  <button onClick={()=>setShowNewMission(false)} style={btn({flex:1,padding:"8px"})}>ביטול</button>
                </div>
              </div>
            )}
            <div style={{display:"flex",flexDirection:"column",gap:6}}>
              {visibleForSettings.map(m => {
                const s = missionSettings[m.id] || {};
                const isEditing = editId === m.id;
                const hiddenCount = DAY_IDS.filter(d => isMissionHiddenOnDay(d, m.id)).length;
                return (
                  <div key={m.id} style={{background:"var(--surface)",border:`1.5px solid ${isEditing?"var(--accent)":m.border+"66"}`,borderRadius:12,overflow:"hidden"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",flexWrap:"wrap"}}>
                      <span style={{fontSize:10}}>{hiddenCount===0?"🟢":hiddenCount===DAY_IDS.length?"🔴":"🟡"}</span>
                      <span style={{fontSize:15}}>{s.icon||m.icon}</span>
                      <span style={{fontWeight:700,fontSize:13,flex:1}}>{s.label||m.label}</span>
                      {!isEditing && <span style={{fontSize:11,color:"var(--text3)"}}>🕐 {s.startH}:00–{s.endH>24?(s.endH-24)+":00+":s.endH+":00"} | 😴 {s.restHours}ש׳ | ⭐{s.slots_commander} 🪖{s.slots_soldiers}{s.roleSlots && s.roleSlots.length>0?" 🎖️":""}</span>}
                      {!isEditing && <button onClick={()=>startEdit(m)} style={btn()}>✏️</button>}
                      {!isEditing && <button onClick={()=>{if(confirm(`למחוק את "${m.label}"?`)) setDeletedMissions(p=>[...p,m.id]);}} style={btn({color:"#ef5350"})}>🗑</button>}
                    </div>
                    {!isEditing && (
                      <div style={{padding:"4px 14px 10px",display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <span style={{fontSize:10,color:"var(--text3)"}}>📍 עמודה בתצוגה:</span>
                        {[1,2,3,4,5,6].map(c=>(
                          <button key={c} onClick={()=>setMissionSettings(prev=>({...prev,[m.id]:{...prev[m.id],col:c}}))}
                            style={{...btn(),background:(s.col||m.col||1)===c?"var(--accent)":"var(--surface2)",color:(s.col||m.col||1)===c?"#fff":"var(--text2)",fontSize:11,fontWeight:700,padding:"3px 10px",minWidth:28}}>
                            {c}
                          </button>
                        ))}
                        <span style={{fontSize:9,color:"var(--text3)",marginRight:6}}>(משימות באותה עמודה יוצגו אחת מתחת לשנייה)</span>
                      </div>
                    )}
                    {isEditing && (
                      <div style={{padding:"0 14px 14px",display:"flex",flexDirection:"column",gap:8}}>
                        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:7}}>
                          <label style={{fontSize:11,color:"var(--text2)"}}>שם<input style={inp} value={draft.label||""} onChange={e=>setDraft(d=>({...d,label:e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>אייקון<input style={inp} value={draft.icon||""} onChange={e=>setDraft(d=>({...d,icon:e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>שעות תצוגה<input style={inp} value={draft.time||""} onChange={e=>setDraft(d=>({...d,time:e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>שעת התחלה<input type="number" min={0} max={30} style={inp} value={draft.startH||0} onChange={e=>setDraft(d=>({...d,startH:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>שעת סיום<input type="number" min={0} max={30} style={inp} value={draft.endH||0} onChange={e=>setDraft(d=>({...d,endH:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>מנוחה (שעות)<input type="number" min={0} max={24} style={inp} value={draft.restHours||0} onChange={e=>setDraft(d=>({...d,restHours:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>מפקדים<input type="number" min={0} max={10} style={inp} value={draft.slots_commander||0} onChange={e=>setDraft(d=>({...d,slots_commander:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>חיילים<input type="number" min={0} max={20} style={inp} value={draft.slots_soldiers||0} onChange={e=>setDraft(d=>({...d,slots_soldiers:+e.target.value}))}/></label>
                          <label style={{fontSize:11,color:"var(--text2)"}}>עמודה בתצוגה (1-6)<input type="number" min={1} max={6} style={inp} value={draft.col||1} onChange={e=>setDraft(d=>({...d,col:+e.target.value}))}/></label>
                        </div>
                        <div style={{borderTop:"1px solid var(--border)",paddingTop:10,marginTop:6}}>
                          <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"var(--accent)"}}>🎖️ תפקידים נדרשים (אופציונלי)</div>
                          <div style={{fontSize:10,color:"var(--text3)",marginBottom:8}}>אם תגדיר תפקידים כאן, יחליפו את החלוקה ל"מפקדים/חיילים". למשל: 1 מפקד, 1 נהג, 1 חובש, 2 לוחמים</div>
                          <div style={{display:"flex",flexDirection:"column",gap:5}}>
                            {(draft.roleSlots||[]).map((rs,i)=>(
                              <div key={i} style={{display:"flex",gap:5,alignItems:"center"}}>
                                <select style={{...inp,marginTop:0,flex:2}} value={rs.role} onChange={e=>setDraft(d=>{const nrs=[...d.roleSlots];nrs[i]={...nrs[i],role:e.target.value};return {...d,roleSlots:nrs};})}>
                                  {availableRoles.map(r=><option key={r} value={r}>{r}</option>)}
                                </select>
                                <input type="number" min={1} max={20} style={{...inp,marginTop:0,flex:1}} value={rs.count} onChange={e=>setDraft(d=>{const nrs=[...d.roleSlots];nrs[i]={...nrs[i],count:+e.target.value};return {...d,roleSlots:nrs};})}/>
                                <button onClick={()=>setDraft(d=>({...d,roleSlots:d.roleSlots.filter((_,j)=>j!==i)}))} style={btn({color:"#ef5350",padding:"4px 8px"})}>✕</button>
                              </div>
                            ))}
                            <button onClick={()=>setDraft(d=>({...d,roleSlots:[...(d.roleSlots||[]),{role:availableRoles[0]||"לוחם",count:1}]}))} style={btn({background:"var(--accent)22",color:"var(--accent)",fontWeight:700})}>+ הוסף תפקיד</button>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:8}}>
                          <button onClick={saveEdit} style={btn({background:"var(--accent)",color:"#fff",flex:1,fontWeight:700})}>✓ שמור</button>
                          <button onClick={()=>setEditId(null)} style={btn({flex:1})}>ביטול</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
            {deletedMissions.length>0 && (
              <div style={{marginTop:20,padding:14,background:"var(--surface)",border:"1px dashed var(--border2)",borderRadius:12}}>

                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {deletedMissions.map(id=>{

                    return <button key={id} onClick={()=>setDeletedMissions(p=>p.filter(x=>x!==id))} style={btn({fontSize:11})}>{m?.icon} {m?.label||id} ↩</button>;
                  })}

              </div>

          </div>
        )}
        {settingsTab==="aftar" && (
          <div style={{maxWidth:500}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:14}}>🏠 הגדרות יציאה הביתה</div>

              <div style={{fontSize:13,color:"var(--text2)",marginBottom:16,lineHeight:1.6}}>הגדר את שעות היציאה והחזרה הביתה. חייל שיוצא: חסום למשימות משעת היציאה ועד סוף היום, וחזרה למשימות בשעת החזרה למחרת.</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <label style={{fontSize:12,color:"var(--text2)"}}>שעת יציאה
                  <input type="number" min={0} max={23} style={inp} value={aftarSettings.startH} onChange={e=>setAftarSettings(s=>({...s,startH:+e.target.value}))}/>
                </label>
                <label style={{fontSize:12,color:"var(--text2)"}}>שעת חזרה
                  <input type="number" min={0} max={23} style={inp} value={aftarSettings.endH} onChange={e=>setAftarSettings(s=>({...s,endH:+e.target.value}))}/>

              </div>
              <div style={{marginTop:14,padding:"10px 12px",background:"var(--surface2)",borderRadius:9,fontSize:12,color:"var(--text2)"}}>
                💡 יוצא ב-{aftarSettings.startH}:00, חוזר למחרת ב-{aftarSettings.endH}:00
              </div>
            </div>
          </div>
        )}
        {settingsTab==="roles" && (
          <div style={{maxWidth:600}}>
            <div style={{fontSize:16,fontWeight:800,marginBottom:14}}>🎖️ ניהול תפקידים</div>
            <div style={{fontSize:11,color:"var(--text2)",marginBottom:14}}>תפקידים אלה זמינים לבחירה לחיילים ולמשימות. הוסף/הסר לפי הצורך.</div>
            <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:14,padding:"16px"}}>
              <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
                {availableRoles.map((r,i)=>{
                  const membersWithRole = allMembers.filter(m=>m.roles.includes(r));
                  return (
                    <div key={i} style={{background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:9,padding:"8px 12px",display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontWeight:700,fontSize:13,flex:1}}>{r}</span>
                      <span style={{fontSize:10,color:"var(--text3)"}}>{membersWithRole.length} חיילים</span>
                      {membersWithRole.length > 0 && (
                        <div style={{display:"flex",flexWrap:"wrap",gap:3,maxWidth:260}}>
                          {membersWithRole.slice(0,6).map(m=>(
                            <span key={m.name} style={{...getPlatoonStyle(m.platoon),borderRadius:4,padding:"1px 6px",fontSize:10,fontWeight:600}}>{m.name}</span>

                          {membersWithRole.length>6 && <span style={{fontSize:10,color:"var(--text3)"}}>+{membersWithRole.length-6}</span>}
                        </div>
                      )}
                      <button onClick={()=>{if(confirm(`למחוק את התפקיד "${r}"?`)) setAvailableRoles(p=>p.filter((_,j)=>j!==i));}} style={{background:"none",border:"none",color:"#ef5350",cursor:"pointer",fontSize:12,padding:0}}>✕</button>

  // ═══ TRACKING VIEW ═══
  function TrackingView() {
    const PLATOON_ORDER = ["cmd1","soldiers1","cmd2","soldiers2","cmd3","soldiers3","pluga","pluga2"];
    const platoonIdx = (pl) => { const i = PLATOON_ORDER.indexOf(pl); return i>=0?i:99; };
    return (
      <div className="main" style={{maxWidth:960,margin:"0 auto",padding:"20px 16px"}}>
        <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>📊 מעקבים</div>
        {(() => {
          const counts = {};
          allMembers.forEach(m => { counts[m.name] = { count: 0, platoon: m.platoon }; });
          DAY_IDS.forEach(dayId => {
            (aftarByDay[dayId]||[]).forEach(name => {
              if (counts[name] !== undefined) counts[name].count++;
            });
          });
          const sorted = Object.entries(counts).filter(([,v])=>v.count>0).sort((a,b) => { const pi = platoonIdx(a[1].platoon) - platoonIdx(b[1].platoon); return pi !== 0 ? pi : b[1].count - a[1].count; });
          return (
            <div style={{background:"var(--surface)",border:"1.5px solid #e67e2244",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🏠</span>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>מעקב יציאות הביתה</div>
                <div style={{fontSize:11,color:"var(--text3)"}}>סה"כ ימים</div>
              </div>
              <div style={{padding:"10px 12px"}}>
                {sorted.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>אין יציאות עדיין</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {sorted.map(([name,{count,platoon}]) => (
                        <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                          <span>{name}</span>
                          <span style={{background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"1px 6px",fontSize:11,fontWeight:800}}>{count}</span>
                        </div>
                      ))}
                    </div>
                }
              </div>
            </div>
          );
        })()}
        {(() => {
          const matbahIds = ["matbah_boker","matbah_tzaharayim"];
          const counts = {};
          allMembers.forEach(m => { counts[m.name] = { count: 0, platoon: m.platoon }; });
          DAY_IDS.forEach(dayId => {
            const da = allAss[dayId] || {};
            matbahIds.forEach(mid => {
              const ass = da[mid]; if (!ass) return;
              [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(p => {
                if (counts[p.name] !== undefined) counts[p.name].count += 0.5;
              });
            });
          });
          const sorted = Object.entries(counts).filter(([,v])=>v.count>0).sort((a,b) => { const pi = platoonIdx(a[1].platoon) - platoonIdx(b[1].platoon); return pi !== 0 ? pi : b[1].count - a[1].count; });
          return (
            <div style={{background:"var(--surface)",border:"1.5px solid #ff980044",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>🍳</span>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>מעקב תורנות מטבח</div>
              </div>
              <div style={{padding:"10px 12px"}}>
                {sorted.length === 0 ? <div style={{fontSize:12,color:"var(--text3)"}}>אין תורנויות עדיין</div>
                  : <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {sorted.map(([name,{count,platoon}]) => (
                        <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                          <span>{name}</span>
                          <span style={{background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"1px 6px",fontSize:11,fontWeight:800}}>{Number.isInteger(count)?count:(Math.floor(count)>0?Math.floor(count)+"½":"½")}</span>
                        </div>
                      ))}
                    </div>
                }
              </div>
            </div>
          );
        })()}
        {(() => {
          const trackMissions = MISSION_DEFS.filter(m => !m.hideFromDisplay && !["maatzar","gimel","katzin","matbah_boker","matbah_tzaharayim"].includes(m.id));
          return (
            <div style={{background:"var(--surface)",border:"1.5px solid var(--border)",borderRadius:14,marginBottom:20,overflow:"hidden"}}>
              <div style={{padding:"10px 14px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:16}}>📋</span>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>מעקב כל המשימות</div>
              </div>
              <div style={{padding:"10px 12px",display:"flex",flexDirection:"column",gap:10}}>
                {trackMissions.map(nm => {
                  const counts = {};
                  allMembers.forEach(m => { counts[m.name] = { count: 0, platoon: m.platoon }; });
                  DAY_IDS.forEach(dayId => {
                    const ass = (allAss[dayId]||{})[nm.id]; if (!ass) return;
                    [...(ass.commanders||[]),...(ass.soldiers||[])].filter(Boolean).forEach(p => {
                      if (counts[p.name] !== undefined) counts[p.name].count++;
                    });
                  });
                  const sorted = Object.entries(counts).filter(([,v])=>v.count>0).sort((a,b) => { const pi = platoonIdx(a[1].platoon) - platoonIdx(b[1].platoon); return pi !== 0 ? pi : b[1].count - a[1].count; });
                  if (sorted.length === 0) return null;
                  const s = missionSettings[nm.id]||{};
                  return (
                    <div key={nm.id}>
                      <div style={{fontSize:11,fontWeight:700,color:"var(--text2)",marginBottom:5}}>{s.icon||nm.icon} {s.label||nm.label}</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {sorted.map(([name,{count,platoon}]) => (
                          <div key={name} style={{...getPlatoonStyle(platoon),borderRadius:8,padding:"3px 9px",fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:4}}>
                            <span>{name}</span>
                            <span style={{background:"rgba(0,0,0,0.25)",borderRadius:5,padding:"1px 5px",fontSize:11,fontWeight:800}}>{count}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}
      </div>
    );
  }

  // ═══ MEMBERS VIEW ═══
  function MembersView() {
    const inp = {display:"block",width:"100%",marginTop:3,padding:"5px 8px",borderRadius:7,border:"1px solid var(--border2)",background:"var(--surface2)",color:"var(--text)",fontFamily:"Heebo,sans-serif",fontSize:13};
    const btn = (extra={}) => ({background:"var(--surface2)",border:"1px solid var(--border2)",borderRadius:7,color:"var(--text2)",cursor:"pointer",fontFamily:"Heebo,sans-serif",fontSize:12,padding:"4px 10px",...extra});
    const [newMemberName, setNewMemberName] = useState("");
    const [newMemberPlatoon, setNewMemberPlatoon] = useState("soldiers1");

    const [newMemberBlocked, setNewMemberBlocked] = useState([]);
    const [newMemberPersonal, setNewMemberPersonal] = useState("");
    const [newMemberPhone, setNewMemberPhone] = useState("");
    const [editingMember, setEditingMember] = useState(null);
    const [showNewPlatoon, setShowNewPlatoon] = useState(false);
    const [newPlatoonLabel, setNewPlatoonLabel] = useState("");
    const [newPlatoonColor, setNewPlatoonColor] = useState("#9ccc65");
